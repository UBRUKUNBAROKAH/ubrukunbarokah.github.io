<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Background AI Bergerak</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #ffffff;
            
            /* Warna dasar gelap */
            background-color: #0b0c10; 
            
            /* Dua lapisan cahaya bulat (radial gradient) */
            background-image: 
                radial-gradient(circle at 20% 30%, rgba(90, 92, 234, 0.2) 0%, transparent 50%),
                radial-gradient(circle at 80% 70%, rgba(32, 201, 151, 0.2) 0%, transparent 50%);
            
            /* Memperbesar ukuran background agar bisa digerakkan posisinya */
            background-size: 150% 150%;
            
            /* Menjalankan animasi bernama 'gerakCahaya' selama 12 detik, berulang selamanya */
            animation: gerakCahaya 12s ease infinite alternate;
        }

        /* Mengatur pergerakan posisi cahaya */
        @keyframes gerakCahaya {
            0% {
                background-position: 0% 0%;
            }
            50% {
                background-position: 50% 100%;
            }
            100% {
                background-position: 100% 0%;
            }
        }

        /* Kotak Konten */
        .container {
            text-align: center;
            padding: 2.5rem;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 24px;
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
            max-width: 450px;
            width: 90%;
        }

        h1 {
            font-size: 2.2rem;
            margin-bottom: 1rem;
            background: linear-gradient(45deg, #5a5cea, #20c997);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p {
            color: #94a3b8;
            line-height: 1.6;
            font-size: 1rem;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Cahaya Bergerak</h1>
        <p>Sekarang pendaran cahaya ungu dan hijau di latar belakang akan bergerak perlahan secara dinamis, menciptakan efek estetika modern yang hidup.</p>
    </div>

</body>
</html>
