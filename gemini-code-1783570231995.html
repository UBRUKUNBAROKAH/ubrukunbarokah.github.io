<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Background Ala AI</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #ffffff;
            
            /* Background gradasi halus ala aplikasi AI modern */
            background: radial-gradient(circle at 10% 20%, rgba(90, 92, 234, 0.15) 0%, transparent 40%),
                        radial-gradient(circle at 90% 80%, rgba(32, 201, 151, 0.15) 0%, transparent 40%),
                        #111318; /* Warna dasar gelap */
            
            background-attachment: fixed;
        }

        .container {
            text-align: center;
            padding: 2rem;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 16px;
            backdrop-filter: blur(10px);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
            max-width: 500px;
            width: 90%;
        }

        h1 {
            font-size: 2rem;
            margin-bottom: 1rem;
            background: linear-gradient(45deg, #5a5cea, #20c997);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p {
            color: #94a3b8;
            line-height: 1.6;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Halo di Sana!</h1>
        <p>Ini adalah contoh background gelap dengan sentuhan pendaran cahaya (glow effect) lembut di pojok-pojoknya, mirip dengan estetika interface AI masa kini.</p>
    </div>

</body>
</html>
