<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>UB Rukun Barokah</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700;800&family=Plus+Jakarta+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#F1F6F0;
  --surface:#FFFFFF;
  --primary:#0B3D2E;
  --primary-2:#124F3C;
  --primary-soft:#E4EEE6;
  --gold:#B98F33;
  --gold-soft:#F1E3C2;
  --text:#182620;
  --muted:#5C6E64;
  --border:#DEE7DD;
  --danger:#B3402A;
  --danger-soft:#F7E4DE;
  --ok:#2E7D4F;
  --radius-lg:20px;
  --radius-md:14px;
  --radius-sm:10px;
  --shadow: 0 8px 24px -12px rgba(11,61,46,.25);
}
*{box-sizing:border-box;}
html,body{margin:0;padding:0;}
body{
  font-family:'Plus Jakarta Sans', sans-serif;
  background:var(--bg);
  color:var(--text);
  min-height:100vh;
  -webkit-font-smoothing:antialiased;
}
h1,h2,h3,.display{font-family:'Sora',sans-serif;}
.mono{font-family:'IBM Plex Mono',monospace;font-variant-numeric:tabular-nums;}
button{font-family:inherit;cursor:pointer;}
input,select{font-family:inherit;}
::selection{background:var(--gold-soft);}

.phone-wrap{
  width:100%;
  min-height:100vh;
  background:var(--bg);
  position:relative;
  display:flex;
  flex-direction:column;
}

/* batik-inspired signature pattern */
.batik-bg{
  background-color:var(--primary);
  background-image:
    radial-gradient(circle at 10px 10px, rgba(185,143,51,.35) 2px, transparent 2.5px),
    radial-gradient(circle at 30px 30px, rgba(185,143,51,.22) 2px, transparent 2.5px);
  background-size:40px 40px;
}

/* ---------- LOGIN ---------- */
#login-screen{
  min-height:100vh;
  display:flex;
  flex-direction:column;
}
.login-hero{
  padding:56px 28px 40px;
  color:#fff;
  position:relative;
}
.login-hero .icon-badge{
  width:64px;height:64px;border-radius:18px;background:var(--gold);
  display:flex;align-items:center;justify-content:center;font-size:30px;
  box-shadow:0 8px 20px -6px rgba(0,0,0,.4);
  margin-bottom:18px;
  overflow:hidden;
}
.login-hero h1{font-size:22px;margin:0 0 4px;font-weight:700;letter-spacing:.2px;}
.login-hero p{margin:0;color:rgba(255,255,255,.75);font-size:13.5px;}
.login-card{
  background:var(--surface);
  border-radius:24px 24px 0 0;
  margin-top:-20px;
  padding:28px 24px 32px;
  flex:1;
  display:flex;
  flex-direction:column;
  gap:16px;
}
.field{display:flex;flex-direction:column;gap:6px;}
.field label{font-size:12.5px;font-weight:600;color:var(--muted);}
.field input, .field select, .field textarea{
  border:1.5px solid var(--border);
  border-radius:var(--radius-sm);
  padding:12px 14px;
  font-size:14.5px;
  background:#FBFCFA;
  outline:none;
  transition:border-color .15s;
}
.field input:focus, .field select:focus, .field textarea:focus{border-color:var(--primary);}
.btn{
  border:none;
  border-radius:var(--radius-sm);
  padding:13px 16px;
  font-weight:700;
  font-size:14.5px;
  display:inline-flex;align-items:center;justify-content:center;gap:8px;
}
.btn-primary{background:var(--primary);color:#fff;}
.btn-primary:active{background:var(--primary-2);}
.btn-gold{background:var(--gold);color:#fff;}
.btn-outline{background:transparent;border:1.5px solid var(--border);color:var(--text);}
.btn-danger{background:var(--danger-soft);color:var(--danger);}
.btn-block{width:100%;}
.btn-sm{padding:8px 12px;font-size:12.5px;border-radius:8px;}
.icon-btn-sm{width:32px;height:32px;border:none;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:15px;cursor:pointer;}
.ic-danger{background:var(--danger-soft);color:var(--danger);}
.ic-primary{background:var(--primary-soft);color:var(--primary);}
.login-error{background:var(--danger-soft);color:var(--danger);font-size:13px;padding:10px 12px;border-radius:10px;display:none;}
.demo-box{background:var(--primary-soft);border-radius:var(--radius-sm);padding:12px 14px;font-size:11.5px;color:var(--primary);line-height:1.6;}
.demo-box b{font-family:'IBM Plex Mono',monospace;}

/* ---------- APP SHELL ---------- */
#app-screen{display:none;flex-direction:column;min-height:100vh;}
.app-header{
  background:var(--primary);
  color:#fff;
  padding:18px 18px 20px;
  display:flex;align-items:center;justify-content:space-between;
  gap:10px;
}
.app-header .left{display:flex;align-items:center;gap:10px;}
.app-header .koperasi-icon{width:38px;height:38px;border-radius:10px;background:rgba(255,255,255,.15);display:flex;align-items:center;justify-content:center;font-size:20px;overflow:hidden;}
.app-header .titles .name{font-weight:700;font-size:14.5px;line-height:1.2;font-family:'Sora',sans-serif;}
.app-header .titles .role{font-size:11px;color:var(--gold-soft);text-transform:uppercase;letter-spacing:.6px;}
.icon-btn{background:rgba(255,255,255,.14);border:none;color:#fff;width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;}

#content{flex:1;padding:18px 18px 90px;overflow-y:auto;}
.page-title{font-family:'Sora',sans-serif;font-size:18px;font-weight:700;margin:2px 0 16px;display:flex;align-items:center;justify-content:space-between;}
.page-title span.sub{display:block;font-family:'Plus Jakarta Sans';font-size:12px;color:var(--muted);font-weight:500;margin-top:2px;}

.card{background:var(--surface);border-radius:var(--radius-lg);padding:18px;box-shadow:var(--shadow);margin-bottom:14px;border:1px solid var(--border);}
.balance-card{background:linear-gradient(135deg,var(--primary) 0%, var(--primary-2) 100%);color:#fff;border:none;position:relative;overflow:hidden;}
.balance-card::after{content:"";position:absolute;right:-30px;top:-30px;width:140px;height:140px;border-radius:50%;background:rgba(255,255,255,.06);}
.balance-card .label{font-size:12px;color:rgba(255,255,255,.75);}
.balance-card .amount{font-family:'Sora',sans-serif;font-size:26px;font-weight:700;margin-top:6px;}
.balance-card .rekening{font-family:'IBM Plex Mono',monospace;font-size:11.5px;color:var(--gold-soft);margin-top:10px;letter-spacing:.5px;}

.grid-menu{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;}
.grid-menu .item{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-md);padding:14px 8px;text-align:center;display:flex;flex-direction:column;align-items:center;gap:8px;}
.grid-menu .item .ic{width:42px;height:42px;border-radius:12px;background:var(--primary-soft);color:var(--primary);display:flex;align-items:center;justify-content:center;}
.grid-menu .item span{font-size:11.5px;font-weight:600;line-height:1.25;}

.list-row{display:flex;align-items:center;justify-content:space-between;padding:12px 0;border-bottom:1px dashed var(--border);}
.list-row:last-child{border-bottom:none;}
.list-row .info .title{font-weight:600;font-size:13.5px;}
.list-row .info .sub{font-size:11.5px;color:var(--muted);margin-top:2px;}
.list-row .amt{font-family:'IBM Plex Mono',monospace;font-weight:600;font-size:13.5px;}
.amt.plus{color:var(--ok);}
.amt.minus{color:var(--danger);}

.badge{font-size:10.5px;font-weight:700;padding:3px 9px;border-radius:20px;display:inline-block;letter-spacing:.3px;}
.badge-green{background:var(--primary-soft);color:var(--primary);}
.badge-gold{background:var(--gold-soft);color:#8a6a1f;}
.badge-red{background:var(--danger-soft);color:var(--danger);}

.tabs{display:flex;gap:6px;background:var(--primary-soft);padding:4px;border-radius:12px;margin-bottom:14px;}
.tabs button{flex:1;border:none;background:transparent;padding:9px 6px;border-radius:9px;font-size:12.5px;font-weight:700;color:var(--primary);}
.tabs button.active{background:var(--primary);color:#fff;}

.search-box{display:flex;align-items:center;gap:8px;background:var(--surface);border:1.5px solid var(--border);border-radius:12px;padding:9px 12px;margin-bottom:14px;}
.search-box input{border:none;outline:none;background:transparent;flex:1;font-size:13.5px;}

.empty-state{text-align:center;padding:40px 10px;color:var(--muted);}
.empty-state .ic{font-size:34px;margin-bottom:10px;}
.empty-state .t{font-weight:700;color:var(--text);font-size:14px;}
.empty-state .d{font-size:12.5px;margin-top:4px;}

/* passbook ledger */
.ledger{border:1px solid var(--border);border-radius:var(--radius-md);overflow:hidden;}
.ledger-head{background:var(--primary-soft);color:var(--primary);font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.4px;display:grid;grid-template-columns:1fr 1.2fr 1fr;padding:9px 12px;}
.ledger-row{display:grid;grid-template-columns:1fr 1.2fr 1fr;padding:11px 12px;border-top:1px dotted var(--border);align-items:center;}
.ledger-row .d{font-size:11px;color:var(--muted);}
.ledger-row .k{font-size:12px;}
.ledger-row .j{font-family:'IBM Plex Mono',monospace;font-size:12px;text-align:right;font-weight:600;}

/* bottom nav */
.bottom-nav{
  position:fixed;bottom:0;left:0;right:0;
  background:var(--surface);
  border-top:1px solid var(--border);
  display:flex;
  overflow-x:auto;
  -webkit-overflow-scrolling:touch;
  padding:8px 6px calc(8px + env(safe-area-inset-bottom));
  box-shadow:0 -6px 18px -10px rgba(0,0,0,.15);
}
.bottom-nav button{flex:1;background:none;border:none;display:flex;flex-direction:column;align-items:center;gap:3px;padding:6px 6px;color:var(--muted);font-size:10px;font-weight:600;border-radius:10px;white-space:nowrap;min-width:56px;}
.bottom-nav button.active{color:var(--primary);}
.bottom-nav button.active .ic{background:var(--primary-soft);}
.bottom-nav .ic{width:26px;height:26px;border-radius:8px;display:flex;align-items:center;justify-content:center;}

/* modal */
.modal-overlay{position:fixed;inset:0;background:rgba(10,25,18,.5);z-index:50;display:none;align-items:flex-end;justify-content:center;}
.modal-overlay.show{display:flex;}
.modal{background:var(--surface);width:100%;border-radius:22px 22px 0 0;padding:22px 22px 26px;max-height:88vh;overflow-y:auto;}
.modal h3{margin:0 0 16px;font-size:16px;}
.modal-close{position:absolute;}
.confirm-overlay{position:fixed;inset:0;background:rgba(10,25,18,.6);z-index:60;display:none;align-items:center;justify-content:center;padding:24px;}
.confirm-overlay.show{display:flex;}
.confirm-box{background:var(--surface);border-radius:18px;padding:24px 22px 18px;width:100%;max-width:320px;box-shadow:0 20px 50px -12px rgba(0,0,0,.4);animation:confirmIn .2s ease;}
@keyframes confirmIn{from{transform:scale(.92);opacity:0;}to{transform:scale(1);opacity:1;}}
.confirm-box .icon{width:48px;height:48px;border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:24px;margin:0 auto 14px;}
.confirm-box .icon.danger{background:var(--danger-soft);color:var(--danger);}
.confirm-box .icon.warning{background:var(--gold-soft);color:#8a6a1f;}
.confirm-box .msg{text-align:center;font-size:14px;line-height:1.5;margin-bottom:20px;color:var(--text);}
.confirm-box .msg b{display:block;font-size:15px;margin-bottom:4px;}
.confirm-actions{display:flex;gap:10px;}
.confirm-actions .btn{flex:1;padding:12px;font-size:14px;}
.form-row{display:flex;flex-direction:column;gap:6px;margin-bottom:12px;}
.form-row label{font-size:12px;font-weight:600;color:var(--muted);}
.form-row input,.form-row select,.form-row textarea{border:1.5px solid var(--border);border-radius:10px;padding:11px 12px;font-size:13.5px;outline:none;background:#FBFCFA;resize:vertical;}
.form-row input:focus,.form-row select:focus,.form-row textarea:focus{border-color:var(--primary);}
.tx-acc-row{cursor:pointer;border:1.5px solid var(--border);border-radius:12px;padding:10px 12px;margin-bottom:8px;display:flex;justify-content:space-between;align-items:center;transition:border-color .12s, background .12s;}
.tx-acc-row:last-child{margin-bottom:0;}
.tx-acc-row.selected{border-color:var(--primary);background:var(--primary-soft);}
.modal-actions{display:flex;gap:10px;margin-top:6px;}
.modal-actions .btn{flex:1;}

.toast{position:fixed;left:50%;bottom:100px;transform:translateX(-50%);background:var(--text);color:#fff;padding:11px 18px;border-radius:30px;font-size:13px;z-index:100;opacity:0;transition:opacity .25s, transform .25s;pointer-events:none;}
.toast.show{opacity:1;}

.section-label{font-size:11.5px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin:20px 0 10px;}
.section-label:first-child{margin-top:0;}
.bar-row{margin-bottom:12px;}
.bar-row .lbl{display:flex;justify-content:space-between;font-size:12px;margin-bottom:5px;}
.bar-track{background:var(--primary-soft);border-radius:20px;height:9px;overflow:hidden;}
.bar-fill{background:var(--gold);height:100%;border-radius:20px;}
.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.stat-box{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-md);padding:14px;}
.stat-box .n{font-family:'Sora',sans-serif;font-weight:700;font-size:19px;color:var(--primary);}
.stat-box .l{font-size:11px;color:var(--muted);margin-top:2px;}

.avatar{width:38px;height:38px;border-radius:11px;background:var(--primary-soft);color:var(--primary);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px;flex-shrink:0;}
.flex{display:flex;align-items:center;gap:10px;}
.flex-between{display:flex;align-items:center;justify-content:space-between;}
a.linklike{color:var(--primary);font-size:12.5px;font-weight:700;text-decoration:none;}
.hint{font-size:11.5px;color:var(--muted);margin-top:4px;}
</style>
</head>
<body>

<div class="phone-wrap">

  <!-- ================= LOGIN ================= -->
  <div id="login-screen">
    <div class="login-hero batik-bg">
      <div class="icon-badge" id="login-icon">ðŸ¦</div>

        <div class="koperasi-icon" id="header-icon">ðŸ¦</div>
        <div class="titles">
          <div class="name" id="header-koperasi-name">UB Rukun Barokah</div>
          <div class="role" id="header-role">NASABAH</div>
        </div>
      </div>
      <button class="icon-btn" onclick="handleLogout()" title="Keluar">
        <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><path d="M16 17l5-5-5-5"/><path d="M21 12H9"/></svg>
      </button>
    </div>

    <div id="content"></div>

    <div class="bottom-nav" id="bottom-nav"></div>
  </div>

</div>

<!-- modal -->
<div class="modal-overlay" id="modal-overlay">
  <div class="modal" id="modal-body"></div>
</div>

<div class="toast" id="toast"></div>

<script>

/* =========================================================
   DATABASE (localStorage)
========================================================= */
const DB_KEY = 'ub_rukun_barokah_db_v1';
const SESSION_KEY = 'ub_rukun_barokah_session_v1';

function uid(prefix){ return (prefix||'id') + '_' + Math.random().toString(36).slice(2,9); }
function nowISO(){ return new Date().toISOString(); }
function rupiah(n){ n = Number(n)||0; return 'Rp' + n.toLocaleString('id-ID'); }
function fmtDate(iso){ const d = new Date(iso); return d.toLocaleDateString('id-ID',{day:'2-digit',month:'short',year:'numeric'}) + ' ' + d.toLocaleTimeString('id-ID',{hour:'2-digit',minute:'2-digit'}); }
function fmtDateShort(iso){ const d = new Date(iso); return d.toLocaleDateString('id-ID',{day:'2-digit',month:'short',year:'2-digit'}); }
function initials(name){ return (name||'?').split(' ').filter(Boolean).slice(0,2).map(w=>w[0]).join('').toUpperCase(); }

function loadDB(){
  let raw = localStorage.getItem(DB_KEY);
  if(!raw){ seedDB(); raw = localStorage.getItem(DB_KEY); }
  const db = JSON.parse(raw);
  if(!db.koperasi.aturKeuangan || db.koperasi.aturKeuangan.angsuranKeModal!==undefined){
    db.koperasi.aturKeuangan = {
      marginPersen: 20,
      pools: [
        {id:'operasional', label:'Operasional', persen:5},
        {id:'cadangan_resiko', label:'Cadangan Resiko', persen:5},
        {id:'bagi_hasil_tabungan', label:'Bagi Hasil Tabungan', persen:2},
        {id:'shu_saham', label:'SHU Saham', persen:2},
        {id:'cad_zakat', label:'Cad. Zakat', persen:2},
        {id:'dana_sosial', label:'Dana Sosial', persen:2},
        {id:'penyusutan', label:'Penyusutan', persen:2}
      ],
      dana: {operasional:0, cadangan_resiko:0, bagi_hasil_tabungan:0, shu_saham:0, cad_zakat:0, dana_sosial:0, penyusutan:0}
    };
  }
  if(!db.koperasi.aturKeuangan.dana){
    db.koperasi.aturKeuangan.dana = {operasional:0, cadangan_resiko:0, bagi_hasil_tabungan:0, shu_saham:0, cad_zakat:0, dana_sosial:0, penyusutan:0};
  }
  if(db.koperasi.aturKeuangan.marginMax===undefined){
    db.koperasi.aturKeuangan.marginMax = Math.max(30, db.koperasi.aturKeuangan.marginPersen||20);
  }
  if(!db.setoran) db.setoran = [];
  if(!db.koperasi.saham.jenis) db.koperasi.saham = { jenis: [
    {id:'s_A', nama:'SAHAM A', nominalPerLembar:100000, shuPersen:50},
    {id:'s_B', nama:'SAHAM B', nominalPerLembar:50000, shuPersen:30},
    {id:'s_C', nama:'SAHAM C', nominalPerLembar:25000, shuPersen:20}
  ]};
  (db.koperasi.saham.jenis||[]).forEach(j=>{ if(j.shuPersen===undefined) j.shuPersen=0; });
  const jenisMap = {jt_pokok:'jt_mudharabah', jt_wajib:'jt_wadiah', jt_sukarela:'jt_umroh'};
  ['tabunganAccounts','tabunganTx'].forEach(k=>{
    (db[k]||[]).forEach(x=>{
      if(x.jenisId && jenisMap[x.jenisId]) x.jenisId = jenisMap[x.jenisId];
    });
  });
  db.users.forEach(u=>{
    if(u.lembarSaham!==undefined && !u.saham){
      u.saham = {s_A:u.lembarSaham||0,s_B:0,s_C:0};
      delete u.lembarSaham;
    }
    if(!u.saham) u.saham = {s_A:0,s_B:0,s_C:0};
  });
  (db.pembiayaan||[]).forEach(p=>{ if(p.marginPersen===undefined) p.marginPersen = db.koperasi.aturKeuangan.marginPersen||20; });
  return db;
}

function persist(){ saveDB(DB); }

function addLog(aksi, detail){
  const s = getSession();
  DB.logs.unshift({id:uid('log'), waktu:nowISO(), oleh: s? s.userId : 'system', peran: s? s.role : '-', aksi, detail});
  persist();
}

/* =========================================================
   SESSION / AUTH
========================================================= */
function getSession(){
  const raw = sessionStorage.getItem(SESSION_KEY);
  return raw ? JSON.parse(raw) : null;
}
function setSession(user){
  sessionStorage.setItem(SESSION_KEY, JSON.stringify({userId:user.id, role:user.role}));
}
function clearSession(){ sessionStorage.removeItem(SESSION_KEY); }
function currentUser(){
  const s = getSession();
  if(!s) return null;
  return DB.users.find(u=>u.id===s.userId) || null;
}

function handleLogin(){
  try{
    const username = document.getElementById('login-username').value.trim();
    const password = document.getElementById('login-password').value;
    const errBox = document.getElementById('login-error');
    if(!DB || !Array.isArray(DB.users)){
      console.warn('DB tidak valid saat login, mencoba memuat ulang DB');
      DB = loadDB();
    }
    const user = (DB.users||[]).find(u=>u.username===username && u.password===password);
    if(!user){
      errBox.textContent = 'Nama pengguna atau kata sandi salah.';
      errBox.style.display = 'block';
      return;
    }
  if(user.status==='nonaktif'){
    errBox.textContent = 'Akun ini telah dinonaktifkan. Hubungi administrator.';
    errBox.style.display = 'block';
    return;
  }
  errBox.style.display = 'none';
    setSession(user);
    addLog('Masuk aplikasi', user.nama + ' (' + user.role + ') masuk ke aplikasi');
    boot();
  }catch(err){
    console.error('Error saat proses login:', err);
    const errBox = document.getElementById('login-error');
    errBox.textContent = 'Terjadi kesalahan saat login. Cek konsol untuk detail.';
    errBox.style.display = 'block';
  }
}
function handleLogout(){
  const u = currentUser();
  if(u) addLog('Keluar aplikasi', u.nama + ' keluar dari aplikasi');
  clearSession();
  document.getElementById('login-username').value='';
  document.getElementById('login-password').value='';
  boot();
}

let currentPage = 'beranda';
let currentSubState = {}; // scratch state for detail views

function go(page, sub){
  currentPage = page;
  currentSubState = sub || {};
  renderContent();
  renderNav();
}

/* =========================================================
   BOOT / RENDER SHELL
========================================================= */
function applyKoperasiBranding(){
  document.getElementById('login-koperasi-name').textContent = DB.koperasi.nama;
  document.getElementById('header-koperasi-name').textContent = DB.koperasi.nama;
  document.title = DB.koperasi.nama;
  const loginIcon = document.getElementById('login-icon');
  const headerIcon = document.getElementById('header-icon');
  if(DB.koperasi.iconImage){
    loginIcon.innerHTML = '<img src="'+DB.koperasi.iconImage+'" alt="logo" style="width:100%;height:100%;object-fit:cover;border-radius:inherit;">';
    headerIcon.innerHTML = '<img src="'+DB.koperasi.iconImage+'" alt="logo" style="width:100%;height:100%;object-fit:cover;border-radius:inherit;">';
  } else {
    loginIcon.textContent = DB.koperasi.icon;
    headerIcon.textContent = DB.koperasi.icon;
  }
}

function boot(){
  applyKoperasiBranding();
  const user = currentUser();
  if(!user){
    document.getElementById('login-screen').style.display='flex';
    document.getElementById('app-screen').style.display='none';
    return;
  }
  document.getElementById('login-screen').style.display='none';
  document.getElementById('app-screen').style.display='flex';
  document.getElementById('header-role').textContent = roleLabel(user.role);
  currentPage = defaultPageFor(user.role);
  currentSubState = {};
  renderNav();
  renderContent();
}
function roleLabel(r){ return r==='admin'?'Administrator':(r==='koordinator'?'Koordinator':'Nasabah'); }
function defaultPageFor(role){
  if(role==='admin') return 'admin_beranda';
  if(role==='koordinator') return 'koor_beranda';
  return 'nas_tabungan';
}

/* =========================================================
   BOTTOM NAV (koordinator & nasabah)
========================================================= */
function renderNav(){
  const user = currentUser();
  const nav = document.getElementById('bottom-nav');
  if(!user) return;
  nav.style.display='flex';
  let items = [];
  if(user.role==='admin'){
    items = [
      {p:'admin_beranda', ic:'home', label:'Beranda'},
      {p:'admin_tabungan', ic:'wallet', label:'Tabungan'},
      {p:'admin_pembiayaan', ic:'finance', label:'Pembiayaan'},
      {p:'admin_pengaturan', ic:'settings', label:'Pengaturan'},
      {p:'_more'}
    ];
  } else if(user.role==='koordinator'){
    items = [
      {p:'koor_beranda', ic:'home', label:'Beranda'},
      {p:'koor_anggota', ic:'users', label:'Anggota'},
      {p:'koor_tabungan', ic:'wallet', label:'Tabungan'},
      {p:'koor_pembiayaan', ic:'finance', label:'Pembiayaan'}
    ];
  } else {
    items = [
      {p:'nas_tabungan', ic:'book', label:'Tabungan'},
      {p:'nas_pembiayaan', ic:'finance', label:'Pembiayaan'}
    ];
  }
  nav.innerHTML = items.map(it=>{
    const active = currentPage===it.p;
    if(it.p==='_more'){
      return '<button class="'+(active?'active':'')+'" onclick="openMoreMenu()"><span class="ic"><svg width="16"height="16"viewBox="0 0 24 24"fill="none"stroke="currentColor"stroke-width="2.4"stroke-linecap="round"><circle cx="12"cy="5"r="1.5"/><circle cx="12"cy="12"r="1.5"/><circle cx="12"cy="19"r="1.5"/></svg></span>Lainnya</button>';
    }
    return '<button class="'+(active?'active':'')+'" onclick="go(\''+it.p+'\')"><span class="ic">'+ICONS[it.ic]+'</span>'+it.label+'</button>';
  }).join('');
}
function openMoreMenu(){
  const items = [
    {p:'admin_anggota', ic:'users', label:'Anggota'},

    {p:'admin_saham', ic:'coin', label:'Saham'},

========================================================= */
function toast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 2200);
}

/* =========================================================
   MODAL HELPERS
========================================================= */
function openModal(html){
  document.getElementById('modal-body').innerHTML = html;
  document.getElementById('modal-overlay').classList.add('show');
}
function closeModal(){ document.getElementById('modal-overlay').classList.remove('show'); }
document.getElementById('modal-overlay').addEventListener('click', (e)=>{
  if(e.target.id==='modal-overlay') closeModal();
});

function confirmDialog(msg, sub, type, onConfirm, btnLabel){
  const overlay = document.createElement('div');
  overlay.className = 'confirm-overlay show';
  overlay.innerHTML = `
    <div class="confirm-box">
      <div class="icon ${type||'danger'}">
        ${type==='warning'?'<svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M12 8v4"/><path d="M12 16h0"/></svg>':'<svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18"/><path d="M8 6V4a1 1 0 0 1 1-1h6a1 1 0 0 1 1 1v2"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M5 6l1 14a2 2 0 0 0 2 2h8a2 2 0 0 0 2-2l1-14"/></svg>'}
      </div>
      <div class="msg"><b>${msg}</b>${sub?'<span style="color:var(--muted);font-size:13px;">'+sub+'</span>':''}</div>
      <div class="confirm-actions">
        <button class="btn btn-outline" id="confirm-batal">Batal</button>
        <button class="btn ${type==='warning'?'btn-gold':'btn-danger'}" id="confirm-ya">${btnLabel||(type==='warning'?'Ya, aktifkan':'Ya, hapus')}</button>
      </div>
    </div>
  `;
  document.body.appendChild(overlay);
  document.getElementById('confirm-batal').onclick = ()=>{ overlay.remove(); };
  document.getElementById('confirm-ya').onclick = ()=>{ overlay.remove(); onConfirm(); };
  overlay.onclick = (e)=>{ if(e.target===overlay) overlay.remove(); };
}

function userAccounts(userId){
  return DB.tabunganAccounts
    .filter(a=>a.userId===userId)
    .map(a=>({acc:a, j: DB.koperasi.jenisTabungan.find(j=>j.id===a.jenisId)}))
    .filter(x=>x.j);
}
function jenisBelumDibuka(userId){
  const opened = DB.tabunganAccounts.filter(a=>a.userId===userId).map(a=>a.jenisId);
  return DB.koperasi.jenisTabungan.filter(j=>!opened.includes(j.id));
}
function nextAccNo(){
  const max = DB.tabunganAccounts.reduce((m,a)=>{
    const n = parseInt((a.noRekening||'0').split('-').pop(), 10);
    return n>m ? n : m;
  }, 0);
  return '2026-'+String(10001+max).slice(-5);
}
function getAccount(userId, jenisId){
  let acc = DB.tabunganAccounts.find(a=>a.userId===userId && a.jenisId===jenisId);
  if(!acc){ acc = {id:uid('acc'), userId, jenisId, saldo:0, noRekening:nextAccNo()}; DB.tabunganAccounts.push(acc); }
  if(!acc.noRekening) acc.noRekening = nextAccNo();
  return acc;
}

  const user = userById(userId);
  if(!user) return;
  const jml = DB.tabunganAccounts.filter(a=>a.userId===userId).length;
  if(!jml) return;
  confirmDialog('Hapus semua rekening?', 'Semua rekening tabungan milik ' + user.nama + ' (' + jml + ' rekening) beserta transaksinya akan dihapus.', 'danger', ()=>{

function doSetor(userId, jenisId, jumlah, keterangan){
  const acc = getAccount(userId, jenisId);
  acc.saldo += jumlah;
  const s = getSession();
  DB.tabunganTx.push({id:uid('tx'), userId, jenisId, tipe:'setor', jumlah, saldoSetelah:acc.saldo, tanggal:nowISO(), oleh:s.userId, keterangan: keterangan||'Setoran tunai'});
  persist();
  addLog('Setor tabungan', userById(userId).nama + ' - ' + jenisName(jenisId) + ' - ' + rupiah(jumlah));
}
function doSetorKoordinator(userId, jenisId, jumlah, keterangan){
  const s = getSession();
  doSetor(userId, jenisId, jumlah, keterangan);
  DB.setoran.push({id:uid('st'), userId, jenisId, jumlah, keterangan: keterangan||'Setoran tunai', tanggal:nowISO(), dibuatOleh:s.userId, status:'di_koordinator'});
  persist();
}
function confirmSetoran(setoranId){
  const st = DB.setoran.find(s=>s.id===setoranId);
  if(!st || st.status!=='di_koordinator') return {ok:false, msg:'Setoran tidak ditemukan atau sudah dikonfirmasi.'};
  const s = getSession();
  if(s.role!=='admin') return {ok:false, msg:'Hanya admin yang bisa konfirmasi setoran.'};
  st.status = 'sudah_di_admin';
  st.dikonfirmasiOleh = s.userId;
  st.waktuKonfirmasi = nowISO();
  persist();
  if(st.jenis==='angsuran'){
    addLog('Terima angsuran dari koordinator', rupiah(st.jumlah)+' - '+userById(st.userId).nama+' (Angsuran ke-...)');
  } else {
    addLog('Terima setoran dari koordinator', rupiah(st.jumlah)+' - '+userById(st.userId).nama+' ('+jenisName(st.jenisId)+')');
  }
  return {ok:true};
}
function doTarik(userId, jenisId, jumlah, keterangan){
  const acc = getAccount(userId, jenisId);
  if(acc.saldo < jumlah) return {ok:false, msg:'Saldo tidak mencukupi.'};
  acc.saldo -= jumlah;
  const s = getSession();
  DB.tabunganTx.push({id:uid('tx'), userId, jenisId, tipe:'tarik', jumlah, saldoSetelah:acc.saldo, tanggal:nowISO(), oleh:s.userId, keterangan: keterangan||'Penarikan tunai'});
  persist();
  addLog('Tarik tabungan', userById(userId).nama + ' - ' + jenisName(jenisId) + ' - ' + rupiah(jumlah));
  return {ok:true};
}
function doBayarAngsuran(pembId, oleh){
  const p = DB.pembiayaan.find(p=>p.id===pembId);
  if(!p || p.status==='lunas') return {ok:false, msg:'Pembiayaan tidak ditemukan atau sudah lunas.'};
  const angsuranKe = p.tenor - p.sisaAngsuran + 1;
  p.riwayatAngsuran.push({id:uid('ang'), tanggal:nowISO(), jumlah:p.angsuranPerBulan, oleh, angsuranKe});
  p.sisaAngsuran--;
  if(p.sisaAngsuran<=0) p.status='lunas';
  DB.setoran.push({id:uid('st'), userId:p.userId, jenis:'angsuran', pembiayaanId:p.id, jumlah:p.angsuranPerBulan, keterangan:'Angsuran ke-'+angsuranKe, tanggal:nowISO(), dibuatOleh:oleh, status:'di_koordinator'});
  const atur = DB.koperasi.aturKeuangan;
  if(atur && atur.pools && atur.dana && p.marginPersen){
    const marginPerAngsuran = Math.round(p.jumlahPinjaman * p.marginPersen / 100 / p.tenor);
    atur.pools.forEach(pool=>{
      const alokasi = Math.round(marginPerAngsuran * pool.persen / atur.marginPersen);
      atur.dana[pool.id] = (atur.dana[pool.id]||0) + alokasi;
    });
  }
  persist();
  addLog('Bayar angsuran', userById(p.userId).nama + ' - Angsuran ke-'+angsuranKe+' - '+rupiah(p.angsuranPerBulan));
  return {ok:true};
}

function refreshTxPassbook(userId){
  const accs = userAccounts(userId);

    box.innerHTML = `<div class="hint">Anggota ini belum memiliki rekening tabungan. Buka rekening dulu lewat "Tambah Rekening".</div>`;
    document.getElementById('tx-jenis-selected').value = '';

  box.innerHTML = accs.map(({j,acc},idx)=>`

function selectTxJenis(jenisId){
  document.getElementById('tx-jenis-selected').value = jenisId;
  document.querySelectorAll('.tx-acc-row').forEach(el=>{
    el.classList.toggle('selected', el.dataset.jenis===jenisId);
  });
}
function submitTx(tipe){
  const forcedEl = document.getElementById('tx-user-forced');
  const userId = forcedEl ? forcedEl.value : document.getElementById('tx-user').value;
  const jenisId = document.getElementById('tx-jenis-selected').value;
  const jumlah = Number(document.getElementById('tx-jumlah').value);
  const ket = document.getElementById('tx-ket').value;
  if(!jenisId){ toast('Pilih rekening tabungan terlebih dahulu'); return; }
  if(!jumlah || jumlah<=0){ toast('Masukkan jumlah yang valid'); return; }
  const s = getSession();
  if(tipe==='setor'){
    if(s.role==='koordinator'){
      doSetorKoordinator(userId, jenisId, jumlah, ket);
      toast('Setoran dicatat, menunggu konfirmasi admin');
    } else {
      doSetor(userId, jenisId, jumlah, ket);
      toast('Setoran berhasil dicatat');
    }
  } else {
    const r = doTarik(userId, jenisId, jumlah, ket);
    if(!r.ok){ toast(r.msg); return; }
    toast('Penarikan berhasil dicatat');
  }
  closeModal();
  renderContent();
}

function openPengajuanModal(){

  openModal(`

      <input type="number" id="pemb-margin" value="${mMin}" min="${mMin}" max="${mMax}" step="0.5" oninput="updatePengajuanPreview()">
    </div>
    <div class="hint" id="pemb-preview">Angsuran per bulan dihitung otomatis: (pokok + margin) &divide; tenor.</div>
    <div class="modal-actions">
      <button class="btn btn-outline" onclick="closeModal()">Batal</button>
      <button class="btn btn-primary" onclick="submitPengajuan()">Ajukan</button>
    </div>
  `);
}
function updatePengajuanPreview(){
  const atur = DB.koperasi.aturKeuangan||{};
  const mMin = atur.marginPersen||20, mMax = atur.marginMax||30;
  const jumlah = Number(document.getElementById('pemb-jumlah').value)||0;
  const tenor = Number(document.getElementById('pemb-tenor').value)||0;
  let margin = Number(document.getElementById('pemb-margin').value)||mMin;
  const el = document.getElementById('pemb-preview');
  if(margin < mMin || margin > mMax){
    el.innerHTML = '<span style="color:var(--danger);">Margin harus antara '+mMin+'%&ndash;'+mMax+'%.</span>';
    return;
  }
  if(!jumlah || !tenor){
    el.textContent = 'Angsuran per bulan dihitung otomatis: (pokok + margin) ÷ tenor.';
    return;
  }
  const total = jumlah + Math.round(jumlah*margin/100);
  const angsuran = Math.ceil(total/tenor/1000)*1000;
  el.innerHTML = 'Margin '+margin+'% &middot; Total kewajiban '+rupiah(total)+' &middot; Estimasi angsuran <b>'+rupiah(angsuran)+'</b>/bulan.';
}
function submitPengajuan(){
  const userId = document.getElementById('pemb-user').value;
  const jumlah = Number(document.getElementById('pemb-jumlah').value);
  const tenor = Number(document.getElementById('pemb-tenor').value);
  const atur = DB.koperasi.aturKeuangan||{};
  const mMin = atur.marginPersen||20, mMax = atur.marginMax||30;
  const mp = Number(document.getElementById('pemb-margin').value)||mMin;
  if(!jumlah || !tenor){ toast('Lengkapi jumlah dan tenor'); return; }
  if(mp < mMin || mp > mMax){ toast('Margin harus antara '+mMin+'%-'+mMax+'%'); return; }
  const total = jumlah + Math.round(jumlah*mp/100);
  const p = {id:uid('pemb'), userId, jumlahPinjaman:jumlah, tenor, marginPersen:mp, angsuranPerBulan: Math.ceil(total/tenor/1000)*1000, mulai: nowISO(), sisaAngsuran:tenor, status:'berjalan', riwayatAngsuran:[]};
  DB.pembiayaan.push(p);
  persist();
  addLog('Buat pengajuan pembiayaan', userById(userId).nama + ' - ' + rupiah(jumlah) + ' / ' + tenor + ' bulan (margin '+mp+'%)');
  toast('Pengajuan berhasil dibuat');
  closeModal();
  renderContent();
}

  const password = document.getElementById('um-password').value;
  const role = document.getElementById('um-role').value;

let _pendingIconImage = null;
function handleIconFileChange(ev){
  const file = ev.target.files && ev.target.files[0];
  if(!file) return;
  if(file.type !== 'image/png'){ toast('File harus berformat .png'); ev.target.value=''; return; }
  if(file.size > 1024*1024){ toast('Ukuran file maksimal 1MB'); ev.target.value=''; return; }
  const reader = new FileReader();
  reader.onload = function(e){
    _pendingIconImage = e.target.result;
    document.getElementById('set-icon-preview').innerHTML = '<img src="'+_pendingIconImage+'" alt="logo" style="width:100%;height:100%;object-fit:cover;">';
  };
  reader.readAsDataURL(file);
}

function saveProfilKoperasi(){
  DB.koperasi.nama = document.getElementById('set-nama').value.trim() || DB.koperasi.nama;
  if(_pendingIconImage){
    DB.koperasi.iconImage = _pendingIconImage;
    _pendingIconImage = null;
  }
  persist();
  applyKoperasiBranding();
  addLog('Ubah pengaturan', 'Memperbarui profil koperasi');
  toast('Profil koperasi disimpan');
  renderContent();
}
function simpanAturKeuangan(){
  const marginPersen = Math.max(0, parseFloat(document.getElementById('atur-margin').value)||0);
  const marginMax = Math.max(0, parseFloat(document.getElementById('atur-margin-max').value)||0);
  if(marginMax < marginPersen){ toast('Margin maksimum tidak boleh lebih kecil dari margin minimum'); return; }
  const pools = (DB.koperasi.aturKeuangan.pools||[]).map(p=>({...p, persen: Math.max(0, parseFloat(document.getElementById('pool-'+p.id).value)||0)}));
  const total = pools.reduce((s,p)=>s+p.persen,0);
  if(Math.abs(total-marginPersen)>0.01){ toast('Total alokasi pool harus = margin minimum ('+marginPersen+'%)'); return; }
  if(!DB.koperasi.aturKeuangan) DB.koperasi.aturKeuangan = {};
  DB.koperasi.aturKeuangan.marginPersen = marginPersen;
  DB.koperasi.aturKeuangan.marginMax = marginMax;
  DB.koperasi.aturKeuangan.pools = pools;
  if(!DB.koperasi.aturKeuangan.dana) DB.koperasi.aturKeuangan.dana = {};
  persist();
  addLog('Atur keuangan', 'Memperbarui margin (min-maks) dan alokasi pool');
  toast('Aturan keuangan disimpan');
  renderContent();
}

  html += '<button class="'+(tab==='daftar'?'active':'')+'" onclick="go(\'admin_saham\',{sahamTab:\'daftar\'})">Kepemilikan</button>';
  html += '<button class="'+(tab==='jenis'?'active':'')+'" onclick="go(\'admin_saham\',{sahamTab:\'jenis\'})">Jenis Saham</button>';

    html += '<div class="card" style="padding:6px 18px;">';
    nasabah.forEach((u,i)=>{
      const sh = u.saham||{};
      let total = 0; jns.forEach(j=>{ total += (sh[j.id]||0)*j.nominalPerLembar; });
      let subParts = jns.map(j=>j.nama+': '+(sh[j.id]||0)).join(' &middot; ');
      html += '<div class="list-row"'+(i>0?' style="border-top:1px dashed var(--border);':'')+'"><div class="info"><div class="title">'+u.nama+'</div><div class="sub">'+subParts+'</div></div><div style="display:flex;align-items:center;gap:6px;"><div class="amt mono">'+rupiah(total)+'</div><button class="icon-btn-sm" style="width:26px;height:26px;border-radius:6px;background:var(--primary-soft);color:var(--primary);font-size:14px;" onclick="editSaham(\''+u.id+'\')">✎</button></div></div>';
    });
    html += '</div>';
  } else {
    html += '<div class="section-label">Daftar jenis saham</div>';
    html += '<div class="card" style="padding:6px 18px;">';
    jns.forEach((j,i)=>{
      html += '<div class="list-row"'+(i>0?' style="border-top:1px dashed var(--border);':'')+'><div class="info"><div class="title">'+j.nama+'</div><div class="sub">'+rupiah(j.nominalPerLembar)+' / lembar</div></div><div style="display:flex;align-items:center;gap:4px;"><span class="sub">SHU:</span><input type="number" id="shuPersen-'+j.id+'" value="'+j.shuPersen+'" min="0" max="100" style="width:55px;padding:2px 4px;border-radius:4px;border:1px solid var(--border);text-align:center;font-size:12px;"><span class="sub">%</span></div></div>';
    });
    html += '</div><button class="btn btn-primary btn-sm" style="margin-top:8px;" onclick="simpanShuPersenSemua()">💾 Simpan % SHU</button>';

function editSaham(userId){
  const u = userById(userId);
  if(!u) return;
  const jns = DB.koperasi.saham.jenis||[];
  openModal(`
    <h3>Edit Saham: ${u.nama}</h3>
    ${jns.map(j=>`
      <div class="form-row"><label>${j.nama} (${rupiah(j.nominalPerLembar)}/lbr)</label><input type="number" id="saham-${j.id}" value="${(u.saham&&u.saham[j.id])||0}" min="0" step="1"></div>
    `).join('')}
    <div class="modal-actions">
      <button class="btn btn-outline" onclick="closeModal()">Batal</button>
      <button class="btn btn-primary" onclick="simpanSaham('${userId}')">Simpan</button>
    </div>
  `);
}
function simpanSaham(userId){
  const u = userById(userId);
  if(!u) return;
  if(!u.saham) u.saham = {};
  (DB.koperasi.saham.jenis||[]).forEach(j=>{
    u.saham[j.id] = Math.max(0, parseInt(document.getElementById('saham-'+j.id).value)||0);
  });
  persist();
  addLog('Ubah saham', 'Memperbarui saham ' + u.nama);
  toast('Saham berhasil diperbarui');
  closeModal();
  renderContent();
}
function simpanShuPersenSemua(){
  let total = 0;
  (DB.koperasi.saham.jenis||[]).forEach(j=>{
    const v = Math.max(0, parseFloat(document.getElementById('shuPersen-'+j.id).value)||0);
    j.shuPersen = v;
    total += v;
  });
  if(total>100){ toast('Total % SHU melebihi 100%'); return; }
  persist();
  addLog('Atur % SHU', 'Memperbarui persentase SHU saham');
  toast('Persentase SHU saham berhasil disimpan');
  renderContent();
}

/* =========================================================
   ADMIN: SHU
========================================================= */
function renderAdminSHU(user){
  const atur = DB.koperasi.aturKeuangan || {};
  const dana = atur.dana || {};
  const pools = atur.pools || [];
  const nasabah = DB.users.filter(u=>u.role==='nasabah');
  const jns = DB.koperasi.saham.jenis||[];
  const totalMudharabah = DB.tabunganAccounts.filter(a=>a.jenisId==='jt_mudharabah').reduce((s,a)=>s+a.saldo,0);
  const poolBHT = dana.bagi_hasil_tabungan||0;
  const poolSHUSaham = dana.shu_saham||0;
  let html = '';
  html += '<div class="page-title">SHU<span class="sub">Sisa Hasil Usaha</span></div>';
  html += '<div class="stat-grid">';
  html += '<div class="stat-box"><div class="n">'+rupiah(poolBHT)+'</div><div class="l">Pool Bagi Hasil Tabungan</div></div>';
  html += '<div class="stat-box"><div class="n">'+rupiah(poolSHUSaham)+'</div><div class="l">Pool SHU Saham</div></div>';
  html += '</div>';

  html += '<div class="section-label">Distribusi SHU Tabungan (Mudharabah)</div>';
  html += '<div class="card" style="padding:12px 18px;"><div class="list-row"><div class="info"><div class="title">Total pool bagi hasil</div></div><div class="amt mono">'+rupiah(poolBHT)+'</div></div><div class="list-row"><div class="info"><div class="title">Saldo Mudharabah</div></div><div class="amt mono">'+rupiah(totalMudharabah)+'</div></div><div class="list-row"><div class="info"><div class="title">Pemilik</div></div><div class="amt">'+DB.tabunganAccounts.filter(a=>a.jenisId==='jt_mudharabah'&&a.saldo>0).length+' orang</div></div></div>';

  html += '<div class="card" style="padding:6px 18px;">';
  var m = nasabah.filter(function(u){ var a=DB.tabunganAccounts.find(function(ac){ return ac.userId===u.id&&ac.jenisId==='jt_mudharabah'; }); return a&&a.saldo>0; });
  for(var i=0;i<m.length;i++){
    var u=m[i], acc=DB.tabunganAccounts.find(function(a){ return a.userId===u.id&&a.jenisId==='jt_mudharabah'; });
    if(!acc) continue;
    var porsi = totalMudharabah>0 ? acc.saldo/totalMudharabah*100 : 0;
    var shu = poolBHT * porsi/100;
    var borderStyle = i>0 ? ' style="border-top:1px dashed var(--border);"' : '';
    html += '<div class="list-row"'+borderStyle+'><div class="info"><div class="title">'+u.nama+'</div><div class="sub">Saldo '+rupiah(acc.saldo)+' &middot; '+porsi.toFixed(1)+'%</div></div><div class="amt mono">'+rupiah(shu)+'</div></div>';
  }
  if(!m.length) html += '<div class="hint" style="padding:10px;text-align:center;">Belum ada saldo Mudharabah</div>';
  html += '</div>';

  html += '<div class="section-label" style="margin-top:18px;">Distribusi SHU Saham</div>';
  html += '<div class="card" style="padding:12px 18px;"><div class="list-row"><div class="info"><div class="title">Total pool SHU saham</div></div><div class="amt mono">'+rupiah(poolSHUSaham)+'</div></div></div>';

  var totalSemuaNilai = 0;
  jns.forEach(function(j){ nasabah.forEach(function(u){ var sh=u.saham||{}; totalSemuaNilai += (sh[j.id]||0)*j.nominalPerLembar; }); });

  jns.forEach(function(j){
    var totalLembar = 0, totalNilai = 0;
    var owners = [];
    nasabah.forEach(function(u){
      var sh=u.saham||{}, lembar=sh[j.id]||0;
      if(lembar>0){ totalLembar+=lembar; totalNilai+=lembar*j.nominalPerLembar; owners.push(u); }
    });
    if(!totalLembar) return;
    var alokasiJenis = totalSemuaNilai>0 ? poolSHUSaham * totalNilai / totalSemuaNilai : 0;
    html += '<div class="card" style="padding:12px 18px;margin-top:8px;"><div class="list-row"><div class="info"><div class="title">'+j.nama+'</div><div class="sub">'+totalLembar+' lembar &middot; '+rupiah(totalNilai)+'</div></div><div class="amt mono">'+rupiah(alokasiJenis)+'</div></div>';
    owners.forEach(function(u,i2){
      var sh=u.saham||{}, lembar=sh[j.id]||0, nilai=lembar*j.nominalPerLembar;
      var porsi = totalLembar>0 ? lembar/totalLembar*100 : 0;
      var shu = totalSemuaNilai>0 ? poolSHUSaham*nilai/totalSemuaNilai : 0;
      html += '<div class="list-row"'+(i2>0?' style="border-top:1px dashed var(--border);':'')+'"><div class="info"><div class="title">'+u.nama+'</div><div class="sub">'+lembar+' lembar &middot; '+porsi.toFixed(1)+'%</div></div><div class="amt mono" style="font-size:13px;">'+rupiah(shu)+'</div></div>';
    });
    html += '</div>';
  });
  if(!jns.some(function(j){ return nasabah.some(function(u){ return (u.saham||{})[j.id]>0; }); }))
    html += '<div class="hint" style="padding:10px;text-align:center;">Tidak ada pemilik saham</div>';

  html += '<div class="section-label" style="margin-top:18px;">Ringkasan Semua Pool Dana</div><div class="card" style="padding:6px 18px;">';
  pools.forEach(function(p){ html += '<div class="list-row"><div class="info"><div class="title">'+p.label+'</div></div><div class="amt mono">'+rupiah(dana[p.id]||0)+'</div></div>'; });
  html += '</div>';
  html += '<button class="btn btn-outline btn-block" style="margin-top:14px;" onclick="cetakSHU()">🖨 Cetak Daftar SHU</button>';
  return html;
}
function cetakSHU(){
  const w = window.open('', '_blank');
  if(!w){ toast('Izinkan pop-up untuk mencetak'); return; }
  const css = Array.from(document.styleSheets).reduce((a,s)=>{ try{ const r=s.cssRules||s.rules; if(r)for(let i=0;i<r.length;i++)a+=r[i].cssText; }catch(e){} return a; },'');
  w.document.write('<html><head><title>SHU '+DB.koperasi.nama+'</title><style>'+css+'body{padding:20px;font-family:sans-serif;}@media print{body{padding:0;}}.list-row{border-bottom:1px solid #eee;padding:5px 0;}.card{border:1px solid #ddd;padding:10px;border-radius:6px;margin-bottom:10px;}.section-label{font-weight:700;margin:14px 0 6px;font-size:16px;}.amt{text-align:right;}.list-row{display:flex;justify-content:space-between;align-items:center;}.flex-between{display:flex;justify-content:space-between;}@page{margin:15mm;}.no-print{display:none!important;}</style></head><body>'+document.getElementById('content').innerHTML.replace(/<button[^>]*>[^<]*<\/button>/g,'')+'</body></html>');
  w.document.close();
  setTimeout(()=>{ w.print(); w.close(); }, 500);
}

function renderKoorPembiayaan(user){
  const anggota = nasabahOfKelompok(user.kelompokId);
  const anggotaIds = anggota.map(u=>u.id);
  const list = DB.pembiayaan.filter(p=>anggotaIds.includes(p.userId)).sort((a,b)=>new Date(b.mulai)-new Date(a.mulai));
  return `
    <div class="page-title">Pembiayaan<span class="sub">Anggota ${kelompokName(user.kelompokId)}</span></div>

          ${p.status==='lunas'
            ? `<span class="badge badge-green">Lunas</span>`
            : `<button class="btn btn-gold btn-sm" onclick="bayarAngsuranPrompt('${p.id}')">Bayar angsuran</button>`}
        </div>
      `).join('') : emptyRow('Tidak ada pembiayaan di kelompok ini')}
    </div>
  `;

function bayarAngsuranPrompt(pembId){
  const p = DB.pembiayaan.find(p=>p.id===pembId);
  const angsuranKe = p.tenor - p.sisaAngsuran + 1;
  openModal(`
    <h3>Bayar Angsuran</h3>
    <div class="card" style="margin-bottom:14px;">
      <div class="list-row"><div class="info"><div class="title">${userById(p.userId).nama}</div><div class="sub">Angsuran ke-${angsuranKe} dari ${p.tenor}</div></div><div class="amt">${rupiah(p.angsuranPerBulan)}</div></div>
    </div>
    <div class="modal-actions">
      <button class="btn btn-outline" onclick="closeModal()">Batal</button>
      <button class="btn btn-primary" onclick="confirmBayarAngsuran('${p.id}')">Konfirmasi bayar</button>
    </div>
  `);
}
function confirmBayarAngsuran(pembId){
  const s = getSession();
  const r = doBayarAngsuran(pembId, s.userId);
  if(!r.ok){ toast(r.msg); return; }
  toast('Angsuran berhasil dicatat');
  closeModal();
  renderContent();
}

  koor_anggota_detail: (u)=>renderKoorAnggotaDetail(u, currentSubState.userId),
  koor_tabungan_detail: (u)=>renderKoorTabunganDetail(u, currentSubState.userId)
};
const _origRouter = renderContent;
renderContent = function(){
  const el = document.getElementById('content');
  const user = currentUser();
  if(!user) return;
  if(_routerExtras[currentPage]){
    el.innerHTML = _routerExtras[currentPage](user);
    el.scrollTop = 0;
    return;
  }
  _origRouter();
};

boot();
