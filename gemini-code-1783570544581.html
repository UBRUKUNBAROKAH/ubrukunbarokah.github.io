<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Background Putih & Hijau Tua Bergerak</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #0f172a; /* Warna teks gelap yang tegas */
            
            /* Warna dasar putih bersih */
            background-color: #f8fafc; 
            
            /* Pendaran cahaya menggunakan kombinasi hijau tua */
            background-image: 
                radial-gradient(circle at 15% 25%, rgba(20, 83, 45, 0.22) 0%, transparent 65%),  /* Hijau hutan tua */
                radial-gradient(circle at 85% 75%, rgba(11, 62, 34, 0.18) 0%, transparent 65%);  /* Hijau emerald pekat */
            
            background-size: 140% 140%;
            animation: gerakCahaya 12s ease infinite alternate;
        }

        /* Animasi gerakan cahaya latar belakang */
        @keyframes gerakCahaya {
            0% {
                background-position: 0% 0%;
            }
            50% {
                background-position: 50% 100%;
            }
            100% {
                background-position: 100% 0%;
            }
        }

        /* Kotak Konten */
        .container {
            text-align: center;
            padding: 2.5rem;
            background: rgba(255, 255, 255, 0.5);
            border: 1px solid rgba(20, 83, 45, 0.15);
            border-radius: 24px;
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            box-shadow: 0 20px 40px rgba(20, 83, 45, 0.05);
            max-width: 450px;
            width: 90%;
        }

        h1 {
            font-size: 2.2rem;
            margin-bottom: 1rem;
            /* Gradasi teks menggunakan kombinasi hijau tua ke hijau medium */
            background: linear-gradient(45deg, #064e3b, #15803d);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p {
            color: #334155;
            line-height: 1.6;
            font-size: 1rem;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Nuansa Hijau Tua</h1>
        <p>Latar belakang putih dengan pendaran cahaya hijau tua yang bergerak lambat, memberikan kesan yang lebih formal, tenang, dan premium.</p>
    </div>

</body>
</html>
