<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Background Cahaya Hijau Tua Tebal</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #062f1d; /* Warna teks hijau sangat tua */
            
            /* Latar belakang putih bersih */
            background-color: #ffffff; 
            
            /* Pendaran cahaya hijau yang DIBUAT JAUH LEBIH TEBAL (Opasitas 75% - 85%) dan besar (70%) */
            background-image: 
                radial-gradient(circle at 10% 15%, rgba(16, 185, 129, 0.85) 0%, rgba(4, 120, 87, 0.75) 30%, transparent 70%),
                radial-gradient(circle at 90% 85%, rgba(5, 150, 105, 0.85) 0%, rgba(6, 78, 59, 0.8) 35%, transparent 70%);
            
            background-size: 160% 160%;
            animation: gerakCahaya 14s ease-in-out infinite alternate;
        }

        /* Animasi gerakan cahaya besar dan tebal */
        @keyframes gerakCahaya {
            0% {
                background-position: 0% 10%;
            }
            50% {
                background-position: 100% 90%;
            }
            100% {
                background-position: 20% 100%;
            }
        }

        /* Kotak Konten (Efek Kaca Transparan / Glassmorphism) */
        .container {
            text-align: center;
            padding: 3rem 2.5rem;
            /* Efek blur kaca agar teks tetap terbaca jelas di atas cahaya tebal */
            background: rgba(255, 255, 255, 0.65);
            border: 1px solid rgba(255, 255, 255, 0.5);
            border-radius: 28px;
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            box-shadow: 0 30px 60px rgba(4, 120, 87, 0.15);
            max-width: 500px;
            width: 90%;
        }

        h1 {
            font-size: 2.2rem;
            font-weight: 800;
            margin-bottom: 1rem;
            letter-spacing: -0.5px;
            color: #064e3b; /* Hijau hutan pekat */
        }

        p {
            color: #154734;
            line-height: 1.6;
            font-size: 1.05rem;
            font-weight: 500;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>NUANSA HIJAU TEGAS</h1>
        <p>Cahaya hijau tua dibuat lebih padat dan terlihat jelas, mendominasi latar putih cerah dengan pendaran yang ekspresif dan dinamis.</p>
    </div>

</body>
</html>
