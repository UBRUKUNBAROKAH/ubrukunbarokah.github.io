<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="manifest" href="manifest.json">
<title>UB Rukun Barokah</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700;800&family=Plus+Jakarta+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&family=Playfair+Display:ital,wght@0,600;0,700;0,800;1,600;1,700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
:root{
  --bg:#F1F6F0;
  --surface:#FFFFFF;
  --primary:#0B3D2E;
  --primary-2:#124F3C;
  --primary-soft:#E4EEE6;
  --gold:#B98F33;
  --gold-soft:#F1E3C2;
  --text:#182620;
  --muted:#5C6E64;
  --border:#DEE7DD;
  --danger:#B3402A;
  --danger-soft:#F7E4DE;
  --ok:#2E7D4F;
  --info:#2E6F8E;
  --info-soft:#DCEAF0;
  --radius-lg:20px;
  --radius-md:14px;
  --radius-sm:10px;
  --shadow: 0 8px 24px -12px rgba(11,61,46,.25);
}
*{box-sizing:border-box;}
html,body{margin:0;padding:0;}
body{
  font-family:'Plus Jakarta Sans', sans-serif;
  background:var(--bg);
  color:var(--text);
  min-height:100vh;
  -webkit-font-smoothing:antialiased;
}
h1,h2,h3,.display{font-family:'Sora',sans-serif;}
.mono{font-family:'IBM Plex Mono',monospace;font-variant-numeric:tabular-nums;}
button{font-family:inherit;cursor:pointer;}
input,select{font-family:inherit;}
::selection{background:var(--gold-soft);}

.phone-wrap{
  width:100%;
  min-height:100vh;
  background:var(--bg);
  position:relative;
  display:flex;
  flex-direction:column;
}

/* batik-inspired signature pattern */
.batik-bg{
  background-color:var(--primary);
  background-image:
    radial-gradient(circle at 10px 10px, rgba(185,143,51,.35) 2px, transparent 2.5px),
    radial-gradient(circle at 30px 30px, rgba(185,143,51,.22) 2px, transparent 2.5px);
  background-size:40px 40px;
}

/* ---------- LOGIN ---------- */
#login-screen{
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:32px 20px;
  position:relative;
  overflow:hidden;
  color:#062f1d;
  background-color:#ffffff;
  background-image:
    radial-gradient(circle at 10% 15%, rgba(16,185,129,.85) 0%, rgba(4,120,87,.75) 30%, transparent 70%),
    radial-gradient(circle at 90% 85%, rgba(5,150,105,.85) 0%, rgba(6,78,59,.8) 35%, transparent 70%);
  background-size:160% 160%;
  animation:gerakCahaya 14s ease-in-out infinite alternate;
}
@keyframes gerakCahaya{
  0%{background-position:0% 10%;}
  50%{background-position:100% 90%;}
  100%{background-position:20% 100%;}
}
#login-screen::before{
  content:'';
  position:absolute; inset:0;
  background-image:radial-gradient(circle at 12px 12px, rgba(6,47,29,.04) 2px, transparent 2.5px);
  background-size:36px 36px;
  pointer-events:none;
}
.login-card{
  position:relative; z-index:1;
  width:100%; max-width:360px;
  background:rgba(255,255,255,.65);
  border:1px solid rgba(255,255,255,.5);
  border-radius:32px;
  padding:34px 26px 28px;
  display:flex;
  flex-direction:column;
  gap:16px;
  backdrop-filter:blur(20px);
  -webkit-backdrop-filter:blur(20px);
  box-shadow:0 30px 60px -18px rgba(4,120,87,.25);
  animation:loginSlideUp .45s cubic-bezier(.22,1,.36,1);
}
.login-illustration{
  position:relative;
  height:128px;
  display:flex; align-items:center; justify-content:center;
  margin-bottom:2px;
}
.login-illustration .badge-circle{
  width:104px;height:104px;border-radius:50%;
  background:var(--primary-soft);
  display:flex;align-items:center;justify-content:center;
  position:relative; z-index:2;
}
.login-illustration .icon-badge{
  width:66px;height:66px;border-radius:18px;
  background:var(--primary);
  color:#fff;
  display:flex;align-items:center;justify-content:center;font-size:30px;
  box-shadow:0 10px 22px -8px rgba(11,61,46,.55);
  overflow:hidden;
  animation:loginPop .5s cubic-bezier(.22,1,.36,1);
}
.login-illustration .coin{
  position:absolute;
  border-radius:50%;
  background:var(--gold);
  color:#fff;
  display:flex;align-items:center;justify-content:center;
  font-weight:800;font-family:'Sora',sans-serif;
  border:2px solid var(--gold-soft);
  box-shadow:0 8px 16px -6px rgba(185,143,51,.6);
  animation:coinFloat 3s ease-in-out infinite;
  z-index:3;
}
.login-illustration .coin.c1{ width:32px;height:32px;font-size:12px; top:0; left:20%; animation-delay:0s; }
.login-illustration .coin.c2{ width:26px;height:26px;font-size:10.5px; top:16px; right:16%; animation-delay:.5s; }
.login-illustration .coin.c3{ width:22px;height:22px;font-size:9.5px; bottom:6px; left:10%; animation-delay:1s; }
@keyframes coinFloat{
  0%,100%{transform:translateY(0);}
  50%{transform:translateY(-9px);}
}
.login-title{text-align:center;}
.login-title h1{margin:0 0 4px;font-size:19px;font-weight:800;color:var(--text);}
.login-title p{margin:0;font-size:12.5px;color:var(--muted);}
.field-pill{position:relative;}
.field-pill > svg{
  position:absolute; left:16px; top:50%; transform:translateY(-50%);
  color:var(--muted); pointer-events:none;
}
.field-pill input{
  width:100%;
  border:1.5px solid var(--border);
  background:var(--bg);
  border-radius:999px;
  padding:13px 16px 13px 42px;
  font-size:14px;
  outline:none;
  transition:border-color .15s, background .15s;
}
.field-pill input:focus{border-color:var(--primary); background:var(--surface);}
.field-pill .field-toggle{
  position:absolute; right:6px; top:50%; transform:translateY(-50%);
  background:none;border:none;padding:8px;border-radius:50%;
  color:var(--muted); display:flex; align-items:center; justify-content:center;
  width:33px; height:33px;
}
.field-pill .field-toggle svg{ display:block; }
.field-pill .field-toggle:active{background:var(--primary-soft);}
.btn-pill{
  width:100%;
  border:none; border-radius:999px; padding:14px 16px;
  font-weight:700; font-size:14.5px;
  background:var(--primary); color:#fff;
  display:flex; align-items:center; justify-content:center; gap:8px;
  box-shadow:0 14px 26px -10px rgba(11,61,46,.55);
  margin-top:4px;
}
.btn-pill:active{background:var(--primary-2);}
.login-footer-link{
  text-align:center; font-size:11.5px; color:var(--muted);
  text-decoration:underline; text-underline-offset:2px; cursor:pointer;
}
.login-footer-note{
  text-align:center; font-size:11px; color:var(--muted); margin-top:2px;
}
@keyframes loginPop{
  0%{transform:scale(.6) rotate(-8deg); opacity:0;}
  100%{transform:scale(1) rotate(0); opacity:1;}
}
@keyframes loginSlideUp{
  0%{transform:translateY(24px); opacity:0;}
  100%{transform:translateY(0); opacity:1;}
}
.btn-loading{position:relative; color:transparent !important;}
.btn-loading::after{
  content:''; position:absolute; width:16px;height:16px;
  border-radius:50%; border:2.5px solid rgba(255,255,255,.4); border-top-color:#fff;
  animation:btnSpin .7s linear infinite;
}
@keyframes btnSpin{to{transform:rotate(360deg);}}

/* ---- Desktop: card slightly larger, more breathing room ---- */
@media (min-width: 900px){
  .login-card{
    max-width:400px;
    padding:42px 36px 34px;
    border-radius:36px;
  }
  .login-illustration{height:150px;}
  .login-illustration .badge-circle{width:120px;height:120px;}
  .login-illustration .icon-badge{width:76px;height:76px;font-size:34px;}
  .login-title h1{font-size:22px;}
  .login-title p{font-size:13px;}
}


.field{display:flex;flex-direction:column;gap:6px;}
.field label{font-size:12.5px;font-weight:600;color:var(--muted);}
.field input, .field select, .field textarea{
  border:1.5px solid var(--border);
  border-radius:var(--radius-sm);
  padding:12px 14px;
  font-size:14.5px;
  background:#FBFCFA;
  outline:none;
  transition:border-color .15s;
}
.field input:focus, .field select:focus, .field textarea:focus{border-color:var(--primary);}
.btn{
  border:none;
  border-radius:var(--radius-sm);
  padding:13px 16px;
  font-weight:700;
  font-size:14.5px;
  display:inline-flex;align-items:center;justify-content:center;gap:8px;
}
.btn-primary{background:var(--primary);color:#fff;}
.btn-primary:active{background:var(--primary-2);}
.btn-gold{background:var(--gold);color:#fff;}
.btn-outline{background:transparent;border:1.5px solid var(--border);color:var(--text);}
.btn-danger{background:var(--danger-soft);color:var(--danger);}
.btn-block{width:100%;}
.btn-sm{padding:8px 12px;font-size:12.5px;border-radius:8px;}
.icon-btn-sm{width:32px;height:32px;border:none;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:15px;cursor:pointer;}
.ic-danger{background:var(--danger-soft);color:var(--danger);}
.ic-primary{background:var(--primary-soft);color:var(--primary);}
.login-error{background:var(--danger-soft);color:var(--danger);font-size:13px;padding:10px 12px;border-radius:10px;display:none;}
.demo-box{background:var(--primary-soft);border-radius:var(--radius-sm);padding:12px 14px;font-size:11.5px;color:var(--primary);line-height:1.6;}
.demo-box b{font-family:'IBM Plex Mono',monospace;}

/* ---------- APP SHELL ---------- */
#app-screen{display:none;flex-direction:column;min-height:100vh;}
.app-header{
  background:var(--primary);
  color:#fff;
  padding:18px 18px 20px;
  display:flex;align-items:center;justify-content:space-between;
  gap:10px;
}
.app-header .left{display:flex;align-items:center;gap:10px;}
.app-header .koperasi-icon{width:38px;height:38px;border-radius:10px;background:rgba(255,255,255,.15);display:flex;align-items:center;justify-content:center;font-size:20px;overflow:hidden;}
.app-header .titles .name{font-weight:700;font-size:14.5px;line-height:1.2;font-family:'Sora',sans-serif;}
.app-header .titles .role{font-size:11px;color:var(--gold-soft);text-transform:uppercase;letter-spacing:.6px;}
.icon-btn{background:rgba(255,255,255,.14);border:none;color:#fff;width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;}

.profile-dropdown{position:relative;}
.profile-avatar{width:36px;height:36px;border-radius:50%;background:rgba(255,255,255,.18);display:flex;align-items:center;justify-content:center;cursor:pointer;color:#fff;transition:.2s;}
.profile-avatar:hover{background:rgba(255,255,255,.28);}
.dropdown-menu{position:absolute;right:0;top:44px;min-width:170px;background:#fff;border-radius:12px;box-shadow:0 8px 30px rgba(0,0,0,.15);padding:6px;display:none;z-index:999;}
.dropdown-menu.show{display:block;}
.dropdown-item{padding:10px 14px;border-radius:8px;font-size:13px;color:#222;cursor:pointer;transition:.15s;}
.dropdown-item:hover{background:#f5f5f5;}
.dropdown-item.logout{color:#e74c3c;}
.dropdown-item.logout:hover{background:#fee;}
.dropdown-divider{height:1px;background:#eee;margin:4px 8px;}

#content{flex:1;padding:18px 18px 90px;overflow-y:auto;}
.page-title{font-family:'Sora',sans-serif;font-size:18px;font-weight:700;margin:2px 0 16px;display:flex;align-items:center;justify-content:space-between;}
.page-title span.sub{display:block;font-family:'Plus Jakarta Sans';font-size:12px;color:var(--muted);font-weight:500;margin-top:2px;}

.card{background:var(--surface);border-radius:var(--radius-lg);padding:18px;box-shadow:var(--shadow);margin-bottom:14px;border:1px solid var(--border);}
.balance-card{background:linear-gradient(135deg,var(--primary) 0%, var(--primary-2) 100%);color:#fff;border:none;position:relative;overflow:hidden;}
.balance-card::after{content:"";position:absolute;right:-30px;top:-30px;width:140px;height:140px;border-radius:50%;background:rgba(255,255,255,.06);}
.balance-card .label{font-size:12px;color:rgba(255,255,255,.75);}
.balance-card .amount{font-family:'Sora',sans-serif;font-size:26px;font-weight:700;margin-top:6px;}
.balance-card .rekening{font-family:'IBM Plex Mono',monospace;font-size:11.5px;color:var(--gold-soft);margin-top:10px;letter-spacing:.5px;}

.grid-menu{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;}
.grid-menu .item{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-md);padding:14px 8px;text-align:center;display:flex;flex-direction:column;align-items:center;gap:8px;}
.grid-menu .item .ic{width:42px;height:42px;border-radius:12px;background:var(--primary-soft);color:var(--primary);display:flex;align-items:center;justify-content:center;}
.grid-menu .item span{font-size:11.5px;font-weight:600;line-height:1.25;}

.list-row{display:flex;align-items:center;justify-content:space-between;padding:12px 0;border-bottom:1px solid var(--border);gap:10px;}
.list-row:last-child{border-bottom:none;}
.list-row .row-ic{width:32px;height:32px;border-radius:50%;background:var(--primary-soft);color:var(--primary);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.list-row .info{min-width:0;flex:1;}
.list-row .info .title{font-weight:600;font-size:13.5px;}
.list-row .info .sub{font-size:11.5px;color:var(--muted);margin-top:2px;}
.list-row .amt{font-family:'IBM Plex Mono',monospace;font-weight:600;font-size:13.5px;}
.amt.plus{color:var(--ok);}
.amt.minus{color:var(--danger);}

.badge{font-size:10.5px;font-weight:700;padding:3px 9px;border-radius:20px;display:inline-block;letter-spacing:.3px;}
.badge-green{background:var(--primary-soft);color:var(--primary);}
.badge-gold{background:var(--gold-soft);color:#8a6a1f;}
.badge-red{background:var(--danger-soft);color:var(--danger);}

.tabs{display:flex;gap:6px;background:var(--primary-soft);padding:4px;border-radius:12px;margin-bottom:14px;}
.tabs button{flex:1;border:none;background:transparent;padding:9px 6px;border-radius:9px;font-size:12.5px;font-weight:700;color:var(--primary);}
.tabs button.active{background:var(--primary);color:#fff;}

.search-box{display:flex;align-items:center;gap:8px;background:var(--surface);border:1.5px solid var(--border);border-radius:12px;padding:9px 12px;margin-bottom:14px;flex:1;min-width:0;}
.search-box input{border:none;outline:none;background:transparent;flex:1;font-size:13.5px;min-width:0;}
.toolbar-row{display:flex;gap:8px;align-items:center;margin-bottom:0;}
.toolbar-row .search-box{margin-bottom:0;}
.btn-compact{padding:9px 14px;font-size:12.5px;white-space:nowrap;flex-shrink:0;border-radius:10px;}

.empty-state{text-align:center;padding:40px 10px;color:var(--muted);}
.empty-state .ic{font-size:34px;margin-bottom:10px;}
.empty-state .t{font-weight:700;color:var(--text);font-size:14px;}
.empty-state .d{font-size:12.5px;margin-top:4px;}

/* install prompt */
#install-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);display:flex;align-items:center;justify-content:center;z-index:9999;}
#install-card{background:#fff;border-radius:var(--radius-lg);padding:36px 28px 28px;width:340px;max-width:88vw;text-align:center;box-shadow:0 20px 60px rgba(0,0,0,.25);}
#install-icon{width:64px;height:64px;border-radius:18px;background:var(--primary-soft);display:flex;align-items:center;justify-content:center;font-size:32px;margin:0 auto 14px;}
#install-title{font-family:'Sora',sans-serif;font-size:19px;font-weight:700;color:var(--text);margin-bottom:6px;}
#install-desc{font-size:13px;color:var(--muted);line-height:1.5;}
/* passbook ledger */
.ledger{border:2px solid var(--primary);border-radius:var(--radius-lg);overflow:hidden;box-shadow:0 2px 12px rgba(0,0,0,.06);}
.ledger-head{background:var(--primary);color:#fff;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.4px;display:grid;grid-template-columns:.35fr 1fr 1.2fr 1fr;padding:10px 14px;}
.ledger-row{display:grid;grid-template-columns:.35fr 1fr 1.2fr 1fr;padding:11px 14px;border-top:1px solid var(--border);align-items:center;}
.ledger-row:nth-child(even){background:#fafafa;}
.ledger-row .d{font-size:11px;color:var(--muted);}
.ledger-row .k{font-size:12px;}
.ledger-row .j{font-family:'IBM Plex Mono',monospace;font-size:12px;text-align:right;font-weight:600;}

/* bottom nav */
.bottom-nav{
  position:fixed;bottom:0;left:0;right:0;
  background:var(--surface);
  border-top:1px solid var(--border);
  display:flex;
  overflow-x:auto;
  -webkit-overflow-scrolling:touch;
  padding:8px 6px calc(8px + env(safe-area-inset-bottom));
  box-shadow:0 -6px 18px -10px rgba(0,0,0,.15);
}
.bottom-nav button{flex:1;background:none;border:none;display:flex;flex-direction:column;align-items:center;gap:3px;padding:6px 6px;color:var(--muted);font-size:10px;font-weight:600;border-radius:10px;white-space:nowrap;min-width:56px;}
.bottom-nav button.active{color:var(--primary);}
.bottom-nav button.active .ic{background:var(--primary-soft);}
.bottom-nav .ic{width:26px;height:26px;border-radius:8px;display:flex;align-items:center;justify-content:center;}

/* sidebar for desktop */
.sidebar{
  display:none;
  width:220px;
  background:var(--surface);
  border-right:1px solid var(--border);
  padding:18px 12px;
  flex-shrink:0;
}
.sidebar button{
  width:100%;
  background:none;
  border:none;
  display:flex;
  align-items:center;
  gap:10px;
  padding:10px 12px;
  color:var(--muted);
  font-size:13px;
  font-weight:500;
  border-radius:10px;
  margin-bottom:4px;
  cursor:pointer;
  transition:background .15s, color .15s;
}
.sidebar button:hover{background:var(--primary-soft);color:var(--primary);}
.sidebar button.active{background:var(--primary-soft);color:var(--primary);font-weight:600;}
.sidebar button .ic{width:20px;height:20px;display:flex;align-items:center;justify-content:center;}

.app-body{
  display:flex;
  min-height:calc(100vh - 56px);
}
.app-body #content{
  flex:1;
  padding:18px;
  padding-bottom:80px;
}

/* desktop layout */
@media (min-width: 769px){
  .bottom-nav{display:none !important;}
  .sidebar{display:block;}
  .app-header{padding:12px 24px;}
  .app-body #content{padding:24px 32px 24px 24px;}
  .page-title{font-size:22px;}
  .page-title .sub{font-size:13px;}
}

/* mobile layout */
@media (max-width: 768px){
  .bottom-nav{display:flex !important;}
  .sidebar{display:none !important;}
  .app-body #content{padding-bottom:80px;}
}

/* modal */
.modal-overlay{position:fixed;inset:0;background:rgba(10,25,18,.5);z-index:50;display:none;align-items:center;justify-content:center;padding:20px;}
.modal-overlay.show{display:flex;}
.modal{background:var(--surface);width:100%;max-width:420px;border-radius:22px;padding:22px 22px 26px;max-height:88vh;overflow-y:auto;box-shadow:0 20px 50px -12px rgba(0,0,0,.4);animation:modalIn .2s ease;}
@keyframes modalIn{from{transform:scale(.94);opacity:0;}to{transform:scale(1);opacity:1;}}
.modal h3{margin:0 0 16px;font-size:16px;}
.modal-close{position:absolute;}
.confirm-overlay{position:fixed;inset:0;background:rgba(10,25,18,.6);z-index:60;display:none;align-items:center;justify-content:center;padding:24px;}
.confirm-overlay.show{display:flex;}
.confirm-box{background:var(--surface);border-radius:18px;padding:24px 22px 18px;width:100%;max-width:320px;box-shadow:0 20px 50px -12px rgba(0,0,0,.4);animation:confirmIn .2s ease;}
@keyframes confirmIn{from{transform:scale(.92);opacity:0;}to{transform:scale(1);opacity:1;}}
.confirm-box .icon{width:48px;height:48px;border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:24px;margin:0 auto 14px;}
.confirm-box .icon.danger{background:var(--danger-soft);color:var(--danger);}
.confirm-box .icon.warning{background:var(--gold-soft);color:#8a6a1f;}
.confirm-box .msg{text-align:center;font-size:14px;line-height:1.5;margin-bottom:20px;color:var(--text);}
.confirm-box .msg b{display:block;font-size:15px;margin-bottom:4px;}
.confirm-actions{display:flex;gap:10px;}
.confirm-actions .btn{flex:1;padding:12px;font-size:14px;}
.form-row{display:flex;flex-direction:column;gap:6px;margin-bottom:12px;}

}
.csel-trigger:active{background:var(--primary-soft);}

.csel-trigger.csel-open .csel-chevron{transform:rotate(180deg);color:var(--primary);}

.csel-overlay{position:fixed;inset:0;background:rgba(11,20,16,.45);z-index:300;display:flex;align-items:flex-end;justify-content:center;animation:cselFade .15s ease-out;}

}
@keyframes cselUp{from{transform:translateY(16px);opacity:.6;}to{transform:translateY(0);opacity:1;}}
.csel-sheet-head{display:flex;align-items:center;justify-content:space-between;padding:16px 16px 10px;border-bottom:1px solid var(--border);flex-shrink:0;}

function initials(name){ return (name||'?').split(' ').filter(Boolean).slice(0,2).map(w=>w[0]).join('').toUpperCase(); }

// ---- Transform snake_case (DB) to camelCase (JS) ----
function toCamel(obj) {
  if (!obj || typeof obj !== 'object') return obj;
  if (Array.isArray(obj)) return obj.map(toCamel);
  const out = {};
  for (const [k, v] of Object.entries(obj)) {
    const ck = k.replace(/_([a-z])/g, (_, l) => l.toUpperCase());
    out[ck] = toCamel(v);
  }
  return out;
}

// ---- Transform camelCase (JS) to snake_case (DB) ----
function toSnake(obj) {
  if (!obj || typeof obj !== 'object') return obj;
  if (Array.isArray(obj)) return obj.map(toSnake);
  const out = {};
  for (const [k, v] of Object.entries(obj)) {
    const sk = k.replace(/[A-Z]/g, l => '_' + l.toLowerCase());
    out[sk] = toSnake(v);
  }
  return out;
}

let DB = {}; // Global DB object (mirrors localStorage structure)
let DB_LOADED = false;

// ---- Initialize DB from Supabase ----
async function initSupabaseDB() {
  if (DB_LOADED) return DB;
  
  try {
    // Load all tables in parallel
    const [
      users, anggota, kelompok, jenisTabungan, tabunganAccounts, tabunganTx,
      pembiayaan, angsuran, jenisSaham, kepemilikanSaham,
      pengaturan, setoran, logs, kasPenarikanKoor, hutangKoordinator
    ] = await Promise.all([
      supabaseClient.from(TABLES.users).select('*'),
      supabaseClient.from(TABLES.anggota).select('*'),
      supabaseClient.from(TABLES.kelompok).select('*'),
      supabaseClient.from(TABLES.jenis_tabungan).select('*'),
      supabaseClient.from(TABLES.tabungan_accounts).select('*'),
      supabaseClient.from(TABLES.tabungan_tx).select('*'),
      supabaseClient.from(TABLES.pembiayaan).select('*'),
      supabaseClient.from(TABLES.angsuran).select('*'),
      supabaseClient.from(TABLES.jenis_saham).select('*'),
      supabaseClient.from(TABLES.kepemilikan_saham).select('*'),
      supabaseClient.from(TABLES.pengaturan_koperasi).select('*').eq('id', 'koperasi').single(),
      supabaseClient.from(TABLES.setoran).select('*'),
      supabaseClient.from(TABLES.logs).select('*').order('created_at', {ascending: false}).limit(100),
      supabaseClient.from(TABLES.kas_penarikan_koor).select('*'),
      supabaseClient.from(TABLES.hutang_koordinator).select('*')
    ]);

    // Transform to camelCase
    const u = toCamel(users.data || []);
    const a = toCamel(anggota.data || []);
    const k = toCamel(kelompok.data || []);
    const jt = toCamel(jenisTabungan.data || []);
    const ta = toCamel(tabunganAccounts.data || []);
    const ttx = toCamel(tabunganTx.data || []);
    const pb = toCamel(pembiayaan.data || []);
    const an = toCamel(angsuran.data || []);
    const js = toCamel(jenisSaham.data || []);
    const ks = toCamel(kepemilikanSaham.data || []);
    const pg = toCamel(pengaturan.data);
    const st = toCamel(setoran.data || []);
    const lg = toCamel(logs.data || []);
    const kpk = toCamel(kasPenarikanKoor.data || []);
    const hk = toCamel(hutangKoordinator.data || []);

    // Merge: untuk nasabah, gabung data anggota ke user
    const matchedAggIds = new Set();
    const mergedUsers = u.map(user => {
      if (user.role === 'nasabah' && user.anggotaId) {
        const agg = a.find(x => x.id === user.anggotaId);
        if (agg) { matchedAggIds.add(agg.id); return { ...user, ...agg, id: user.id, createdAt: user.createdAt }; }
      }
      // Koordinator: cari kelompokId dari tabel kelompok
      if (user.role === 'koordinator') {
        const kel = k.find(x => (x.koorId || x.koor_id) === user.id);
        if (kel) user.kelompokId = kel.id;
      }
      return user;
    });
    // Anggota yang ada di tabel "anggota" tapi belum punya akun login di tabel "users"
    // (mis. diinput langsung lewat Supabase, atau sinkronisasi user sempat gagal)
    // tetap ditampilkan di daftar supaya tidak "hilang".
    a.forEach(agg => {
      if (!matchedAggIds.has(agg.id)) {
        mergedUsers.push({
          id: agg.id, role: 'nasabah', anggotaId: agg.id,
          nama: agg.nama, nik: agg.nik, alamat: agg.alamat, noHp: agg.noHp,
          kelompokId: agg.kelompokId, noRekening: agg.noRekening, saham: agg.saham || {},
          status: agg.status || 'aktif', createdAt: agg.createdAt,
          username: null, password: null, _noAkun: true
        });
      }
    });

    // Build DB object
    DB = {
      users: mergedUsers,
      koperasi: {
        kelompok: k,
        jenisTabungan: jt,
        info: {},
        sertifikat: {},
        saham: { 
          pemupukanPersen: 35, 
          jenis: js 
        },
        aturKeuangan: {
          marginNominal: 50000,
          marginMaxNominal: 200000,
          pools: [
            {id:'operasional', label:'Operasional', persen:5},
            {id:'cadangan_resiko', label:'Cadangan Resiko', persen:5},
            {id:'bagi_hasil_tabungan', label:'Bagi Hasil Tabungan', persen:2},
            {id:'shu_saham', label:'SHU Saham', persen:2},
            {id:'cad_zakat', label:'Cad. Zakat', persen:2},
            {id:'dana_sosial', label:'Dana Sosial', persen:2},
            {id:'penyusutan', label:'Penyusutan', persen:2}
          ],
          dana: {operasional:0, cadangan_resiko:0, bagi_hasil_tabungan:0, shu_saham:0, cad_zakat:0, dana_sosial:0, penyusutan:0}
        }
      },
      tabunganAccounts: ta,
      tabunganTx: ttx,
      pembiayaan: pb,
      angsuran: an,
      kepemilikanSaham: ks,
      setoran: st,
      logs: lg,
      kasPenarikan: kpk,
      hutangKoor: hk
    };

    // Merge pengaturan koperasi (deep merge biar nested object gak ketimpa kosong)
    if (pg) {
      if (pg.nama) DB.koperasi.nama = pg.nama;
      if (pg.icon) DB.koperasi.icon = pg.icon;
      if (pg.iconImage) DB.koperasi.iconImage = pg.iconImage;
      if (!DB.koperasi.info) DB.koperasi.info = {};
      if (pg.info && Object.keys(pg.info).length) Object.assign(DB.koperasi.info, pg.info);
      if (!DB.koperasi.sertifikat) DB.koperasi.sertifikat = {};
      if (pg.sertifikat && Object.keys(pg.sertifikat).length) Object.assign(DB.koperasi.sertifikat, pg.sertifikat);
      if (pg.aturKeuangan && Object.keys(pg.aturKeuangan).length) Object.assign(DB.koperasi.aturKeuangan, pg.aturKeuangan);
      if (pg.saham && Object.keys(pg.saham).length) {
        if (pg.saham.pemupukanPersen !== undefined) DB.koperasi.saham.pemupukanPersen = pg.saham.pemupukanPersen;
      }
      // Kembalikan data dari tabel dedicated
      DB.koperasi.kelompok = k;
      DB.koperasi.jenisTabungan = jt;
      DB.koperasi.saham.jenis = js;
    }

    // Ensure defaults
    ensureDefaults();
    DB_LOADED = true;
    
    return DB;
    
  } catch (err) {
    console.error('Gagal load dari Supabase:', err);
    throw err;
  }
}

function ensureDefaults() {
  if(!DB.koperasi.kelompok) DB.koperasi.kelompok = [];
  if(!DB.koperasi.jenisTabungan) DB.koperasi.jenisTabungan = [];
  if(!DB.koperasi.saham || typeof DB.koperasi.saham !== 'object' || Object.keys(DB.koperasi.saham).length===0) DB.koperasi.saham = { pemupukanPersen: 35, jenis: [] };
  if(!DB.koperasi.saham.jenis) DB.koperasi.saham.jenis = [];
  if(!DB.koperasi.aturKeuangan || typeof DB.koperasi.aturKeuangan !== 'object' || Object.keys(DB.koperasi.aturKeuangan).length===0) {
    DB.koperasi.aturKeuangan = {
      marginNominal: 50000,
      marginMaxNominal: 200000,
      pools: [
        {id:'operasional', label:'Operasional', persen:5},
        {id:'cadangan_resiko', label:'Cadangan Resiko', persen:5},
        {id:'bagi_hasil_tabungan', label:'Bagi Hasil Tabungan', persen:2},
        {id:'shu_saham', label:'SHU Saham', persen:2},
        {id:'cad_zakat', label:'Cad. Zakat', persen:2},
        {id:'dana_sosial', label:'Dana Sosial', persen:2},
        {id:'penyusutan', label:'Penyusutan', persen:2}
      ],
      dana: {operasional:0, cadangan_resiko:0, bagi_hasil_tabungan:0, shu_saham:0, cad_zakat:0, dana_sosial:0, penyusutan:0}
    };
  }
  if(!DB.koperasi.aturKeuangan.marginNominal && DB.koperasi.aturKeuangan.marginNominal !== 0) DB.koperasi.aturKeuangan.marginNominal = 50000;
  if(!DB.koperasi.aturKeuangan.marginMaxNominal && DB.koperasi.aturKeuangan.marginMaxNominal !== 0) DB.koperasi.aturKeuangan.marginMaxNominal = 200000;
  if(!DB.koperasi.aturKeuangan.pools || !DB.koperasi.aturKeuangan.pools.length) {
    DB.koperasi.aturKeuangan.pools = [
      {id:'operasional', label:'Operasional', persen:5},
      {id:'cadangan_resiko', label:'Cadangan Resiko', persen:5},
      {id:'bagi_hasil_tabungan', label:'Bagi Hasil Tabungan', persen:2},
      {id:'shu_saham', label:'SHU Saham', persen:2},
      {id:'cad_zakat', label:'Cad. Zakat', persen:2},
      {id:'dana_sosial', label:'Dana Sosial', persen:2},
      {id:'penyusutan', label:'Penyusutan', persen:2}
    ];
  }
  if(!DB.koperasi.aturKeuangan.dana || typeof DB.koperasi.aturKeuangan.dana !== 'object' || Object.keys(DB.koperasi.aturKeuangan.dana).length===0) DB.koperasi.aturKeuangan.dana = {operasional:0, cadangan_resiko:0, bagi_hasil_tabungan:0, shu_saham:0, cad_zakat:0, dana_sosial:0, penyusutan:0};
  // Migrasi key lama (camelCase, dari versi kode sebelumnya) ke format snake_case
  // yang dipakai kode saat ini. Tanpa ini, saldo pool Cadangan Resiko, Bagi Hasil
  // Tabungan, SHU Saham, Cad. Zakat, dan Dana Sosial akan selalu tampil Rp0
  // walaupun datanya ada, karena dana[pool.id] tidak menemukan key camelCase-nya.
  (function migrasiDanaLegacyKeys(){
    const d = DB.koperasi.aturKeuangan.dana;
    const legacyMap = {
      cadanganResiko: 'cadangan_resiko',
      bagiHasilTabungan: 'bagi_hasil_tabungan',
      shuSaham: 'shu_saham',
      cadZakat: 'cad_zakat',
      danaSosial: 'dana_sosial'
    };
    let berubah = false;
    Object.keys(legacyMap).forEach(oldKey=>{
      if(d.hasOwnProperty(oldKey)){
        const newKey = legacyMap[oldKey];
        d[newKey] = (d[newKey]||0) + (d[oldKey]||0);
        delete d[oldKey];
        berubah = true;
      }
    });
    if(berubah && typeof syncAllToSupabase === 'function') syncAllToSupabase();
  })();
  if(!DB.koperasi.info || typeof DB.koperasi.info !== 'object' || Object.keys(DB.koperasi.info).length===0) DB.koperasi.info = {};
  if(!DB.koperasi.sertifikat || typeof DB.koperasi.sertifikat !== 'object' || Object.keys(DB.koperasi.sertifikat).length===0) {
    DB.koperasi.sertifikat = { judul: 'SERTIFIKAT SAHAM', subjudul: '', teksPembuka: 'Diberikan kepada', teksPenutup: '', warnaBorder: '#6B4226', warnaJudul: '#6B4226', tampilLogo: true, tandaTangan: true, namaPenandatangan: '', jabatanPenandatangan: '' };
  }
  if(!DB.tabunganAccounts) DB.tabunganAccounts = [];
  if(!DB.tabunganTx) DB.tabunganTx = [];
  if(!DB.kepemilikanSaham) DB.kepemilikanSaham = [];
  if(!DB.setoran) DB.setoran = [];
  if(!DB.kasPenarikan) DB.kasPenarikan = [];
  if(!DB.hutangKoor) DB.hutangKoor = [];
  if(!DB.logs) DB.logs = [];
  if(!DB.angsuran) DB.angsuran = [];
}



// ---- Persist to Supabase ----
async function persistToSupabase(table, data, id = null) {
  try {
    if (id) {
      return await supabaseClient.from(table).update(data).eq('id', id);
    }
    return await supabaseClient.from(table).insert(data);
  } catch (err) {
    console.error(`Supabase persist error (${table}):`, err);
    return { error: err };
  }
}

async function deleteFromSupabase(table, id) {
  try {
    return await supabaseClient.from(table).delete().eq('id', id);
  } catch (err) {
    console.error(`Supabase delete error (${table}):`, err);
    return { error: err };
  }
}

// ---- Upsert a single row/table directly, isolated from other tables ----
async function upsertToSupabase(table, data) {
  try {
    return await supabaseClient.from(table).upsert(data, { onConflict: 'id' });
  } catch (err) {
    console.error(`Supabase upsert error (${table}):`, err);
    return { error: err };
  }
}

// ---- Persist: simpan langsung ke Supabase (tanpa localStorage) ----
let _syncTimeout = null;
function persist() {
  if (_syncTimeout) clearTimeout(_syncTimeout);
  _syncTimeout = setTimeout(() => {
    syncAllToSupabase().catch(err => console.error('Auto-sync error:', err));
  }, 2000);
}

// ---- Immediate persist (bypasses debounce, waits for confirmation) ----
async function persistNow() {
  if (_syncTimeout) { clearTimeout(_syncTimeout); _syncTimeout = null; }
  try {
    await syncAllToSupabase();
    return { ok: true };
  } catch (err) {
    console.error('persistNow sync error:', err);
    return { ok: false, err };
  }
}

async function syncAllToSupabase() {
  if (!DB_LOADED) return;

  const errors = [];
  async function safeUpsert(table, data, label){
    if (!data || (Array.isArray(data) && data.length===0)) return;
    try {
      const { error } = await supabaseClient.from(table).upsert(data, { onConflict: 'id' });
      if (error) { console.error(`Supabase sync error (${label||table}):`, error); errors.push({table: label||table, error}); }
    } catch (err) {
      console.error(`Supabase sync exception (${label||table}):`, err);
      errors.push({table: label||table, error: err});
    }
  }

  // Sync users (tabel login) + anggota (tabel data nasabah)
  const usersTable = [];
  const anggotaTable = [];
  (DB.users||[]).forEach(u => {
    if (u._noAkun) return; // entri sementara (anggota tanpa akun login), jangan disinkron ke tabel users
    const userRec = { id: u.id, username: u.username, password: u.password, role: u.role, nama: u.nama, created_at: u.createdAt };
    const aggId = u.anggotaId || (u.role === 'nasabah' ? uid('agg') : null);
    if (u.role === 'nasabah' && aggId) {
      u.anggotaId = aggId;
      userRec.anggota_id = aggId;
      anggotaTable.push({
        id: aggId, nama: u.nama, nik: u.nik||null, alamat: u.alamat||null,
        no_hp: u.noHp||null, kelompok_id: u.kelompokId||null,
        no_rekening: u.noRekening||null, saham: u.saham||{},
        status: u.status||'aktif', created_at: u.createdAt
      });
    }
    usersTable.push(userRec);
  });
  await safeUpsert(TABLES.users, usersTable);
  await safeUpsert(TABLES.anggota, anggotaTable, 'anggota');
  // Sync kelompok
  await safeUpsert(TABLES.kelompok, toSnake(DB.koperasi?.kelompok));
  // Sync jenis tabungan
  await safeUpsert(TABLES.jenis_tabungan, toSnake(DB.koperasi?.jenisTabungan));
  // Sync tabungan accounts
  await safeUpsert(TABLES.tabungan_accounts, toSnake(DB.tabunganAccounts));
  // Sync tabungan tx
  const txSnake = DB.tabunganTx?.map(t => {
    const s = toSnake(t);
    if (t.tanggal) s.tanggal = t.tanggal;
    return s;
  });
  await safeUpsert(TABLES.tabungan_tx, txSnake);
  // Sync pembiayaan
  const pSnake = DB.pembiayaan?.map(p => {
    const s = toSnake(p);
    if (p.mulai) s.mulai = p.mulai.split('T')[0]; // YYYY-MM-DD
    if (p.riwayatAngsuran) {
      s.riwayat_angsuran = p.riwayatAngsuran;
    }
    return s;
  });
  await safeUpsert(TABLES.pembiayaan, pSnake);
  // Sync angsuran
  await safeUpsert(TABLES.angsuran, toSnake(DB.angsuran));
  // Sync jenis saham
  await safeUpsert(TABLES.jenis_saham, toSnake(DB.koperasi?.saham?.jenis));
  // Sync kepemilikan saham
  await safeUpsert(TABLES.kepemilikan_saham, toSnake(DB.kepemilikanSaham));
  // Sync setoran
  await safeUpsert(TABLES.setoran, toSnake(DB.setoran), 'setoran');
  // Sync kas penarikan koordinator (penarikan yang mengurangi dana yang dipegang koordinator)
  await safeUpsert(TABLES.kas_penarikan_koor, toSnake(DB.kasPenarikan), 'kas_penarikan_koor');
  // Sync hutang admin ke koordinator (kekurangan kas saat penarikan melebihi dana yang dipegang koordinator)
  await safeUpsert(TABLES.hutang_koordinator, toSnake(DB.hutangKoor), 'hutang_koordinator');
  // Sync logs + cleanup (keep max 500 row)
  await safeUpsert(TABLES.logs, toSnake(DB.logs));
  try {
    const { count } = await supabaseClient.from(TABLES.logs).select('*', { count: 'exact', head: true });
    if (count && count > 500) {
      const { data: old } = await supabaseClient.from(TABLES.logs).select('id').order('created_at', {ascending: true}).limit(count - 500);
      if (old && old.length) {
        const ids = old.map(r=>r.id);
        for (let i = 0; i < ids.length; i += 100) {
          await supabaseClient.from(TABLES.logs).delete().in('id', ids.slice(i, i + 100));
        }
      }
    }
  } catch(e){} // cleanup error aman diabaikan
  // Sync pengaturan koperasi (single row) - JSONB fields jangan di-toSnake
  const pg = {
    id: 'koperasi',
    nama: DB.koperasi.nama,
    icon: DB.koperasi.icon,
    icon_image: DB.koperasi.iconImage || null,
    info: DB.koperasi.info || {},
    sertifikat: DB.koperasi.sertifikat || {},
    saham: { pemupukanPersen: DB.koperasi.saham?.pemupukanPersen || 35 },
    atur_keuangan: DB.koperasi.aturKeuangan || {}
  };
  await safeUpsert(TABLES.pengaturan_koperasi, [pg], 'pengaturan_koperasi');

  if (errors.length) {
    const detail = errors.map(e => {
      const msg = e.error && (e.error.message || e.error.msg) || 'unknown error';
      const extra = e.error && (e.error.details || e.error.hint) ? ' — ' + (e.error.details || e.error.hint) : '';
      return e.table + ': ' + msg + extra;
    }).join(' | ');
    console.error('Auto-sync selesai dengan error pada tabel:', detail);
    throw new Error(detail);
  }
  console.log('Auto-sync to Supabase berhasil');
}

function getSession(){
  const raw = sessionStorage.getItem(SESSION_KEY);
  return raw ? JSON.parse(raw) : null;
}
function setSession(user){
  sessionStorage.setItem(SESSION_KEY, JSON.stringify({userId:user.id, role:user.role}));
}
function clearSession(){ sessionStorage.removeItem(SESSION_KEY); }
function currentUser(){
  const s = getSession();

  return DB.users.find(u=>u.id===s.userId) || null;
}

async function handleLogin(){
  const submitBtn = document.getElementById('login-submit-btn');
  submitBtn.classList.add('btn-loading');
  submitBtn.disabled = true;
  try{
    const username = document.getElementById('login-username').value.trim();
    const password = document.getElementById('login-password').value;
    const errBox = document.getElementById('login-error');
    if(!DB || !Array.isArray(DB.users)){
      console.warn('DB tidak valid saat login, mencoba memuat ulang DB');
      await loadDB();
    }
    const user = (DB.users||[]).find(u=>u.username===username && u.password===password);
    if(!user){
      errBox.textContent = 'Nama pengguna atau kata sandi salah.';
      errBox.style.display = 'block';
      return;
    }
  if(user.status==='nonaktif'){
    errBox.textContent = 'Akun ini telah dinonaktifkan. Hubungi administrator.';
    errBox.style.display = 'block';
    return;
  }
  errBox.style.display = 'none';
    setSession(user);
    addLog('Masuk aplikasi', user.nama + ' (' + user.role + ') masuk ke aplikasi');
    boot();
  }catch(err){
    console.error('Error saat proses login:', err);
    const errBox = document.getElementById('login-error');
    errBox.textContent = 'Terjadi kesalahan saat login. Cek konsol untuk detail.';
    errBox.style.display = 'block';
  }finally{
    submitBtn.classList.remove('btn-loading');
    submitBtn.disabled = false;
  }
}
function togglePasswordVisibility(){
  const input = document.getElementById('login-password');
  const isHidden = input.type === 'password';
  input.type = isHidden ? 'text' : 'password';
}
function handleLogout(){
  const u = currentUser();
  if(u) addLog('Keluar aplikasi', u.nama + ' keluar dari aplikasi');
  clearSession();
  document.getElementById('login-username').value='';
  document.getElementById('login-password').value='';
  boot();
}

/* =========================================================
   TOMBOL KEMBALI (Android back button) — pakai riwayat browser
   supaya tekan "kembali" di HP menutup modal / kembali ke
   halaman sebelumnya, bukan langsung keluar dari aplikasi.
========================================================= */
let isSyncingFromHistory = false;

function pushNavHistory(replace){
  if(isSyncingFromHistory) return;
  const modalOverlay = document.getElementById('modal-overlay');
  const state = {
    page: currentPage,
    sub: currentSubState,
    modal: !!(modalOverlay && modalOverlay.classList.contains('show'))
  };
  try{
    if(replace) history.replaceState(state, '');
    else history.pushState(state, '');
  }catch(e){ /* abaikan kalau browser membatasi history API */ }
}

window.addEventListener('popstate', function(e){
  const user = (typeof currentUser==='function') ? currentUser() : null;
  if(!user) return; // di layar login, biarkan perilaku bawaan
  isSyncingFromHistory = true;
  const modalOverlay = document.getElementById('modal-overlay');
  const state = e.state;
  if(state && state.page){
    currentPage = state.page;
    currentSubState = state.sub || {};
    if(modalOverlay) modalOverlay.classList.toggle('show', !!state.modal);
  } else {
    if(modalOverlay) modalOverlay.classList.remove('show');
    currentPage = defaultPageFor(user.role);
    currentSubState = {};
  }
  renderContent();
  renderNav();
  isSyncingFromHistory = false;
});
document.getElementById('modal-overlay').addEventListener('click', (e)=>{
  if(e.target.id==='modal-overlay') closeModal();
});

function confirmDialog(msg, sub, type, onConfirm, btnLabel){
  const overlay = document.createElement('div');
  overlay.className = 'confirm-overlay show';
  overlay.innerHTML = `
    <div class="confirm-box">
      <div class="icon ${type||'danger'}">

      </div>

function userAccounts(userId){
  return DB.tabunganAccounts
    .filter(a=>a.userId===userId)
    .map(a=>({acc:a, j: DB.koperasi.jenisTabungan.find(j=>j.id===a.jenisId)}))
    .filter(x=>x.j);
}
function jenisBelumDibuka(userId){
  const opened = DB.tabunganAccounts.filter(a=>a.userId===userId).map(a=>a.jenisId);
  return DB.koperasi.jenisTabungan.filter(j=>!opened.includes(j.id));
}
function nextAccNo(){
  const max = DB.tabunganAccounts.reduce((m,a)=>{
    const n = parseInt((a.noRekening||'0').split('-').pop(), 10);
    return n>m ? n : m;
  }, 0);
  return '2026-'+String(10001+max).slice(-5);
}
function getAccount(userId, jenisId){
  let acc = DB.tabunganAccounts.find(a=>a.userId===userId && a.jenisId===jenisId);
  if(!acc) return null;
  if(!acc.noRekening) acc.noRekening = nextAccNo();
  return acc;
}
function hapusSemuaRekening(userId){
  const user = userById(userId);
  if(!user) return;
  const jml = DB.tabunganAccounts.filter(a=>a.userId===userId).length;
  if(!jml) return;
  confirmDialog('Hapus semua rekening?', 'Semua rekening tabungan milik ' + user.nama + ' (' + jml + ' rekening) beserta transaksinya akan dihapus.', 'danger', ()=>{
    const ids = DB.tabunganAccounts.filter(a=>a.userId===userId).map(a=>a.id);
    DB.tabunganAccounts = DB.tabunganAccounts.filter(a=>!ids.includes(a.id));
    DB.tabunganTx = DB.tabunganTx.filter(t=>t.userId!==userId);
    persist();
    ids.forEach(id => supabaseClient.from(TABLES.tabungan_accounts).delete().eq('id', id).then());
    supabaseClient.from(TABLES.tabungan_tx).delete().eq('user_id', userId).then();
    addLog('Hapus semua rekening', user.nama);
    bigSuccess('Semua rekening berhasil dihapus');
    renderContent();
  });
}
function totalSaldoUser(userId){
  return DB.tabunganAccounts.filter(a=>a.userId===userId).reduce((s,a)=>s+a.saldo,0);
}
function txForUser(userId){
  return DB.tabunganTx.filter(t=>t.userId===userId).sort((a,b)=> new Date(b.tanggal)-new Date(a.tanggal));
}
function jenisName(jenisId){
  const j = DB.koperasi.jenisTabungan.find(j=>j.id===jenisId);
  return j ? j.nama : '-';
}
function kelompokName(kelompokId){
  const k = DB.koperasi.kelompok.find(k=>k.id===kelompokId);
  return k ? k.nama : '-';
}
function groupByKelompok(items, getUserIdFn){
  const groups = {};
  items.forEach(item=>{
    const u = userById(getUserIdFn(item));
    const nama = kelompokName(u ? u.kelompokId : null);
    if(!groups[nama]) groups[nama] = [];
    groups[nama].push(item);
  });
  return Object.keys(groups).sort((a,b)=>a.localeCompare(b,'id')).map(nama=>({nama, items:groups[nama]}));
}
function groupByKelompokId(items, getKelompokIdFn){
  const groups = {};
  items.forEach(item=>{
    const nama = kelompokName(getKelompokIdFn(item));
    if(!groups[nama]) groups[nama] = [];
    groups[nama].push(item);
  });
  return Object.keys(groups).sort((a,b)=>a.localeCompare(b,'id')).map(nama=>({nama, items:groups[nama]}));
}
function userById(id){ return DB.users?.find(u=>u.id===id) || { nama:'-', kelompokId:null, role:'-', noRekening:'-' }; }
function nasabahOfKelompok(kelompokId){ return DB.users.filter(u=>u.role==='nasabah' && u.kelompokId===kelompokId); }
function pembiayaanForUser(userId){ return DB.pembiayaan.filter(p=>p.userId===userId).sort((a,b)=>new Date(b.mulai)-new Date(a.mulai)); }
function koordinatorForKelompok(kelompokId){
  const k = DB.koperasi.kelompok.find(k=>k.id===kelompokId);
  return k && k.koordinatorId ? userById(k.koordinatorId) : null;
}

function doSetor(userId, jenisId, jumlah, keterangan){
  const acc = getAccount(userId, jenisId);
  if(!acc) throw new Error('Rekening tabungan belum dibuka untuk jenis ini.');
  acc.saldo += jumlah;
  const s = getSession();
  DB.tabunganTx.push({id:uid('tx'), userId, jenisId, tipe:'setor', jumlah, saldoSetelah:acc.saldo, tanggal:nowISO(), oleh:s.userId, keterangan: keterangan||'Setoran tunai'});
  persist();
  addLog('Setor tabungan', userById(userId).nama + ' - ' + jenisName(jenisId) + ' - ' + rupiah(jumlah));
}
function doSetorKoordinator(userId, jenisId, jumlah, keterangan){
  const s = getSession();
  doSetor(userId, jenisId, jumlah, keterangan);
  DB.setoran.push({id:uid('st'), userId, jenisId, jumlah, keterangan: keterangan||'Setoran tunai', tanggal:nowISO(), dibuatOleh:s.userId, status:'di_koordinator'});
  autoLunasiHutangDariSetoran(s.userId);
  persist();
}
async function confirmSetoran(setoranId){
  const st = DB.setoran.find(s=>s.id===setoranId);
  if(!st || st.status!=='di_koordinator') return {ok:false, msg:'Setoran tidak ditemukan atau sudah dikonfirmasi.'};
  const s = getSession();
  if(s.role!=='admin') return {ok:false, msg:'Hanya admin yang bisa konfirmasi setoran.'};
  st.status = 'sudah_di_admin';
  st.dikonfirmasiOleh = s.userId;
  st.waktuKonfirmasi = nowISO();
  if(SUPABASE_ENABLED){
    const { error } = await upsertToSupabase(TABLES.setoran, toSnake(st));
    if(error) console.error('Gagal konfirmasi setoran di Supabase:', error);
  }
  persist();
  if(st.jenis==='angsuran'){
    addLog('Terima angsuran dari koordinator', rupiah(st.jumlah)+' - '+userById(st.userId).nama+' (Angsuran ke-...)');
  } else {
    addLog('Terima setoran dari koordinator', rupiah(st.jumlah)+' - '+userById(st.userId).nama+' ('+jenisName(st.jenisId)+')');
  }
  return {ok:true};
}
function doTarik(userId, jenisId, jumlah, keterangan){
  const acc = getAccount(userId, jenisId);
  if(!acc) return {ok:false, msg:'Rekening tabungan belum dibuka untuk jenis ini.'};
  if(acc.saldo < jumlah) return {ok:false, msg:'Saldo tidak mencukupi.'};
  acc.saldo -= jumlah;
  const s = getSession();
  DB.tabunganTx.push({id:uid('tx'), userId, jenisId, tipe:'tarik', jumlah, saldoSetelah:acc.saldo, tanggal:nowISO(), oleh:s.userId, keterangan: keterangan||'Penarikan tunai'});
  persist();
  addLog('Tarik tabungan', userById(userId).nama + ' - ' + jenisName(jenisId) + ' - ' + rupiah(jumlah));
  return {ok:true};
}
/* =========================================================
   KAS KOORDINATOR & HUTANG ADMIN KE KOORDINATOR
   Dana yang dipegang koordinator (dari setoran yg belum disetor
   ke admin) berkurang duluan saat ada penarikan lewat koordinator.
   Jika penarikan > dana yang dipegang, selisihnya jadi hutang
   admin ke koordinator.
========================================================= */
function totalSetoranPendingKoor(koorId){
  return DB.setoran.filter(s=>s.dibuatOleh===koorId && s.status==='di_koordinator').reduce((s,x)=>s+x.jumlah,0);
}
function totalPenarikanDariKasKoor(koorId){
  return (DB.kasPenarikan||[]).filter(p=>p.koorId===koorId).reduce((s,x)=>s+x.jumlah,0);
}
function kasKoordinator(koorId){
  return Math.max(0, totalSetoranPendingKoor(koorId) - totalPenarikanDariKasKoor(koorId));
}
function totalHutangKoor(koorId){
  return (DB.hutangKoor||[]).filter(h=>h.koorId===koorId && h.status==='belum_lunas').reduce((s,x)=>s+(x.jumlah-(x.dibayar||0)),0);
}
// Setoran pending (belum disetor ke admin) dikurangi FIFO oleh penarikan yang sudah
// memakai kas koordinator, supaya antrian/notifikasi konfirmasi admin ikut berkurang.
function pendingSetoranNetForKoor(koorId){
  const items = DB.setoran.filter(s=>s.dibuatOleh===koorId && s.status==='di_koordinator')
    .slice().sort((a,b)=>new Date(a.tanggal)-new Date(b.tanggal));
  let dipakai = totalPenarikanDariKasKoor(koorId);
  const out = [];
  for(const s of items){
    if(dipakai <= 0){ out.push({...s, sisa:s.jumlah}); continue; }
    if(dipakai >= s.jumlah){ dipakai -= s.jumlah; continue; } // sudah habis dipakai penarikan, hilang dari antrian
    out.push({...s, sisa:s.jumlah - dipakai});
    dipakai = 0;
  }
  return out;
}
function pendingSetoranNetAll(){
  const koorIds = [...new Set(DB.setoran.filter(s=>s.status==='di_koordinator').map(s=>s.dibuatOleh))];
  let out = [];
  koorIds.forEach(kid=>{ out = out.concat(pendingSetoranNetForKoor(kid)); });
  return out;
}
function sisaSetoran(setoranId){
  const st = DB.setoran.find(s=>s.id===setoranId);
  if(!st) return 0;
  const net = pendingSetoranNetForKoor(st.dibuatOleh).find(x=>x.id===setoranId);
  return net ? net.sisa : 0;
}
// Ringkasan per koordinator: total saldo yg dipegang (belum disetor ke admin)
// + sisa saldo setelah dipakai penarikan (kalau ada) + daftar setoran yg
// menunggu diterima + hutang admin ke koordinator ybs. Untuk notifikasi
// simple & mudah dibaca (semua info soal 1 koordinator jadi 1 kartu).
function ringkasanSaldoKoordinator(){
  const setoranKoorIds = DB.setoran.filter(s=>s.status==='di_koordinator').map(s=>s.dibuatOleh);
  const hutangKoorIds = (DB.hutangKoor||[]).filter(h=>h.status==='belum_lunas').map(h=>h.koorId);
  const koorIds = [...new Set([...setoranKoorIds, ...hutangKoorIds])];
  return koorIds.map(kid=>{
    const koor = userById(kid);
    const totalSetoran = totalSetoranPendingKoor(kid);
    const dipakaiTarik = totalPenarikanDariKasKoor(kid);
    const sisaKas = kasKoordinator(kid);
    const pendingItems = pendingSetoranNetForKoor(kid);
    const hutangItems = (DB.hutangKoor||[]).filter(h=>h.koorId===kid && h.status==='belum_lunas');
    const totalHutang = hutangItems.reduce((s,h)=>s+(h.jumlah-(h.dibayar||0)),0);
    const penarikanItems = (DB.kasPenarikan||[]).filter(p=>p.koorId===kid).slice().sort((a,b)=>new Date(b.tanggal)-new Date(a.tanggal));
    return {koorId:kid, koor, totalSetoran, dipakaiTarik, sisaKas, jumlahItem:pendingItems.length, pendingItems, hutangItems, totalHutang, penarikanItems};
  }).filter(r=>r.totalSetoran>0 || r.totalHutang>0)
    .sort((a,b)=>(b.sisaKas+b.totalHutang)-(a.sisaKas+a.totalHutang));
}
// Kalau admin masih punya hutang ke koordinator, dan koordinator itu baru
// menerima saldo (setoran baru), pakai dulu saldo yang tersedia utk melunasi
// hutang (sebagian/semua) sebelum koordinator perlu menyetor ke admin.
// Dicatat sebagai "penarikan" dari kas koordinator (memakai mekanisme yang
// sama dgn penarikan nasabah) supaya jumlah yg dipakai tidak lagi dihitung
// sbg kas yg masih harus disetor ke admin.
function autoLunasiHutangDariSetoran(koorId){
  let tersedia = kasKoordinator(koorId);
  if(tersedia<=0) return 0;
  const hutangAktif = (DB.hutangKoor||[]).filter(h=>h.koorId===koorId && h.status==='belum_lunas')
    .slice().sort((a,b)=>new Date(a.tanggal)-new Date(b.tanggal));
  if(!hutangAktif.length) return 0;
  let totalDilunasi = 0;
  for(const h of hutangAktif){
    if(tersedia<=0) break;
    const sisaHutang = h.jumlah - (h.dibayar||0);
    if(sisaHutang<=0) continue;
    const bayar = Math.min(tersedia, sisaHutang);
    h.dibayar = (h.dibayar||0) + bayar;
    if(h.dibayar >= h.jumlah){ h.status = 'lunas'; h.waktuLunas = nowISO(); }
    DB.kasPenarikan.push({id:uid('kp'), koorId, userId:h.userId||null, jumlah:bayar, tanggal:nowISO(), keterangan:'Pelunasan hutang admin (otomatis dari setoran baru)'});
    tersedia -= bayar;
    totalDilunasi += bayar;
  }
  if(totalDilunasi>0){
    addLog('Pelunasan hutang koordinator (otomatis)', rupiah(totalDilunasi)+' ke '+userById(koorId).nama+' dipakai dari setoran baru yang masuk');
  }
  return totalDilunasi;
}
function doTarikKoordinator(userId, jenisId, jumlah, keterangan){
  const r = doTarik(userId, jenisId, jumlah, keterangan);
  if(!r.ok) return r;
  const s = getSession();
  const koorId = s.userId;
  const kasTersedia = kasKoordinator(koorId);
  const dariKas = Math.min(kasTersedia, jumlah);
  const kurang = jumlah - dariKas;
  if(dariKas > 0){
    DB.kasPenarikan.push({id:uid('kp'), koorId, userId, jumlah:dariKas, tanggal:nowISO(), keterangan:'Penarikan tunai '+userById(userId).nama});
  }
  if(kurang > 0){
    DB.hutangKoor.push({id:uid('hu'), koorId, userId, jumlah:kurang, dibayar:0, status:'belum_lunas', tanggal:nowISO(), keterangan:'Kekurangan kas penarikan '+userById(userId).nama});
    addLog('Hutang admin ke koordinator', rupiah(kurang)+' - '+userById(koorId).nama+' (kekurangan kas penarikan '+userById(userId).nama+')');
  }
  persist();
  return {ok:true, dariKas, kurang};
}
async function bayarHutangKoorUI(hutangId){
  const h = (DB.hutangKoor||[]).find(x=>x.id===hutangId);
  if(!h || h.status==='lunas') return;
  const sisa = h.jumlah - (h.dibayar||0);
  confirmDialog('Bayar hutang ke koordinator?', rupiah(sisa)+' ke '+userById(h.koorId).nama, 'warning', async ()=>{
    toast('Menyimpan...');
    h.dibayar = h.jumlah;
    h.status = 'lunas';
    h.waktuLunas = nowISO();
    if(SUPABASE_ENABLED){
      const { error } = await upsertToSupabase(TABLES.hutang_koordinator, toSnake(h));
      if(error) console.error('Gagal update hutang koordinator di Supabase:', error);
    }
    persist();
    addLog('Bayar hutang koordinator', rupiah(sisa)+' ke '+userById(h.koorId).nama);
    bigSuccess('Hutang telah dibayar ke koordinator');
    renderContent();
  }, 'Ya, sudah dibayar');
}
function doBayarAngsuran(pembId, oleh, jumlah){
  const p = DB.pembiayaan.find(p=>p.id===pembId);
  if(!p || p.status==='lunas') return {ok:false, msg:'Pembiayaan tidak ditemukan atau sudah lunas.'};
  if(p.statusPengajuan!=='approved') return {ok:false, msg:'Pembiayaan belum disetujui admin.'};
  if(!jumlah || jumlah<=0) return {ok:false, msg:'Jumlah tidak valid.'};
  const angsuranKe = p.tenor - p.sisaAngsuran + 1;
  p.riwayatAngsuran.push({id:uid('ang'), tanggal:nowISO(), jumlah, oleh, angsuranKe});
  p.sisaAngsuran--;
  const totalKew = p.jumlahPinjaman + marginNominalOf(p);
  const totalDibayar = p.riwayatAngsuran.reduce((s,a)=>s+a.jumlah, 0);
  if(totalDibayar >= totalKew || p.sisaAngsuran<=0) p.status='lunas';
  const olehUser = userById(oleh);
  const isAdmin = olehUser && olehUser.role==='admin';
  const st = {id:uid('st'), userId:p.userId, jenis:'angsuran', pembiayaanId:p.id, jumlah, keterangan:'Angsuran ke-'+angsuranKe, tanggal:nowISO(), dibuatOleh:oleh, status: isAdmin ? 'sudah_di_admin' : 'di_koordinator'};
  if(isAdmin){ st.dikonfirmasiOleh = oleh; st.waktuKonfirmasi = nowISO(); }
  DB.setoran.push(st);
  if(!isAdmin) autoLunasiHutangDariSetoran(oleh);
  const atur = DB.koperasi.aturKeuangan;
  if(atur && atur.pools && atur.dana && marginNominalOf(p)){
    const marginPerAngsuran = Math.round(marginNominalOf(p) / p.tenor);
    atur.pools.forEach(pool=>{
      const alokasi = Math.round(marginPerAngsuran * pool.persen / 100);
      atur.dana[pool.id] = (atur.dana[pool.id]||0) + alokasi;
    });
  }
  persist();
  addLog('Bayar angsuran', userById(p.userId).nama + ' - Angsuran ke-'+angsuranKe+' - '+rupiah(jumlah));
  return {ok:true};
}

/* =========================================================
   RENDER CONTENT ROUTER
========================================================= */
function renderContent(){
  const el = document.getElementById('content');
  const user = currentUser();
  if(!user) return;
  const active = document.activeElement;
  const activeId = (active && el.contains(active) && active.id) ? active.id : null;
  const selStart = activeId && active.selectionStart!=null ? active.selectionStart : null;
  const selEnd = activeId && active.selectionEnd!=null ? active.selectionEnd : null;
  const routes = {
    admin_beranda: renderAdminBeranda,
    admin_anggota: renderAdminAnggota,
    admin_tabungan: renderAdminTabungan,
    admin_pembiayaan: renderAdminPembiayaan,
    admin_saham: renderAdminSaham,
    admin_usermgmt: renderAdminUserMgmt,
    admin_laporan: renderAdminLaporan,
    admin_shu: renderAdminSHU,
    admin_pengaturan: renderAdminPengaturan,
    admin_log: renderAdminLog,
    koor_beranda: renderKoorBeranda,
    koor_anggota: renderKoorAnggota,
    koor_tabungan: renderKoorTabungan,
    koor_pembiayaan: renderKoorPembiayaan,
    nas_beranda: renderNasBeranda,
    nas_info: renderNasInfo,
    nas_tabungan: renderNasTabungan,
    nas_pembiayaan: renderNasPembiayaan,
    profil_saya: renderProfilSaya
  };
  const fn = routes[currentPage] || routes[defaultPageFor(user.role)];
  el.innerHTML = fn(user);
  if(activeId){
    const toFocus = document.getElementById(activeId);
    if(toFocus){
      toFocus.focus();
      if(selStart!=null && toFocus.setSelectionRange){
        try{ toFocus.setSelectionRange(selStart, selEnd); }catch(e){}
      }
    }
  } else {
    el.scrollTop = 0;
  }
}

  },
  saham: {
    label: 'Saham',
    headers: ['nama_pemilik','kelompok','jenis_saham','jumlah_lembar'],
    example: ['Siti Aminah','Karanggede','SAHAM A','2'],
    note: 'kelompok boleh dikosongkan jika nama_pemilik adalah anggota terdaftar (otomatis pakai kelompok anggota). jenis_saham harus sama persis dengan jenis saham yang sudah ada.'
  }
};
let _importState = null;
function csvGet(row, keys){
  for(const k of keys){
    for(const rk in row){
      if(rk.toLowerCase().replace(/[\s_]/g,'') === k.toLowerCase().replace(/[\s_]/g,'')) return String(row[rk]??'').trim();
    }
  }
  return '';
}
function findAnggotaByRekOrNama(noRek, nama){
  if(noRek){
    const u = DB.users.find(u=>u.role==='nasabah' && u.noRekening===noRek);
    if(u) return {user:u};
  }
  if(nama){
    const matches = DB.users.filter(u=>u.role==='nasabah' && u.nama.toLowerCase().trim()===nama.toLowerCase().trim());
    if(matches.length>1) return {error:'Nama "'+nama+'" ganda, gunakan kolom no_rekening'};
    if(matches.length===1) return {user:matches[0]};
  }
  return {error:'Anggota tidak ditemukan (no_rekening/nama_anggota tidak cocok)'};
}
function validateAnggotaRow(row){
  const nama = csvGet(row,['nama']);
  const nik = csvGet(row,['nik']);
  const alamat = csvGet(row,['alamat']);
  const noHp = csvGet(row,['no_hp','nohp','no hp','telepon','hp']);
  const kelompokNama = csvGet(row,['kelompok']);
  if(!nama) return {ok:false, reason:'Kolom nama kosong'};
  if(!nik) return {ok:false, reason:'Kolom nik kosong'};
  if(!alamat) return {ok:false, reason:'Kolom alamat kosong'};
  if(!noHp) return {ok:false, reason:'Kolom no_hp kosong'};
  if(!kelompokNama) return {ok:false, reason:'Kolom kelompok kosong'};
  const kel = DB.koperasi.kelompok.find(k=>k.nama.toLowerCase().trim()===kelompokNama.toLowerCase().trim());
  if(!kel) return {ok:false, reason:'Kelompok "'+kelompokNama+'" tidak ditemukan'};
  if(DB.users.some(u=>u.role==='nasabah' && u.nik===nik)) return {ok:false, reason:'NIK '+nik+' sudah terdaftar'};
  return {ok:true, obj:{nama, nik, alamat, noHp, kelompokId:kel.id}};
}
function validateTabunganRow(row){
  const noRek = csvGet(row,['no_rekening','norekening']);
  const nama = csvGet(row,['nama_anggota','nama']);
  const jenisNama = csvGet(row,['jenis_simpanan','jenis']);
  const setoranAwal = parseIdr(csvGet(row,['setoran_awal','saldo_awal'])) || 0;
  if(!noRek && !nama) return {ok:false, reason:'Kolom no_rekening / nama_anggota wajib diisi'};
  const found = findAnggotaByRekOrNama(noRek, nama);
  if(found.error) return {ok:false, reason:found.error};
  const user = found.user;
  if(!jenisNama) return {ok:false, reason:'Kolom jenis_simpanan kosong'};
  const jenis = DB.koperasi.jenisTabungan.find(j=>j.nama.toLowerCase().trim()===jenisNama.toLowerCase().trim());
  if(!jenis) return {ok:false, reason:'Jenis simpanan "'+jenisNama+'" tidak ditemukan'};
  if(DB.tabunganAccounts.some(a=>a.userId===user.id && a.jenisId===jenis.id)) return {ok:false, reason:'Rekening '+jenis.nama+' sudah dibuka untuk '+user.nama};
  return {ok:true, obj:{userId:user.id, namaTampil:user.nama, jenisId:jenis.id, setoranAwal}};
}
function validatePembiayaanRow(row){
  const noRek = csvGet(row,['no_rekening','norekening']);
  const nama = csvGet(row,['nama_anggota','nama']);
  const jumlah = parseIdr(csvGet(row,['jumlah_pinjaman','pinjaman']));
  const tenor = parseIdr(csvGet(row,['tenor_bulan','tenor','jangka_waktu']));
  const margin = parseIdr(csvGet(row,['keuntungan','margin']));
  const ket = csvGet(row,['keterangan']);
  const tglRaw = csvGet(row,['tanggal_mulai','mulai']);
  if(!noRek && !nama) return {ok:false, reason:'Kolom no_rekening / nama_anggota wajib diisi'};
  const found = findAnggotaByRekOrNama(noRek, nama);
  if(found.error) return {ok:false, reason:found.error};
  const user = found.user;
  if(!jumlah) return {ok:false, reason:'Kolom jumlah_pinjaman kosong/tidak valid'};
  if(!tenor) return {ok:false, reason:'Kolom tenor_bulan kosong/tidak valid'};
  if(!margin) return {ok:false, reason:'Kolom keuntungan kosong/tidak valid'};
  let mulai = nowISO();
  if(tglRaw){ const d = new Date(tglRaw); if(!isNaN(d)) mulai = d.toISOString(); }
  return {ok:true, obj:{userId:user.id, namaTampil:user.nama, jumlah, tenor, margin, ket, mulai}};
}
function validateSahamRow(row){
  const nama = csvGet(row,['nama_pemilik','nama']);
  const kelompokNama = csvGet(row,['kelompok']);
  const jenisNama = csvGet(row,['jenis_saham','jenis']);
  const lembar = parseIdr(csvGet(row,['jumlah_lembar','lembar']));
  if(!nama) return {ok:false, reason:'Kolom nama_pemilik kosong'};
  if(!jenisNama) return {ok:false, reason:'Kolom jenis_saham kosong'};
  const jenis = DB.koperasi.saham.jenis.find(j=>j.nama.toLowerCase().trim()===jenisNama.toLowerCase().trim());
  if(!jenis) return {ok:false, reason:'Jenis saham "'+jenisNama+'" tidak ditemukan'};
  if(!lembar) return {ok:false, reason:'Kolom jumlah_lembar kosong/tidak valid'};
  let kelompokId = null;
  if(kelompokNama){
    const kel = DB.koperasi.kelompok.find(k=>k.nama.toLowerCase().trim()===kelompokNama.toLowerCase().trim());
    if(!kel) return {ok:false, reason:'Kelompok "'+kelompokNama+'" tidak ditemukan'};
    kelompokId = kel.id;
  }
  const anggota = DB.users.find(u=>u.role==='nasabah' && u.nama.toLowerCase().trim()===nama.toLowerCase().trim());
  return {ok:true, obj:{nama, anggotaId: anggota?anggota.id:null, jenisId:jenis.id, lembar, kelompokId: kelompokId || (anggota?anggota.kelompokId:null)}};
}
const IMPORT_VALIDATORS = {anggota:validateAnggotaRow, tabungan:validateTabunganRow, pembiayaan:validatePembiayaanRow, saham:validateSahamRow};
function openImportModal(type){
  const spec = IMPORT_SPECS[type];
  _importState = null;
  openModal(`
    <h3>Import CSV — ${spec.label}</h3>
    <div class="hint" style="margin-bottom:10px;">Kolom yang dibutuhkan: <b>${spec.headers.join(', ')}</b>. ${spec.note}</div>
    <button class="btn btn-outline" style="width:100%;margin-bottom:10px;display:flex;align-items:center;justify-content:center;gap:6px;" onclick="downloadImportTemplate('${type}')">${ICONS.download} Unduh Template CSV</button>
    <div class="form-row"><label>Pilih file CSV</label><input type="file" id="import-file-input" accept=".csv" onchange="onImportFileSelected('${type}', this)"></div>
    <div id="import-preview-area"></div>
    <div class="modal-actions">
      <button class="btn btn-outline" onclick="closeModal()">Batal</button>
    </div>
  `);
}
function downloadImportTemplate(type){
  const spec = IMPORT_SPECS[type];
  const csv = spec.headers.join(',') + '\n' + spec.example.join(',');
  const blob = new Blob(['\uFEFF'+csv], {type:'text/csv;charset=utf-8;'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = 'template_import_'+type+'.csv';
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  URL.revokeObjectURL(url);
}
function onImportFileSelected(type, inputEl){
  const file = inputEl.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = function(e){
    try{
      const wb = XLSX.read(e.target.result, {type:'binary'});
      const ws = wb.Sheets[wb.SheetNames[0]];
      const rows = XLSX.utils.sheet_to_json(ws, {defval:''});
      if(!rows.length){ toast('File kosong atau format tidak dikenali'); return; }
      const validator = IMPORT_VALIDATORS[type];
      const results = rows.map((row,idx)=>{
        const r = validator(row);
        return {idx:idx+1, ok:r.ok, reason:r.reason||'', obj:r.obj||null};
      });
      _importState = {type, rows: results};
      renderImportPreview();
    }catch(err){
      console.error(err);
      toast('Gagal membaca file CSV. Pastikan format file benar.');
    }
  };
  reader.readAsBinaryString(file);
}
function renderImportPreview(){
  const state = _importState;
  if(!state) return;
  const area = document.getElementById('import-preview-area');
  if(!area) return;
  const okCount = state.rows.filter(r=>r.ok).length;
  const errCount = state.rows.length - okCount;
  area.innerHTML = `
    <div class="hint" style="margin:10px 0;"><b style="color:var(--primary);">${okCount} data valid</b>${errCount?` &middot; <b style="color:var(--danger);">${errCount} bermasalah</b>`:''} dari ${state.rows.length} baris.</div>
    <div class="card" style="padding:2px 14px;max-height:220px;overflow-y:auto;margin-bottom:12px;">
      ${state.rows.map(r=>`
        <div class="list-row" style="padding:8px 0;">
          <div class="info">
            <div class="title" style="font-size:13px;display:flex;align-items:center;gap:6px;">Baris ${r.idx} ${r.ok?'<span class="badge badge-green" style="font-size:9px;">OK</span>':'<span class="badge badge-red" style="font-size:9px;">Error</span>'}</div>
            ${!r.ok?`<div class="sub" style="color:var(--danger);">${r.reason}</div>`:''}
          </div>
        </div>
      `).join('')}
    </div>
    <button class="btn btn-primary" style="width:100%;" ${okCount?'':'disabled'} onclick="commitImportRows()">Import ${okCount} Data</button>
  `;
}
function commitImportRows(){
  const state = _importState;
  if(!state) return;
  const validRows = state.rows.filter(r=>r.ok);
  if(!validRows.length){ toast('Tidak ada data valid untuk diimport'); return; }
  let count = 0;
  if(state.type==='anggota'){
    validRows.forEach(r=>{
      const o = r.obj;
      const baseUsername = o.nama.toLowerCase().replace(/[^a-z]/g,'');
      let username = baseUsername, counter = 1;
      while(DB.users.some(u=>u.username===username)){ username = baseUsername+counter; counter++; }
      const newUser = {
        id:uid('u'), username, password:'anggota123', role:'nasabah', nama:o.nama, nik:o.nik, alamat:o.alamat, noHp:o.noHp, kelompokId:o.kelompokId,
        noRekening: '2026'+String(1000+DB.users.length), saham:{s_A:0,s_B:0,s_C:0}, status:'aktif', anggotaId:uid('agg'), createdAt: nowISO()
      };
      DB.users.push(newUser);
      count++;
    });
  } else if(state.type==='tabungan'){
    const s = getSession();
    validRows.forEach(r=>{
      const o = r.obj;
      const acc = {id:uid('acc'), userId:o.userId, jenisId:o.jenisId, saldo:0, noRekening:nextAccNo()};
      DB.tabunganAccounts.push(acc);
      if(o.setoranAwal>0){
        acc.saldo = o.setoranAwal;
        DB.tabunganTx.push({id:uid('tx'), userId:o.userId, jenisId:o.jenisId, tipe:'setor', jumlah:o.setoranAwal, saldoSetelah:acc.saldo, tanggal:nowISO(), oleh:s.userId, keterangan:'Setoran awal (import CSV)'});
      }
      count++;
    });
  } else if(state.type==='pembiayaan'){
    validRows.forEach(r=>{
      const o = r.obj;
      const total = o.jumlah + o.margin;
      const p = {id:uid('pemb'), userId:o.userId, jumlahPinjaman:o.jumlah, tenor:o.tenor, marginPersen:0, marginNominal:o.margin, angsuranPerBulan:Math.ceil(total/o.tenor/1000)*1000, mulai:o.mulai, sisaAngsuran:o.tenor, status:'berjalan', riwayatAngsuran:[], statusPengajuan:'approved', keterangan:o.ket};
      DB.pembiayaan.push(p);
      count++;
    });
  } else if(state.type==='saham'){
    validRows.forEach(r=>{
      const o = r.obj;
      DB.kepemilikanSaham.push({id:uid('ks'), nama:o.nama, anggotaId:o.anggotaId, jenisId:o.jenisId, lembar:o.lembar, kelompokId:o.kelompokId});
      if(o.anggotaId){
        const anggota = userById(o.anggotaId);
        if(!anggota.saham) anggota.saham = {};
        anggota.saham[o.jenisId] = (anggota.saham[o.jenisId]||0) + o.lembar;
      }
      count++;
    });
  }
  persist();
  addLog('Import CSV', 'Import '+count+' data '+IMPORT_SPECS[state.type].label.toLowerCase());
  bigSuccess(count+' data berhasil diimport');
  _importState = null;
  closeModal();
  renderContent();
}

const EXPORT_META = {
  tabungan: {
    label: 'Tabungan',
    headers: ['No','Nama','No. Rekening','Kelompok','Total Saldo'],
    rows: function(kelompokId){
      const nasabah = DB.users.filter(u=>u.role==='nasabah' && u.kelompokId===kelompokId && DB.tabunganAccounts.some(a=>a.userId===u.id));
      return nasabah.map((u,i)=>[i+1, u.nama, u.noRekening||'-', kelompokName(u.kelompokId), rupiah(totalSaldoUser(u.id))]);
    }
  },
  pembiayaan: {
    label: 'Pembiayaan',
    headers: ['No','Nama','Jumlah Pinjaman','Tenor','Sisa Angsuran','Status Pengajuan','Status'],
    rows: function(kelompokId){
      const list = DB.pembiayaan.filter(p=>userById(p.userId).kelompokId===kelompokId);
      return list.map((p,i)=>[i+1, userById(p.userId).nama, rupiah(p.jumlahPinjaman), p.tenor+' bln', p.sisaAngsuran+'/'+p.tenor,
        p.statusPengajuan==='pending'?'Menunggu ACC':(p.statusPengajuan==='approved'?'Disetujui':'Ditolak'),
        p.status==='lunas'?'Lunas':'Berjalan']);
    }
  },
  saham: {
    label: 'Saham',
    headers: ['No','Nama Pemilik','Kepemilikan','Total Nilai'],
    rows: function(kelompokId){
      const jns = DB.koperasi.saham.jenis||[];
      const ks = DB.kepemilikanSaham||[];
      const seen = {}; const names = [];
      ks.forEach(k=>{ if(!seen[k.nama]){ seen[k.nama]=true; names.push(k.nama); } });
      const filtered = names.filter(nama=>ownerKelompokId(nama)===kelompokId);
      return filtered.map((nama,i)=>{
        const holdings = ks.filter(k=>k.nama===nama);
        const total = holdings.reduce((s,k)=>{ const j=jns.find(j=>j.id===k.jenisId); return s+(j?k.lembar*nilaiSahamPerLembar(j):0); },0);
        const breakdown = holdings.map(k=>{ const j=jns.find(j=>j.id===k.jenisId); return (j?j.nama:'-')+': '+k.lembar+' lbr'; }).join(', ');
        return [i+1, nama, breakdown||'-', rupiah(total)];
      });
    }
  }
};
function sanitizeFileName(s){ return String(s||'').replace(/[\\\/:*?"<>|]/g,'').trim(); }
function exportKelompokGroups(kelompokId){
  const all = DB.koperasi.kelompok || [];
  return kelompokId ? all.filter(k=>k.id===kelompokId) : all;
}
function openExportModal(type){
  const meta = EXPORT_META[type];
  const kelompokOptions = (DB.koperasi.kelompok||[]).map(k=>`<option value="${k.id}">${k.nama}</option>`).join('');
  openModal(`
    <h3>Export ${meta.label}</h3>
    <div class="form-row">
      <label>Kelompok</label>
      <select id="export-kelompok" style="width:100%;border:1.5px solid var(--border);border-radius:12px;padding:9px 12px;font-size:13.5px;background:var(--surface);">
        <option value="">Semua kelompok (1 klik, file terpisah per kelompok)</option>
        ${kelompokOptions}
      </select>
      <span class="hint">PDF: setiap kelompok jadi file .pdf sendiri-sendiri. Excel: satu file .xlsx dengan sheet terpisah per kelompok.</span>
    </div>
    <div class="modal-actions" style="flex-wrap:wrap;">
      <button class="btn btn-outline" onclick="closeModal()">Batal</button>
      <button class="btn btn-outline" onclick="runExport('${type}','xls')">${ICONS.xls} Excel</button>
      <button class="btn btn-primary" onclick="runExport('${type}','pdf')">${ICONS.pdf} PDF</button>
    </div>
  `);
}
function runExport(type, format){
  const sel = document.getElementById('export-kelompok');
  const kelompokId = sel ? sel.value : '';
  closeModal();
  try{
    if(format==='pdf') exportToPDF(type, kelompokId);
    else exportToXLS(type, kelompokId);
  }catch(e){
    console.error(e);
    toast('Gagal membuat file export');
  }
}
function exportToPDF(type, kelompokId){
  const meta = EXPORT_META[type];
  const groups = exportKelompokGroups(kelompokId);
  if(!groups.length){ toast('Belum ada data kelompok'); return; }
  const { jsPDF } = window.jspdf;
  const orgName = (DB.koperasi && DB.koperasi.nama) || 'UB Rukun Barokah';
  const tgl = new Date().toLocaleString('id-ID', {day:'2-digit',month:'long',year:'numeric',hour:'2-digit',minute:'2-digit'});
  groups.forEach((k, idx)=>{
    setTimeout(()=>{
      const doc = new jsPDF();
      const rows = meta.rows(k.id);
      doc.setFontSize(13);
      doc.text(orgName, 14, 16);
      doc.setFontSize(10.5);
      doc.text('Laporan ' + meta.label + ' \u2014 Kelompok ' + k.nama, 14, 23);
      doc.setFontSize(8.5);
      doc.setTextColor(120);
      doc.text('Dicetak: ' + tgl, 14, 28.5);
      doc.setTextColor(0);
      doc.autoTable({
        head: [meta.headers],
        body: rows.length ? rows : [meta.headers.map((h,i)=> i===1 ? 'Tidak ada data' : '')],
        startY: 33,
        styles:{ fontSize:8, cellPadding:3 },
        headStyles:{ fillColor:[11,61,46], textColor:255 },
        alternateRowStyles:{ fillColor:[244,248,244] }
      });
      doc.save(sanitizeFileName(meta.label + ' Kelompok ' + k.nama) + '.pdf');
      if(idx===groups.length-1) toast(groups.length>1 ? 'Semua file PDF berhasil diunduh' : 'File PDF berhasil diunduh');
    }, idx*350);
  });
}
function exportToXLS(type, kelompokId){
  const meta = EXPORT_META[type];
  const groups = exportKelompokGroups(kelompokId);
  if(!groups.length){ toast('Belum ada data kelompok'); return; }
  const wb = XLSX.utils.book_new();
  const usedNames = {};
  groups.forEach(k=>{
    const rows = meta.rows(k.id);
    const body = rows.length ? rows : [meta.headers.map((h,i)=> i===1 ? 'Tidak ada data' : '')];
    const ws = XLSX.utils.aoa_to_sheet([meta.headers, ...body]);
    let sheetName = sanitizeFileName(k.nama).slice(0,28) || 'Kelompok';
    if(usedNames[sheetName]){ usedNames[sheetName]++; sheetName = (sheetName+'_'+usedNames[sheetName]).slice(0,31); }
    else usedNames[sheetName] = 1;
    XLSX.utils.book_append_sheet(wb, ws, sheetName);
  });
  XLSX.writeFile(wb, sanitizeFileName(meta.label + ' ' + (kelompokId ? 'Kelompok ' + kelompokName(kelompokId) : 'Semua Kelompok')) + '.xlsx');
  toast('File Excel berhasil diunduh');
}

function submitTx(tipe){
  const forcedEl = document.getElementById('tx-user-forced');
  const userId = forcedEl ? forcedEl.value : document.getElementById('tx-user').value;
  const jenisId = document.getElementById('tx-jenis-selected').value;
  const jumlah = parseIdr(document.getElementById('tx-jumlah').value);
  const ket = document.getElementById('tx-ket').value;
  if(!jenisId){ toast('Pilih rekening tabungan terlebih dahulu'); return; }
  if(!jumlah || jumlah<=0){ toast('Masukkan jumlah yang valid'); return; }
  const s = getSession();
  if(tipe==='setor'){
    try {
      if(s.role==='koordinator'){
        doSetorKoordinator(userId, jenisId, jumlah, ket);
        bigSuccess('Setoran dicatat, menunggu konfirmasi admin');
      } else {
        doSetor(userId, jenisId, jumlah, ket);
        bigSuccess('Setoran berhasil dicatat');
      }
    } catch(e) {
      toast(e.message);
      return;
    }
  } else {
    if(s.role==='koordinator'){
      const r = doTarikKoordinator(userId, jenisId, jumlah, ket);
      if(!r.ok){ toast(r.msg); return; }
      if(r.kurang > 0){
        bigSuccess('Penarikan dicatat. '+rupiah(r.kurang)+' tercatat sebagai hutang admin ke Anda');
      } else {
        bigSuccess('Penarikan berhasil dicatat');
      }
    } else {
      const r = doTarik(userId, jenisId, jumlah, ket);
      if(!r.ok){ toast(r.msg); return; }
      bigSuccess('Penarikan berhasil dicatat');
    }
  }
  closeModal();
  renderContent();
}

function submitTambahAnggota(){
  const nama = document.getElementById('ta-nama').value.trim();
  const nik = document.getElementById('ta-nik').value.trim();
  const alamat = document.getElementById('ta-alamat').value.trim();
  const noHp = document.getElementById('ta-nohp').value.trim();
  const forcedEl = document.getElementById('ta-kelompok-forced');
  const kelompokId = forcedEl ? forcedEl.value : document.getElementById('ta-kelompok').value;

  const baseUsername = nama.toLowerCase().replace(/[^a-z]/g,'');
  let username = baseUsername;
  let counter = 1;
  while(DB.users.some(u=>u.username===username)){ username = baseUsername + counter; counter++; }
  const password = 'anggota123';

  const newUser = {
    id: uid('u'), username, password, role:'nasabah', nama, nik, alamat, noHp, kelompokId,
    noRekening: '2026'+String(1000+DB.users.length), saham:{s_A:0,s_B:0,s_C:0}, status:'aktif',

function refreshTambahRekeningJenis(userId){
  const belum = jenisBelumDibuka(userId);
  const sel = document.getElementById('tr-jenis');
  sel.innerHTML = belum.map(j=>`<option value="${j.id}">${j.nama}</option>`).join('') || '<option value="">- Semua jenis sudah dibuka -</option>';
}
function submitTambahRekening(){
  const forcedEl = document.getElementById('tr-user-forced');
  const userId = forcedEl ? forcedEl.value : document.getElementById('tr-user').value;
  const jenisId = document.getElementById('tr-jenis').value;
  const jumlah = parseIdr(document.getElementById('tr-jumlah').value) || 0;
  if(!userId || !jenisId){ toast('Pilih nasabah dan jenis simpanan'); return; }
  if(DB.tabunganAccounts.some(a=>a.userId===userId && a.jenisId===jenisId)){ toast('Rekening jenis ini sudah dibuka'); return; }
  const acc = {id:uid('acc'), userId, jenisId, saldo:0, noRekening:nextAccNo()};
  DB.tabunganAccounts.push(acc);
  if(jumlah>0){
    acc.saldo = jumlah;
    const s = getSession();
    DB.tabunganTx.push({id:uid('tx'), userId, jenisId, tipe:'setor', jumlah, saldoSetelah:acc.saldo, tanggal:nowISO(), oleh:s.userId, keterangan:'Setoran pembukaan rekening'});
  }
  persist();
  addLog('Tambah rekening', userById(userId).nama + ' membuka rekening ' + jenisName(jenisId));
  bigSuccess('Rekening baru berhasil dibuka');
  closeModal();
  renderContent();
}
