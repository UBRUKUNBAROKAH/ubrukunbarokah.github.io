<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="manifest" href="manifest.json">
<title>UB Rukun Barokah</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700;800&family=Plus+Jakarta+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{
  --bg:#F1F6F0;
  --surface:#FFFFFF;
  --primary:#0B3D2E;
  --primary-2:#124F3C;
  --primary-soft:#E4EEE6;
  --gold:#B98F33;
  --gold-soft:#F1E3C2;
  --text:#182620;
  --muted:#5C6E64;
  --border:#DEE7DD;
  --danger:#B3402A;
  --danger-soft:#F7E4DE;
  --ok:#2E7D4F;
  --info:#2E6F8E;
  --info-soft:#DCEAF0;
  --radius-lg:20px;
  --radius-md:14px;
  --radius-sm:10px;
  --shadow: 0 8px 24px -12px rgba(11,61,46,.25);
}
*{box-sizing:border-box;}
html,body{margin:0;padding:0;}
body{
  font-family:'Plus Jakarta Sans', sans-serif;
  background:var(--bg);
  color:var(--text);
  min-height:100vh;
  -webkit-font-smoothing:antialiased;
}
h1,h2,h3,.display{font-family:'Sora',sans-serif;}
.mono{font-family:'IBM Plex Mono',monospace;font-variant-numeric:tabular-nums;}
button{font-family:inherit;cursor:pointer;}
input,select{font-family:inherit;}
::selection{background:var(--gold-soft);}

.phone-wrap{
  width:100%;
  min-height:100vh;
  background:var(--bg);
  position:relative;
  display:flex;
  flex-direction:column;
}

/* batik-inspired signature pattern */
.batik-bg{
  background-color:var(--primary);
  background-image:
    radial-gradient(circle at 10px 10px, rgba(185,143,51,.35) 2px, transparent 2.5px),
    radial-gradient(circle at 30px 30px, rgba(185,143,51,.22) 2px, transparent 2.5px);
  background-size:40px 40px;
}

/* ---------- LOGIN ---------- */
#login-screen{
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:32px 20px;
  position:relative;
  overflow:hidden;
  color:#062f1d;
  background-color:#ffffff;
  background-image:
    radial-gradient(circle at 10% 15%, rgba(16,185,129,.85) 0%, rgba(4,120,87,.75) 30%, transparent 70%),
    radial-gradient(circle at 90% 85%, rgba(5,150,105,.85) 0%, rgba(6,78,59,.8) 35%, transparent 70%);
  background-size:160% 160%;
  animation:gerakCahaya 14s ease-in-out infinite alternate;
}
@keyframes gerakCahaya{
  0%{background-position:0% 10%;}
  50%{background-position:100% 90%;}
  100%{background-position:20% 100%;}
}
#login-screen::before{
  content:'';
  position:absolute; inset:0;
  background-image:radial-gradient(circle at 12px 12px, rgba(6,47,29,.04) 2px, transparent 2.5px);
  background-size:36px 36px;
  pointer-events:none;
}
.login-card{
  position:relative; z-index:1;
  width:100%; max-width:360px;
  background:rgba(255,255,255,.65);
  border:1px solid rgba(255,255,255,.5);
  border-radius:32px;
  padding:34px 26px 28px;
  display:flex;
  flex-direction:column;
  gap:16px;
  backdrop-filter:blur(20px);
  -webkit-backdrop-filter:blur(20px);
  box-shadow:0 30px 60px -18px rgba(4,120,87,.25);
  animation:loginSlideUp .45s cubic-bezier(.22,1,.36,1);
}
.login-illustration{
  position:relative;
  height:128px;
  display:flex; align-items:center; justify-content:center;
  margin-bottom:2px;
}
.login-illustration .badge-circle{
  width:104px;height:104px;border-radius:50%;
  background:var(--primary-soft);
  display:flex;align-items:center;justify-content:center;
  position:relative; z-index:2;
}
.login-illustration .icon-badge{
  width:66px;height:66px;border-radius:18px;
  background:var(--primary);
  color:#fff;
  display:flex;align-items:center;justify-content:center;font-size:30px;
  box-shadow:0 10px 22px -8px rgba(11,61,46,.55);
  overflow:hidden;
  animation:loginPop .5s cubic-bezier(.22,1,.36,1);
}
.login-illustration .coin{
  position:absolute;
  border-radius:50%;
  background:var(--gold);
  color:#fff;
  display:flex;align-items:center;justify-content:center;
  font-weight:800;font-family:'Sora',sans-serif;
  border:2px solid var(--gold-soft);
  box-shadow:0 8px 16px -6px rgba(185,143,51,.6);
  animation:coinFloat 3s ease-in-out infinite;
  z-index:3;
}
.login-illustration .coin.c1{ width:32px;height:32px;font-size:12px; top:0; left:20%; animation-delay:0s; }
.login-illustration .coin.c2{ width:26px;height:26px;font-size:10.5px; top:16px; right:16%; animation-delay:.5s; }
.login-illustration .coin.c3{ width:22px;height:22px;font-size:9.5px; bottom:6px; left:10%; animation-delay:1s; }
@keyframes coinFloat{
  0%,100%{transform:translateY(0);}
  50%{transform:translateY(-9px);}
}
.login-title{text-align:center;}
.login-title h1{margin:0 0 4px;font-size:19px;font-weight:800;color:var(--text);}
.login-title p{margin:0;font-size:12.5px;color:var(--muted);}
.field-pill{position:relative;}
.field-pill > svg{
  position:absolute; left:16px; top:50%; transform:translateY(-50%);
  color:var(--muted); pointer-events:none;
}
.field-pill input{
  width:100%;
  border:1.5px solid var(--border);
  background:var(--bg);
  border-radius:999px;
  padding:13px 16px 13px 42px;
  font-size:14px;
  outline:none;
  transition:border-color .15s, background .15s;
}
.field-pill input:focus{border-color:var(--primary); background:var(--surface);}
.field-pill .field-toggle{
  position:absolute; right:6px; top:50%; transform:translateY(-50%);
  background:none;border:none;padding:8px;border-radius:50%;
  color:var(--muted); display:flex; align-items:center; justify-content:center;
  width:33px; height:33px;
}
.field-pill .field-toggle svg{ display:block; }
.field-pill .field-toggle:active{background:var(--primary-soft);}
.btn-pill{
  width:100%;
  border:none; border-radius:999px; padding:14px 16px;
  font-weight:700; font-size:14.5px;
  background:var(--primary); color:#fff;
  display:flex; align-items:center; justify-content:center; gap:8px;
  box-shadow:0 14px 26px -10px rgba(11,61,46,.55);
  margin-top:4px;
}
.btn-pill:active{background:var(--primary-2);}
.login-footer-link{
  text-align:center; font-size:11.5px; color:var(--muted);
  text-decoration:underline; text-underline-offset:2px; cursor:pointer;
}
.login-footer-note{
  text-align:center; font-size:11px; color:var(--muted); margin-top:2px;
}
@keyframes loginPop{
  0%{transform:scale(.6) rotate(-8deg); opacity:0;}
  100%{transform:scale(1) rotate(0); opacity:1;}
}
@keyframes loginSlideUp{
  0%{transform:translateY(24px); opacity:0;}
  100%{transform:translateY(0); opacity:1;}
}
.btn-loading{position:relative; color:transparent !important;}
.btn-loading::after{
  content:''; position:absolute; width:16px;height:16px;
  border-radius:50%; border:2.5px solid rgba(255,255,255,.4); border-top-color:#fff;
  animation:btnSpin .7s linear infinite;
}
@keyframes btnSpin{to{transform:rotate(360deg);}}

/* ---- Desktop: card slightly larger, more breathing room ---- */
@media (min-width: 900px){
  .login-card{
    max-width:400px;
    padding:42px 36px 34px;
    border-radius:36px;
  }
  .login-illustration{height:150px;}
  .login-illustration .badge-circle{width:120px;height:120px;}
  .login-illustration .icon-badge{width:76px;height:76px;font-size:34px;}
  .login-title h1{font-size:22px;}
  .login-title p{font-size:13px;}
}


.field{display:flex;flex-direction:column;gap:6px;}
.field label{font-size:12.5px;font-weight:600;color:var(--muted);}
.field input, .field select, .field textarea{
  border:1.5px solid var(--border);
  border-radius:var(--radius-sm);
  padding:12px 14px;
  font-size:14.5px;
  background:#FBFCFA;
  outline:none;
  transition:border-color .15s;
}
.field input:focus, .field select:focus, .field textarea:focus{border-color:var(--primary);}
.btn{
  border:none;
  border-radius:var(--radius-sm);
  padding:13px 16px;
  font-weight:700;
  font-size:14.5px;
  display:inline-flex;align-items:center;justify-content:center;gap:8px;
}
.btn-primary{background:var(--primary);color:#fff;}
.btn-primary:active{background:var(--primary-2);}
.btn-gold{background:var(--gold);color:#fff;}
.btn-outline{background:transparent;border:1.5px solid var(--border);color:var(--text);}
.btn-danger{background:var(--danger-soft);color:var(--danger);}
.btn-block{width:100%;}
.btn-sm{padding:8px 12px;font-size:12.5px;border-radius:8px;}
.icon-btn-sm{width:32px;height:32px;border:none;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:15px;cursor:pointer;}
.ic-danger{background:var(--danger-soft);color:var(--danger);}
.ic-primary{background:var(--primary-soft);color:var(--primary);}
.login-error{background:var(--danger-soft);color:var(--danger);font-size:13px;padding:10px 12px;border-radius:10px;display:none;}
.demo-box{background:var(--primary-soft);border-radius:var(--radius-sm);padding:12px 14px;font-size:11.5px;color:var(--primary);line-height:1.6;}
.demo-box b{font-family:'IBM Plex Mono',monospace;}

/* ---------- APP SHELL ---------- */
#app-screen{display:none;flex-direction:column;min-height:100vh;}
.app-header{
  background:var(--primary);
  color:#fff;
  padding:18px 18px 20px;
  display:flex;align-items:center;justify-content:space-between;
  gap:10px;
}
.app-header .left{display:flex;align-items:center;gap:10px;}
.app-header .koperasi-icon{width:38px;height:38px;border-radius:10px;background:rgba(255,255,255,.15);display:flex;align-items:center;justify-content:center;font-size:20px;overflow:hidden;}
.app-header .titles .name{font-weight:700;font-size:14.5px;line-height:1.2;font-family:'Sora',sans-serif;}
.app-header .titles .role{font-size:11px;color:var(--gold-soft);text-transform:uppercase;letter-spacing:.6px;}
.icon-btn{background:rgba(255,255,255,.14);border:none;color:#fff;width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;}

.profile-dropdown{position:relative;}
.profile-avatar{width:36px;height:36px;border-radius:50%;background:rgba(255,255,255,.18);display:flex;align-items:center;justify-content:center;cursor:pointer;color:#fff;transition:.2s;}
.profile-avatar:hover{background:rgba(255,255,255,.28);}
.dropdown-menu{position:absolute;right:0;top:44px;min-width:170px;background:#fff;border-radius:12px;box-shadow:0 8px 30px rgba(0,0,0,.15);padding:6px;display:none;z-index:999;}
.dropdown-menu.show{display:block;}
.dropdown-item{padding:10px 14px;border-radius:8px;font-size:13px;color:#222;cursor:pointer;transition:.15s;}
.dropdown-item:hover{background:#f5f5f5;}
.dropdown-item.logout{color:#e74c3c;}
.dropdown-item.logout:hover{background:#fee;}
.dropdown-divider{height:1px;background:#eee;margin:4px 8px;}

#content{flex:1;padding:18px 18px 90px;overflow-y:auto;}
.page-title{font-family:'Sora',sans-serif;font-size:18px;font-weight:700;margin:2px 0 16px;display:flex;align-items:center;justify-content:space-between;}
.page-title span.sub{display:block;font-family:'Plus Jakarta Sans';font-size:12px;color:var(--muted);font-weight:500;margin-top:2px;}

.card{background:var(--surface);border-radius:var(--radius-lg);padding:18px;box-shadow:var(--shadow);margin-bottom:14px;border:1px solid var(--border);}
.balance-card{background:linear-gradient(135deg,var(--primary) 0%, var(--primary-2) 100%);color:#fff;border:none;position:relative;overflow:hidden;}
.balance-card::after{content:"";position:absolute;right:-30px;top:-30px;width:140px;height:140px;border-radius:50%;background:rgba(255,255,255,.06);}
.balance-card .label{font-size:12px;color:rgba(255,255,255,.75);}
.balance-card .amount{font-family:'Sora',sans-serif;font-size:26px;font-weight:700;margin-top:6px;}
.balance-card .rekening{font-family:'IBM Plex Mono',monospace;font-size:11.5px;color:var(--gold-soft);margin-top:10px;letter-spacing:.5px;}

.grid-menu{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;}
.grid-menu .item{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-md);padding:14px 8px;text-align:center;display:flex;flex-direction:column;align-items:center;gap:8px;}
.grid-menu .item .ic{width:42px;height:42px;border-radius:12px;background:var(--primary-soft);color:var(--primary);display:flex;align-items:center;justify-content:center;}
.grid-menu .item span{font-size:11.5px;font-weight:600;line-height:1.25;}

.list-row{display:flex;align-items:center;justify-content:space-between;padding:12px 0;border-bottom:1px solid var(--border);gap:10px;}
.list-row:last-child{border-bottom:none;}
.list-row .row-ic{width:32px;height:32px;border-radius:50%;background:var(--primary-soft);color:var(--primary);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.list-row .info{min-width:0;flex:1;}
.list-row .info .title{font-weight:600;font-size:13.5px;}
.list-row .info .sub{font-size:11.5px;color:var(--muted);margin-top:2px;}
.list-row .amt{font-family:'IBM Plex Mono',monospace;font-weight:600;font-size:13.5px;}
.amt.plus{color:var(--ok);}
.amt.minus{color:var(--danger);}

.badge{font-size:10.5px;font-weight:700;padding:3px 9px;border-radius:20px;display:inline-block;letter-spacing:.3px;}
.badge-green{background:var(--primary-soft);color:var(--primary);}
.badge-gold{background:var(--gold-soft);color:#8a6a1f;}
.badge-red{background:var(--danger-soft);color:var(--danger);}

.tabs{display:flex;gap:6px;background:var(--primary-soft);padding:4px;border-radius:12px;margin-bottom:14px;}
.tabs button{flex:1;border:none;background:transparent;padding:9px 6px;border-radius:9px;font-size:12.5px;font-weight:700;color:var(--primary);}
.tabs button.active{background:var(--primary);color:#fff;}

.search-box{display:flex;align-items:center;gap:8px;background:var(--surface);border:1.5px solid var(--border);border-radius:12px;padding:9px 12px;margin-bottom:14px;flex:1;min-width:0;}
.search-box input{border:none;outline:none;background:transparent;flex:1;font-size:13.5px;min-width:0;}
.toolbar-row{display:flex;gap:8px;align-items:center;margin-bottom:0;}
.toolbar-row .search-box{margin-bottom:0;}
.btn-compact{padding:9px 14px;font-size:12.5px;white-space:nowrap;flex-shrink:0;border-radius:10px;}

.empty-state{text-align:center;padding:40px 10px;color:var(--muted);}
.empty-state .ic{font-size:34px;margin-bottom:10px;}
.empty-state .t{font-weight:700;color:var(--text);font-size:14px;}
.empty-state .d{font-size:12.5px;margin-top:4px;}

/* install prompt */
#install-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);display:flex;align-items:center;justify-content:center;z-index:9999;}
#install-card{background:#fff;border-radius:var(--radius-lg);padding:36px 28px 28px;width:340px;max-width:88vw;text-align:center;box-shadow:0 20px 60px rgba(0,0,0,.25);}
#install-icon{width:64px;height:64px;border-radius:18px;background:var(--primary-soft);display:flex;align-items:center;justify-content:center;font-size:32px;margin:0 auto 14px;}
#install-title{font-family:'Sora',sans-serif;font-size:19px;font-weight:700;color:var(--text);margin-bottom:6px;}
#install-desc{font-size:13px;color:var(--muted);line-height:1.5;}
/* passbook ledger */
.ledger{border:2px solid var(--primary);border-radius:var(--radius-lg);overflow:hidden;box-shadow:0 2px 12px rgba(0,0,0,.06);}
.ledger-head{background:var(--primary);color:#fff;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.4px;display:grid;grid-template-columns:1fr 1.2fr 1fr;padding:10px 14px;}
.ledger-row{display:grid;grid-template-columns:1fr 1.2fr 1fr;padding:11px 14px;border-top:1px solid var(--border);align-items:center;}
.ledger-row:nth-child(even){background:#fafafa;}
.ledger-row .d{font-size:11px;color:var(--muted);}
.ledger-row .k{font-size:12px;}
.ledger-row .j{font-family:'IBM Plex Mono',monospace;font-size:12px;text-align:right;font-weight:600;}

/* bottom nav */
.bottom-nav{
  position:fixed;bottom:0;left:0;right:0;
  background:var(--surface);
  border-top:1px solid var(--border);
  display:flex;
  overflow-x:auto;
  -webkit-overflow-scrolling:touch;
  padding:8px 6px calc(8px + env(safe-area-inset-bottom));
  box-shadow:0 -6px 18px -10px rgba(0,0,0,.15);
}
.bottom-nav button{flex:1;background:none;border:none;display:flex;flex-direction:column;align-items:center;gap:3px;padding:6px 6px;color:var(--muted);font-size:10px;font-weight:600;border-radius:10px;white-space:nowrap;min-width:56px;}
.bottom-nav button.active{color:var(--primary);}
.bottom-nav button.active .ic{background:var(--primary-soft);}
.bottom-nav .ic{width:26px;height:26px;border-radius:8px;display:flex;align-items:center;justify-content:center;}

/* sidebar for desktop */
.sidebar{
  display:none;
  width:220px;
  background:var(--surface);
  border-right:1px solid var(--border);
  padding:18px 12px;
  flex-shrink:0;
}
.sidebar button{
  width:100%;
  background:none;
  border:none;
  display:flex;
  align-items:center;
  gap:10px;
  padding:10px 12px;
  color:var(--muted);
  font-size:13px;
  font-weight:500;
  border-radius:10px;
  margin-bottom:4px;
  cursor:pointer;
  transition:background .15s, color .15s;
}
.sidebar button:hover{background:var(--primary-soft);color:var(--primary);}
.sidebar button.active{background:var(--primary-soft);color:var(--primary);font-weight:600;}
.sidebar button .ic{width:20px;height:20px;display:flex;align-items:center;justify-content:center;}

.app-body{
  display:flex;
  min-height:calc(100vh - 56px);
}
.app-body #content{
  flex:1;
  padding:18px;
  padding-bottom:80px;
}

/* desktop layout */
@media (min-width: 769px){
  .bottom-nav{display:none !important;}
  .sidebar{display:block;}
  .app-header{padding:12px 24px;}
  .app-body #content{padding:24px 32px 24px 24px;}
  .page-title{font-size:22px;}
  .page-title .sub{font-size:13px;}
}

/* mobile layout */
@media (max-width: 768px){
  .bottom-nav{display:flex !important;}
  .sidebar{display:none !important;}
  .app-body #content{padding-bottom:80px;}
}

/* modal */
.modal-overlay{position:fixed;inset:0;background:rgba(10,25,18,.5);z-index:50;display:none;align-items:center;justify-content:center;padding:20px;}
.modal-overlay.show{display:flex;}
.modal{background:var(--surface);width:100%;max-width:420px;border-radius:22px;padding:22px 22px 26px;max-height:88vh;overflow-y:auto;box-shadow:0 20px 50px -12px rgba(0,0,0,.4);animation:modalIn .2s ease;}
@keyframes modalIn{from{transform:scale(.94);opacity:0;}to{transform:scale(1);opacity:1;}}
.modal h3{margin:0 0 16px;font-size:16px;}
.modal-close{position:absolute;}
.confirm-overlay{position:fixed;inset:0;background:rgba(10,25,18,.6);z-index:60;display:none;align-items:center;justify-content:center;padding:24px;}
.confirm-overlay.show{display:flex;}
.confirm-box{background:var(--surface);border-radius:18px;padding:24px 22px 18px;width:100%;max-width:320px;box-shadow:0 20px 50px -12px rgba(0,0,0,.4);animation:confirmIn .2s ease;}
@keyframes confirmIn{from{transform:scale(.92);opacity:0;}to{transform:scale(1);opacity:1;}}
.confirm-box .icon{width:48px;height:48px;border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:24px;margin:0 auto 14px;}
.confirm-box .icon.danger{background:var(--danger-soft);color:var(--danger);}
.confirm-box .icon.warning{background:var(--gold-soft);color:#8a6a1f;}
.confirm-box .msg{text-align:center;font-size:14px;line-height:1.5;margin-bottom:20px;color:var(--text);}
.confirm-box .msg b{display:block;font-size:15px;margin-bottom:4px;}
.confirm-actions{display:flex;gap:10px;}
.confirm-actions .btn{flex:1;padding:12px;font-size:14px;}
.form-row{display:flex;flex-direction:column;gap:6px;margin-bottom:12px;}
.form-row label{font-size:12px;font-weight:600;color:var(--muted);}
.form-row input,.form-row select,.form-row textarea{border:1.5px solid var(--border);border-radius:10px;padding:11px 12px;font-size:13.5px;outline:none;background:#FBFCFA;resize:vertical;}
.form-row input:focus,.form-row select:focus,.form-row textarea:focus{border-color:var(--primary);}
.tx-acc-row{cursor:pointer;border:1.5px solid var(--border);border-radius:12px;padding:10px 12px;margin-bottom:8px;display:flex;justify-content:space-between;align-items:center;transition:border-color .12s, background .12s;}

/* =========================================================
   DATABASE (Supabase)
========================================================= */
const SESSION_KEY = 'ub_rukun_barokah_session_v1';

function uid(prefix){ return (prefix||'id') + '_' + Math.random().toString(36).slice(2,9); }
function nowISO(){ return new Date().toISOString(); }
function rupiah(n){ n = Number(n)||0; return 'Rp' + n.toLocaleString('id-ID'); }
// Parse IDR: hapus titik (pemisah ribuan), ganti koma jadi titik (desimal)
function parseIdr(v){ if(typeof v==='number') return v; if(!v) return 0; return parseFloat(String(v).replace(/\./g,'').replace(',','.'))||0; }
function marginNominalOf(p){
  if(p.marginNominal) return p.marginNominal;
  if(p.marginPersen) return Math.round(p.jumlahPinjaman * p.marginPersen / 100);
  return 0;
}

// ---- Wrapper for backward compat ----
async function loadDB() {
  await initSupabaseDB();
  return DB;
}
function fmtDate(iso){ const d = new Date(iso); return d.toLocaleDateString('id-ID',{day:'2-digit',month:'short',year:'numeric'}) + ' ' + d.toLocaleTimeString('id-ID',{hour:'2-digit',minute:'2-digit'}); }
function fmtDateShort(iso){ const d = new Date(iso); return d.toLocaleDateString('id-ID',{day:'2-digit',month:'short',year:'2-digit'}); }
function initials(name){ return (name||'?').split(' ').filter(Boolean).slice(0,2).map(w=>w[0]).join('').toUpperCase(); }

// ---- Transform snake_case (DB) to camelCase (JS) ----
function toCamel(obj) {
  if (!obj || typeof obj !== 'object') return obj;
  if (Array.isArray(obj)) return obj.map(toCamel);
  const out = {};
  for (const [k, v] of Object.entries(obj)) {
    const ck = k.replace(/_([a-z])/g, (_, l) => l.toUpperCase());
    out[ck] = toCamel(v);
  }
  return out;
}

// ---- Transform camelCase (JS) to snake_case (DB) ----
function toSnake(obj) {
  if (!obj || typeof obj !== 'object') return obj;
  if (Array.isArray(obj)) return obj.map(toSnake);
  const out = {};
  for (const [k, v] of Object.entries(obj)) {
    const sk = k.replace(/[A-Z]/g, l => '_' + l.toLowerCase());
    out[sk] = toSnake(v);
  }
  return out;
}

/* =========================================================
   SUPABASE DATABASE LAYER
========================================================= */
let DB = {}; // Global DB object (mirrors localStorage structure)
let DB_LOADED = false;

// ---- Initialize DB from Supabase ----
async function initSupabaseDB() {
  if (DB_LOADED) return DB;
  
  try {
    // Load all tables in parallel
    const [
      users, anggota, kelompok, jenisTabungan, tabunganAccounts, tabunganTx,
      pembiayaan, angsuran, jenisSaham, kepemilikanSaham,
      pengaturan, setoran, logs
    ] = await Promise.all([
      supabaseClient.from(TABLES.users).select('*'),
      supabaseClient.from(TABLES.anggota).select('*'),
      supabaseClient.from(TABLES.kelompok).select('*'),
      supabaseClient.from(TABLES.jenis_tabungan).select('*'),
      supabaseClient.from(TABLES.tabungan_accounts).select('*'),
      supabaseClient.from(TABLES.tabungan_tx).select('*'),
      supabaseClient.from(TABLES.pembiayaan).select('*'),
      supabaseClient.from(TABLES.angsuran).select('*'),
      supabaseClient.from(TABLES.jenis_saham).select('*'),
      supabaseClient.from(TABLES.kepemilikan_saham).select('*'),
      supabaseClient.from(TABLES.pengaturan_koperasi).select('*').eq('id', 'koperasi').single(),
      supabaseClient.from(TABLES.setoran).select('*'),
      supabaseClient.from(TABLES.logs).select('*').order('created_at', {ascending: false}).limit(100)
    ]);

    // Transform to camelCase
    const u = toCamel(users.data || []);
    const a = toCamel(anggota.data || []);
    const k = toCamel(kelompok.data || []);
    const jt = toCamel(jenisTabungan.data || []);
    const ta = toCamel(tabunganAccounts.data || []);
    const ttx = toCamel(tabunganTx.data || []);
    const pb = toCamel(pembiayaan.data || []);
    const an = toCamel(angsuran.data || []);
    const js = toCamel(jenisSaham.data || []);
    const ks = toCamel(kepemilikanSaham.data || []);
    const pg = toCamel(pengaturan.data);
    const st = toCamel(setoran.data || []);
    const lg = toCamel(logs.data || []);

    // Merge: untuk nasabah, gabung data anggota ke user
    const mergedUsers = u.map(user => {
      if (user.role === 'nasabah' && user.anggotaId) {
        const agg = a.find(x => x.id === user.anggotaId);
        if (agg) return { ...user, ...agg, id: user.id, createdAt: user.createdAt };
      }
      // Koordinator: cari kelompokId dari tabel kelompok
      if (user.role === 'koordinator') {
        const kel = k.find(x => (x.koorId || x.koor_id) === user.id);
        if (kel) user.kelompokId = kel.id;
      }
      return user;
    });

    // Build DB object
    DB = {
      users: mergedUsers,
      koperasi: {
        kelompok: k,
        jenisTabungan: jt,
        info: {},
        sertifikat: {},
        saham: { 
          pemupukanPersen: 35, 
          jenis: js 
        },
        aturKeuangan: {
          marginNominal: 50000,
          marginMaxNominal: 200000,
          pools: [
            {id:'operasional', label:'Operasional', persen:5},
            {id:'cadangan_resiko', label:'Cadangan Resiko', persen:5},
            {id:'bagi_hasil_tabungan', label:'Bagi Hasil Tabungan', persen:2},
            {id:'shu_saham', label:'SHU Saham', persen:2},
            {id:'cad_zakat', label:'Cad. Zakat', persen:2},
            {id:'dana_sosial', label:'Dana Sosial', persen:2},
            {id:'penyusutan', label:'Penyusutan', persen:2}
          ],
          dana: {operasional:0, cadangan_resiko:0, bagi_hasil_tabungan:0, shu_saham:0, cad_zakat:0, dana_sosial:0, penyusutan:0}
        }
      },
      tabunganAccounts: ta,
      tabunganTx: ttx,
      pembiayaan: pb,
      angsuran: an,
      kepemilikanSaham: ks,
      setoran: st,
      logs: lg
    };

    // Merge pengaturan koperasi (deep merge biar nested object gak ketimpa kosong)
    if (pg) {
      if (pg.nama) DB.koperasi.nama = pg.nama;
      if (pg.icon) DB.koperasi.icon = pg.icon;
      if (pg.iconImage) DB.koperasi.iconImage = pg.iconImage;
      if (!DB.koperasi.info) DB.koperasi.info = {};
      if (pg.info && Object.keys(pg.info).length) Object.assign(DB.koperasi.info, pg.info);
      if (!DB.koperasi.sertifikat) DB.koperasi.sertifikat = {};
      if (pg.sertifikat && Object.keys(pg.sertifikat).length) Object.assign(DB.koperasi.sertifikat, pg.sertifikat);
      if (pg.aturKeuangan && Object.keys(pg.aturKeuangan).length) Object.assign(DB.koperasi.aturKeuangan, pg.aturKeuangan);
      if (pg.saham && Object.keys(pg.saham).length) {
        if (pg.saham.pemupukanPersen !== undefined) DB.koperasi.saham.pemupukanPersen = pg.saham.pemupukanPersen;
      }
      // Kembalikan data dari tabel dedicated
      DB.koperasi.kelompok = k;
      DB.koperasi.jenisTabungan = jt;
      DB.koperasi.saham.jenis = js;
    }

    // Ensure defaults
    ensureDefaults();
    DB_LOADED = true;
    
    return DB;
    
  } catch (err) {
    console.error('Gagal load dari Supabase:', err);
    throw err;
  }
}

function ensureDefaults() {
  if(!DB.koperasi.kelompok) DB.koperasi.kelompok = [];
  if(!DB.koperasi.jenisTabungan) DB.koperasi.jenisTabungan = [];
  if(!DB.koperasi.saham || typeof DB.koperasi.saham !== 'object' || Object.keys(DB.koperasi.saham).length===0) DB.koperasi.saham = { pemupukanPersen: 35, jenis: [] };
  if(!DB.koperasi.saham.jenis) DB.koperasi.saham.jenis = [];
  if(!DB.koperasi.aturKeuangan || typeof DB.koperasi.aturKeuangan !== 'object' || Object.keys(DB.koperasi.aturKeuangan).length===0) {
    DB.koperasi.aturKeuangan = {
      marginNominal: 50000,
      marginMaxNominal: 200000,
      pools: [
        {id:'operasional', label:'Operasional', persen:5},
        {id:'cadangan_resiko', label:'Cadangan Resiko', persen:5},

// ---- Persist to Supabase ----
async function persistToSupabase(table, data, id = null) {
  try {
    if (id) {
      return await supabaseClient.from(table).update(data).eq('id', id);
    }
    return await supabaseClient.from(table).insert(data);
  } catch (err) {
    console.error(`Supabase persist error (${table}):`, err);
    return { error: err };
  }
}

async function deleteFromSupabase(table, id) {
  try {
    return await supabaseClient.from(table).delete().eq('id', id);
  } catch (err) {
    console.error(`Supabase delete error (${table}):`, err);
    return { error: err };
  }
}

// ---- Upsert a single row/table directly, isolated from other tables ----
async function upsertToSupabase(table, data) {
  try {
    return await supabaseClient.from(table).upsert(data, { onConflict: 'id' });
  } catch (err) {
    console.error(`Supabase upsert error (${table}):`, err);
    return { error: err };
  }
}

// ---- Persist: simpan langsung ke Supabase (tanpa localStorage) ----
let _syncTimeout = null;
function persist() {
  if (_syncTimeout) clearTimeout(_syncTimeout);
  _syncTimeout = setTimeout(() => {
    syncAllToSupabase().catch(err => console.error('Auto-sync error:', err));
  }, 2000);
}

// ---- Immediate persist (bypasses debounce, waits for confirmation) ----
async function persistNow() {
  if (_syncTimeout) { clearTimeout(_syncTimeout); _syncTimeout = null; }
  try {
    await syncAllToSupabase();
    return { ok: true };
  } catch (err) {
    console.error('persistNow sync error:', err);
    return { ok: false, err };
  }
}

async function syncAllToSupabase() {
  if (!DB_LOADED) return;

  const errors = [];
  async function safeUpsert(table, data, label){
    if (!data || (Array.isArray(data) && data.length===0)) return;
    try {
      const { error } = await supabaseClient.from(table).upsert(data, { onConflict: 'id' });
      if (error) { console.error(`Supabase sync error (${label||table}):`, error); errors.push({table: label||table, error}); }
    } catch (err) {
      console.error(`Supabase sync exception (${label||table}):`, err);
      errors.push({table: label||table, error: err});
    }
  }

  // Sync users (tabel login) + anggota (tabel data nasabah)
  const usersTable = [];
  const anggotaTable = [];
  (DB.users||[]).forEach(u => {
    const userRec = { id: u.id, username: u.username, password: u.password, role: u.role, nama: u.nama, created_at: u.createdAt };
    const aggId = u.anggotaId || (u.role === 'nasabah' ? uid('agg') : null);
    if (u.role === 'nasabah' && aggId) {
      u.anggotaId = aggId;
      userRec.anggota_id = aggId;
      anggotaTable.push({
        id: aggId, nama: u.nama, nik: u.nik||null, alamat: u.alamat||null,
        no_hp: u.noHp||null, kelompok_id: u.kelompokId||null,
        no_rekening: u.noRekening||null, saham: u.saham||{},
        status: u.status||'aktif', created_at: u.createdAt
      });
    }
    usersTable.push(userRec);
  });
  await safeUpsert(TABLES.users, usersTable);
  await safeUpsert(TABLES.anggota, anggotaTable, 'anggota');
  // Sync kelompok
  await safeUpsert(TABLES.kelompok, toSnake(DB.koperasi?.kelompok));
  // Sync jenis tabungan
  await safeUpsert(TABLES.jenis_tabungan, toSnake(DB.koperasi?.jenisTabungan));
  // Sync tabungan accounts
  await safeUpsert(TABLES.tabungan_accounts, toSnake(DB.tabunganAccounts));
  // Sync tabungan tx
  const txSnake = DB.tabunganTx?.map(t => {
    const s = toSnake(t);
    if (t.tanggal) s.tanggal = t.tanggal;
    return s;
  });
  await safeUpsert(TABLES.tabungan_tx, txSnake);
  // Sync pembiayaan
  const pSnake = DB.pembiayaan?.map(p => {
    const s = toSnake(p);
    if (p.mulai) s.mulai = p.mulai.split('T')[0]; // YYYY-MM-DD
    if (p.riwayatAngsuran) {
      s.riwayat_angsuran = p.riwayatAngsuran;
    }
    return s;
  });
  await safeUpsert(TABLES.pembiayaan, pSnake);
  // Sync angsuran
  await safeUpsert(TABLES.angsuran, toSnake(DB.angsuran));
  // Sync jenis saham
  await safeUpsert(TABLES.jenis_saham, toSnake(DB.koperasi?.saham?.jenis));
  // Sync kepemilikan saham
  await safeUpsert(TABLES.kepemilikan_saham, toSnake(DB.kepemilikanSaham));
  // Sync setoran
  await safeUpsert(TABLES.setoran, toSnake(DB.setoran), 'setoran');
  // Sync logs + cleanup (keep max 500 row)
  await safeUpsert(TABLES.logs, toSnake(DB.logs));
  try {
    const { count } = await supabaseClient.from(TABLES.logs).select('*', { count: 'exact', head: true });
    if (count && count > 500) {
      const { data: old } = await supabaseClient.from(TABLES.logs).select('id').order('created_at', {ascending: true}).limit(count - 500);
      if (old && old.length) {
        const ids = old.map(r=>r.id);
        for (let i = 0; i < ids.length; i += 100) {
          await supabaseClient.from(TABLES.logs).delete().in('id', ids.slice(i, i + 100));
        }
      }
    }
  } catch(e){} // cleanup error aman diabaikan
  // Sync pengaturan koperasi (single row) - JSONB fields jangan di-toSnake
  const pg = {
    id: 'koperasi',
    nama: DB.koperasi.nama,
    icon: DB.koperasi.icon,
    icon_image: DB.koperasi.iconImage || null,
    info: DB.koperasi.info || {},
    sertifikat: DB.koperasi.sertifikat || {},
    saham: { pemupukanPersen: DB.koperasi.saham?.pemupukanPersen || 35 },
    atur_keuangan: DB.koperasi.aturKeuangan || {}
  };
  await safeUpsert(TABLES.pengaturan_koperasi, [pg], 'pengaturan_koperasi');

  if (errors.length) {
    console.error('Auto-sync selesai dengan error pada tabel:', errors.map(e=>e.table).join(', '));
    throw new Error('Sync gagal pada: ' + errors.map(e=>e.table).join(', '));
  }
  console.log('Auto-sync to Supabase berhasil');
}

  if(!user){
    document.getElementById('login-screen').style.display='flex';
    document.getElementById('app-screen').style.display='none';

  }

  const s = getSession();

  persist();
}

/* =========================================================
   SESSION / AUTH
========================================================= */
function getSession(){
  const raw = sessionStorage.getItem(SESSION_KEY);
  return raw ? JSON.parse(raw) : null;
}
function setSession(user){
  sessionStorage.setItem(SESSION_KEY, JSON.stringify({userId:user.id, role:user.role}));
}
function clearSession(){ sessionStorage.removeItem(SESSION_KEY); }
function currentUser(){
  const s = getSession();
  if(!s) return null;
  return DB.users.find(u=>u.id===s.userId) || null;
}

async function handleLogin(){
  const submitBtn = document.getElementById('login-submit-btn');
  submitBtn.classList.add('btn-loading');
  submitBtn.disabled = true;
  try{
    const username = document.getElementById('login-username').value.trim();
    const password = document.getElementById('login-password').value;
    const errBox = document.getElementById('login-error');
    if(!DB || !Array.isArray(DB.users)){
      console.warn('DB tidak valid saat login, mencoba memuat ulang DB');
      await loadDB();
    }
    const user = (DB.users||[]).find(u=>u.username===username && u.password===password);
    if(!user){
      errBox.textContent = 'Nama pengguna atau kata sandi salah.';
      errBox.style.display = 'block';
      return;
    }
  if(user.status==='nonaktif'){
    errBox.textContent = 'Akun ini telah dinonaktifkan. Hubungi administrator.';
    errBox.style.display = 'block';
    return;
  }
  errBox.style.display = 'none';
    setSession(user);
    addLog('Masuk aplikasi', user.nama + ' (' + user.role + ') masuk ke aplikasi');
    boot();
  }catch(err){
    console.error('Error saat proses login:', err);
    const errBox = document.getElementById('login-error');
    errBox.textContent = 'Terjadi kesalahan saat login. Cek konsol untuk detail.';
    errBox.style.display = 'block';
  }finally{
    submitBtn.classList.remove('btn-loading');
    submitBtn.disabled = false;
  }
}
function togglePasswordVisibility(){
  const input = document.getElementById('login-password');
  const isHidden = input.type === 'password';
  input.type = isHidden ? 'text' : 'password';
}
function handleLogout(){
  const u = currentUser();
  if(u) addLog('Keluar aplikasi', u.nama + ' keluar dari aplikasi');
  clearSession();
  document.getElementById('login-username').value='';
  document.getElementById('login-password').value='';
  boot();
}

  const moreBtn = '<button class="'+(moreActive?'active':'')+'" onclick="openMoreMenu()"><span class="ic">'+moreIcon+'</span>Lainnya</button>';

  // Render bottom nav (mobile): menu inti + tombol "Lainnya" (kalau ada menu tambahan)

  const sidebar = document.getElementById('sidebar');

function openModal(html){

  document.getElementById('modal-overlay').classList.add('show');
}
function closeModal(){ document.getElementById('modal-overlay').classList.remove('show'); }
document.getElementById('modal-overlay').addEventListener('click', (e)=>{

});

function confirmDialog(msg, sub, type, onConfirm, btnLabel){
  const overlay = document.createElement('div');
  overlay.className = 'confirm-overlay show';
  overlay.innerHTML = `
    <div class="confirm-box">
      <div class="icon ${type||'danger'}">
        ${type==='warning'?'<svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M12 8v4"/><path d="M12 16h0"/></svg>':'<svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18"/><path d="M8 6V4a1 1 0 0 1 1-1h6a1 1 0 0 1 1 1v2"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M5 6l1 14a2 2 0 0 0 2 2h8a2 2 0 0 0 2-2l1-14"/></svg>'}
      </div>
      <div class="msg"><b>${msg}</b>${sub?'<span style="color:var(--muted);font-size:13px;">'+sub+'</span>':''}</div>
      <div class="confirm-actions">
        <button class="btn btn-outline" id="confirm-batal">Batal</button>
        <button class="btn ${type==='warning'?'btn-gold':'btn-danger'}" id="confirm-ya">${btnLabel||(type==='warning'?'Ya, aktifkan':'Ya, hapus')}</button>
      </div>
    </div>
  `;
  document.body.appendChild(overlay);
  document.getElementById('confirm-batal').onclick = ()=>{ overlay.remove(); };
  document.getElementById('confirm-ya').onclick = ()=>{ overlay.remove(); onConfirm(); };
  overlay.onclick = (e)=>{ if(e.target===overlay) overlay.remove(); };
}

/* =========================================================
   DATA HELPERS
========================================================= */
function userAccounts(userId){
  return DB.tabunganAccounts
    .filter(a=>a.userId===userId)
    .map(a=>({acc:a, j: DB.koperasi.jenisTabungan.find(j=>j.id===a.jenisId)}))
    .filter(x=>x.j);
}
function jenisBelumDibuka(userId){
  const opened = DB.tabunganAccounts.filter(a=>a.userId===userId).map(a=>a.jenisId);
  return DB.koperasi.jenisTabungan.filter(j=>!opened.includes(j.id));
}
function nextAccNo(){
  const max = DB.tabunganAccounts.reduce((m,a)=>{
    const n = parseInt((a.noRekening||'0').split('-').pop(), 10);
    return n>m ? n : m;
  }, 0);
  return '2026-'+String(10001+max).slice(-5);
}
function getAccount(userId, jenisId){
  let acc = DB.tabunganAccounts.find(a=>a.userId===userId && a.jenisId===jenisId);
  if(!acc) return null;
  if(!acc.noRekening) acc.noRekening = nextAccNo();
  return acc;
}
function hapusSemuaRekening(userId){
  const user = userById(userId);
  if(!user) return;
  const jml = DB.tabunganAccounts.filter(a=>a.userId===userId).length;
  if(!jml) return;
  confirmDialog('Hapus semua rekening?', 'Semua rekening tabungan milik ' + user.nama + ' (' + jml + ' rekening) beserta transaksinya akan dihapus.', 'danger', ()=>{
    const ids = DB.tabunganAccounts.filter(a=>a.userId===userId).map(a=>a.id);
    DB.tabunganAccounts = DB.tabunganAccounts.filter(a=>!ids.includes(a.id));
    DB.tabunganTx = DB.tabunganTx.filter(t=>t.userId!==userId);
    persist();
    ids.forEach(id => supabaseClient.from(TABLES.tabungan_accounts).delete().eq('id', id).then());
    supabaseClient.from(TABLES.tabungan_tx).delete().eq('user_id', userId).then();
    addLog('Hapus semua rekening', user.nama);
    toast('Semua rekening berhasil dihapus');
    renderContent();
  });
}
function totalSaldoUser(userId){
  return DB.tabunganAccounts.filter(a=>a.userId===userId).reduce((s,a)=>s+a.saldo,0);
}
function txForUser(userId){
  return DB.tabunganTx.filter(t=>t.userId===userId).sort((a,b)=> new Date(b.tanggal)-new Date(a.tanggal));
}
function jenisName(jenisId){
  const j = DB.koperasi.jenisTabungan.find(j=>j.id===jenisId);
  return j ? j.nama : '-';
}
function kelompokName(kelompokId){
  const k = DB.koperasi.kelompok.find(k=>k.id===kelompokId);
  return k ? k.nama : '-';
}
function userById(id){ return DB.users?.find(u=>u.id===id) || { nama:'-', kelompokId:null, role:'-', noRekening:'-' }; }
function nasabahOfKelompok(kelompokId){ return DB.users.filter(u=>u.role==='nasabah' && u.kelompokId===kelompokId); }
function pembiayaanForUser(userId){ return DB.pembiayaan.filter(p=>p.userId===userId).sort((a,b)=>new Date(b.mulai)-new Date(a.mulai)); }
function koordinatorForKelompok(kelompokId){
  const k = DB.koperasi.kelompok.find(k=>k.id===kelompokId);
  return k && k.koordinatorId ? userById(k.koordinatorId) : null;
}

function doSetor(userId, jenisId, jumlah, keterangan){
  const acc = getAccount(userId, jenisId);
  if(!acc) throw new Error('Rekening tabungan belum dibuka untuk jenis ini.');
  acc.saldo += jumlah;
  const s = getSession();
  DB.tabunganTx.push({id:uid('tx'), userId, jenisId, tipe:'setor', jumlah, saldoSetelah:acc.saldo, tanggal:nowISO(), oleh:s.userId, keterangan: keterangan||'Setoran tunai'});
  persist();
  addLog('Setor tabungan', userById(userId).nama + ' - ' + jenisName(jenisId) + ' - ' + rupiah(jumlah));
}
function doSetorKoordinator(userId, jenisId, jumlah, keterangan){
  const s = getSession();
  doSetor(userId, jenisId, jumlah, keterangan);
  DB.setoran.push({id:uid('st'), userId, jenisId, jumlah, keterangan: keterangan||'Setoran tunai', tanggal:nowISO(), dibuatOleh:s.userId, status:'di_koordinator'});
  persist();
}
async function confirmSetoran(setoranId){
  const st = DB.setoran.find(s=>s.id===setoranId);
  if(!st || st.status!=='di_koordinator') return {ok:false, msg:'Setoran tidak ditemukan atau sudah dikonfirmasi.'};
  const s = getSession();
  if(s.role!=='admin') return {ok:false, msg:'Hanya admin yang bisa konfirmasi setoran.'};
  st.status = 'sudah_di_admin';
  st.dikonfirmasiOleh = s.userId;
  st.waktuKonfirmasi = nowISO();
  if(SUPABASE_ENABLED){
    const { error } = await upsertToSupabase(TABLES.setoran, toSnake(st));
    if(error) console.error('Gagal konfirmasi setoran di Supabase:', error);
  }
  persist();
  if(st.jenis==='angsuran'){
    addLog('Terima angsuran dari koordinator', rupiah(st.jumlah)+' - '+userById(st.userId).nama+' (Angsuran ke-...)');
  } else {
    addLog('Terima setoran dari koordinator', rupiah(st.jumlah)+' - '+userById(st.userId).nama+' ('+jenisName(st.jenisId)+')');
  }
  return {ok:true};
}
function doTarik(userId, jenisId, jumlah, keterangan){
  const acc = getAccount(userId, jenisId);
  if(!acc) return {ok:false, msg:'Rekening tabungan belum dibuka untuk jenis ini.'};
  if(acc.saldo < jumlah) return {ok:false, msg:'Saldo tidak mencukupi.'};
  acc.saldo -= jumlah;
  const s = getSession();
  DB.tabunganTx.push({id:uid('tx'), userId, jenisId, tipe:'tarik', jumlah, saldoSetelah:acc.saldo, tanggal:nowISO(), oleh:s.userId, keterangan: keterangan||'Penarikan tunai'});
  persist();
  addLog('Tarik tabungan', userById(userId).nama + ' - ' + jenisName(jenisId) + ' - ' + rupiah(jumlah));
  return {ok:true};
}
function doBayarAngsuran(pembId, oleh, jumlah){
  const p = DB.pembiayaan.find(p=>p.id===pembId);
  if(!p || p.status==='lunas') return {ok:false, msg:'Pembiayaan tidak ditemukan atau sudah lunas.'};
  if(p.statusPengajuan!=='approved') return {ok:false, msg:'Pembiayaan belum disetujui admin.'};
  if(!jumlah || jumlah<=0) return {ok:false, msg:'Jumlah tidak valid.'};
  const angsuranKe = p.tenor - p.sisaAngsuran + 1;
  p.riwayatAngsuran.push({id:uid('ang'), tanggal:nowISO(), jumlah, oleh, angsuranKe});
  p.sisaAngsuran--;
  const totalKew = p.jumlahPinjaman + marginNominalOf(p);
  const totalDibayar = p.riwayatAngsuran.reduce((s,a)=>s+a.jumlah, 0);
  if(totalDibayar >= totalKew || p.sisaAngsuran<=0) p.status='lunas';
  const olehUser = userById(oleh);
  const isAdmin = olehUser && olehUser.role==='admin';
  const st = {id:uid('st'), userId:p.userId, jenis:'angsuran', pembiayaanId:p.id, jumlah, keterangan:'Angsuran ke-'+angsuranKe, tanggal:nowISO(), dibuatOleh:oleh, status: isAdmin ? 'sudah_di_admin' : 'di_koordinator'};
  if(isAdmin){ st.dikonfirmasiOleh = oleh; st.waktuKonfirmasi = nowISO(); }
  DB.setoran.push(st);
  const atur = DB.koperasi.aturKeuangan;
  if(atur && atur.pools && atur.dana && marginNominalOf(p)){
    const marginPerAngsuran = Math.round(marginNominalOf(p) / p.tenor);
    atur.pools.forEach(pool=>{
      const alokasi = Math.round(marginPerAngsuran * pool.persen / 100);
      atur.dana[pool.id] = (atur.dana[pool.id]||0) + alokasi;
    });
  }
  persist();
  addLog('Bayar angsuran', userById(p.userId).nama + ' - Angsuran ke-'+angsuranKe+' - '+rupiah(jumlah));
  return {ok:true};
}

  const selEnd = activeId && active.selectionEnd!=null ? active.selectionEnd : null;
  const routes = {
    admin_beranda: renderAdminBeranda,
    admin_anggota: renderAdminAnggota,
    admin_tabungan: renderAdminTabungan,
    admin_pembiayaan: renderAdminPembiayaan,

    nas_beranda: renderNasBeranda,

    nas_tabungan: renderNasTabungan,
    nas_pembiayaan: renderNasPembiayaan,
    profil_saya: renderProfilSaya
  };
  const fn = routes[currentPage] || routes[defaultPageFor(user.role)];
  el.innerHTML = fn(user);
  if(activeId){
    const toFocus = document.getElementById(activeId);
    if(toFocus){
      toFocus.focus();
      if(selStart!=null && toFocus.setSelectionRange){
        try{ toFocus.setSelectionRange(selStart, selEnd); }catch(e){}
      }
    }
  } else {
    el.scrollTop = 0;
  }
}

function openSetorTarikModal(prefUserId, defaultTipe){
  const nasabah = DB.users.filter(u=>u.role==='nasabah');
  const initialUser = prefUserId || (nasabah[0] && nasabah[0].id);
  const judul = defaultTipe==='setor' ? 'Setor Tunai' : defaultTipe==='tarik' ? 'Tarik Tunai' : 'Transaksi Tabungan';
  openModal(`
    <h3>${judul}</h3>
    <div class="form-row"><label>Nasabah</label>
      <select id="tx-user" onchange="refreshTxPassbook(this.value)" ${prefUserId?'disabled':''}>
        ${nasabah.map(u=>`<option value="${u.id}" ${initialUser===u.id?'selected':''}>${u.nama} &middot; ${kelompokName(u.kelompokId)}</option>`).join('')}
      </select>
      ${prefUserId?`<input type="hidden" id="tx-user-forced" value="${prefUserId}">`:''}
    </div>
    <div class="section-label" style="margin-top:16px;">Buku tabungan &mdash; pilih rekening</div>
    <div id="tx-passbook"></div>
    <input type="hidden" id="tx-jenis-selected" value="">
    <div class="form-row" style="margin-top:14px;"><label>Jumlah (Rp)</label><input type="number" id="tx-jumlah" placeholder="cth. 50000" min="1000" step="1000"></div>
    <div class="form-row"><label>Keterangan (opsional)</label><input type="text" id="tx-ket" placeholder="cth. Setoran bulan Juli"></div>
    <div class="modal-actions">
      <button class="btn btn-outline" onclick="closeModal()">Batal</button>
      ${defaultTipe==='setor' ? `<button class="btn btn-primary" onclick="submitTx('setor')">${ICONS.down} Setor</button>` : ''}
      ${defaultTipe==='tarik' ? `<button class="btn btn-danger" onclick="submitTx('tarik')">${ICONS.up} Tarik</button>` : ''}
    </div>
  `);
  refreshTxPassbook(initialUser);
}
function refreshTxPassbook(userId){
  const accs = userAccounts(userId);
  const box = document.getElementById('tx-passbook');
  if(!accs.length){
    box.innerHTML = `<div class="hint">Anggota ini belum memiliki rekening tabungan. Buka rekening dulu lewat "Tambah Rekening".</div>`;
    document.getElementById('tx-jenis-selected').value = '';
    return;
  }
  box.innerHTML = accs.map(({j,acc},idx)=>`
    <div class="tx-acc-row ${idx===0?'selected':''}" data-jenis="${j.id}" onclick="selectTxJenis('${j.id}')">
      <div><div style="font-weight:600;font-size:13px;">${j.nama}</div><div class="hint" style="margin-top:2px;">Saldo saat ini</div></div>
      <div class="mono" style="font-weight:700;">${rupiah(acc.saldo)}</div>
    </div>
  `).join('');
  document.getElementById('tx-jenis-selected').value = accs[0].j.id;
}
function selectTxJenis(jenisId){
  document.getElementById('tx-jenis-selected').value = jenisId;
  document.querySelectorAll('.tx-acc-row').forEach(el=>{
    el.classList.toggle('selected', el.dataset.jenis===jenisId);
  });
}
function submitTx(tipe){
  const forcedEl = document.getElementById('tx-user-forced');
  const userId = forcedEl ? forcedEl.value : document.getElementById('tx-user').value;
  const jenisId = document.getElementById('tx-jenis-selected').value;
  const jumlah = parseIdr(document.getElementById('tx-jumlah').value);
  const ket = document.getElementById('tx-ket').value;
  if(!jenisId){ toast('Pilih rekening tabungan terlebih dahulu'); return; }
  if(!jumlah || jumlah<=0){ toast('Masukkan jumlah yang valid'); return; }
  const s = getSession();
  if(tipe==='setor'){
    try {
      if(s.role==='koordinator'){
        doSetorKoordinator(userId, jenisId, jumlah, ket);
        toast('Setoran dicatat, menunggu konfirmasi admin');
      } else {
        doSetor(userId, jenisId, jumlah, ket);
        toast('Setoran berhasil dicatat');
      }
    } catch(e) {
      toast(e.message);
      return;
    }
  } else {
    const r = doTarik(userId, jenisId, jumlah, ket);
    if(!r.ok){ toast(r.msg); return; }
    toast('Penarikan berhasil dicatat');
  }
  closeModal();
  renderContent();
}

function submitTambahAnggota(){
  const nama = document.getElementById('ta-nama').value.trim();
  const nik = document.getElementById('ta-nik').value.trim();
  const alamat = document.getElementById('ta-alamat').value.trim();
  const noHp = document.getElementById('ta-nohp').value.trim();
  const forcedEl = document.getElementById('ta-kelompok-forced');
  const kelompokId = forcedEl ? forcedEl.value : document.getElementById('ta-kelompok').value;
  if(!nama || !nik || !alamat || !noHp || !kelompokId){ toast('Lengkapi semua data anggota'); return; }

  const baseUsername = nama.toLowerCase().replace(/[^a-z]/g,'');
  let username = baseUsername;
  let counter = 1;
  while(DB.users.some(u=>u.username===username)){ username = baseUsername + counter; counter++; }
  const password = 'anggota123';

  const newUser = {
    id: uid('u'), username, password, role:'nasabah', nama, nik, alamat, noHp, kelompokId,
    noRekening: '2026'+String(1000+DB.users.length), saham:{s_A:0,s_B:0,s_C:0}, status:'aktif',
    anggotaId: uid('agg'), createdAt: nowISO()
  };
  DB.users.push(newUser);
  persist();

  addLog('Tambah anggota', 'Menambahkan anggota baru: ' + nama + ' (' + kelompokName(kelompokId) + ')');
  toast('Anggota baru berhasil ditambahkan');
  closeModal();
  renderContent();
}

function submitTambahRekening(){
  const forcedEl = document.getElementById('tr-user-forced');
  const userId = forcedEl ? forcedEl.value : document.getElementById('tr-user').value;
  const jenisId = document.getElementById('tr-jenis').value;
  const jumlah = parseIdr(document.getElementById('tr-jumlah').value) || 0;
  if(!userId || !jenisId){ toast('Pilih nasabah dan jenis simpanan'); return; }
  if(DB.tabunganAccounts.some(a=>a.userId===userId && a.jenisId===jenisId)){ toast('Rekening jenis ini sudah dibuka'); return; }
  const acc = {id:uid('acc'), userId, jenisId, saldo:0, noRekening:nextAccNo()};
  DB.tabunganAccounts.push(acc);
  if(jumlah>0){
    acc.saldo = jumlah;
    const s = getSession();
    DB.tabunganTx.push({id:uid('tx'), userId, jenisId, tipe:'setor', jumlah, saldoSetelah:acc.saldo, tanggal:nowISO(), oleh:s.userId, keterangan:'Setoran pembukaan rekening'});
  }
  persist();
  addLog('Tambah rekening', userById(userId).nama + ' membuka rekening ' + jenisName(jenisId));
  toast('Rekening baru berhasil dibuka');
  closeModal();
  renderContent();

function accPengajuan(pembId){
  const p = DB.pembiayaan.find(p=>p.id===pembId);
  if(!p || p.statusPengajuan!=='pending') return;
  const s = getSession();
  p.statusPengajuan = 'approved';
  p.status = 'berjalan';
  p.mulai = nowISO();
  p.disetujuiOleh = s.userId;
  p.waktuAcc = nowISO();
  persist();
  addLog('ACC pembiayaan', userById(p.userId).nama + ' - ' + rupiah(p.jumlahPinjaman) + ' disetujui');
  toast('Pengajuan disetujui');
  renderContent();
}
function tolakPengajuan(pembId){
  const p = DB.pembiayaan.find(p=>p.id===pembId);
  if(!p || p.statusPengajuan!=='pending') return;
  confirmDialog('Tolak pengajuan?', 'Pengajuan pembiayaan '+userById(p.userId).nama+' akan ditolak.', 'danger', ()=>{
    const s = getSession();
    p.statusPengajuan = 'rejected';
    p.status = 'rejected';
    p.ditolakOleh = s.userId;
    p.waktuTolak = nowISO();
    persist();
    addLog('Tolak pembiayaan', userById(p.userId).nama + ' - ' + rupiah(p.jumlahPinjaman) + ' ditolak');
    toast('Pengajuan ditolak');
    renderContent();
  });
}
function hapusPembiayaan(pembId){
  const p = DB.pembiayaan.find(p=>p.id===pembId);
  if(!p) return;
  confirmDialog('Hapus pembiayaan?', 'Data pembiayaan '+userById(p.userId).nama+' ('+rupiah(p.jumlahPinjaman)+') akan dihapus permanen, termasuk riwayat angsuran.', 'danger', ()=>{
    confirmDialog('Konfirmasi lagi', 'Yakin ingin menghapus pembiayaan ini? Data tidak bisa dikembalikan.', 'danger', ()=>{
      DB.pembiayaan = DB.pembiayaan.filter(x=>x.id!==pembId);
      DB.setoran = DB.setoran.filter(s=>s.pembiayaanId!==pembId);
      DB.angsuran = DB.angsuran.filter(a=>a.pembiayaanId!==pembId);
      persist();
      supabaseClient.from(TABLES.pembiayaan).delete().eq('id', pembId).then();
      supabaseClient.from(TABLES.setoran).delete().eq('pembiayaan_id', pembId).then();
      supabaseClient.from(TABLES.angsuran).delete().eq('pembiayaan_id', pembId).then();
      addLog('Hapus pembiayaan', userById(p.userId).nama + ' - ' + rupiah(p.jumlahPinjaman));
      toast('Pembiayaan berhasil dihapus');
      if(currentPage.includes('detail')) go('admin_pembiayaan');
      else renderContent();
    });
  });
}

function updatePengajuanPreview(){
  const atur = DB.koperasi.aturKeuangan||{};
  const mMin = atur.marginNominal||50000, mMax = atur.marginMaxNominal||200000;
  const jumlah = parseIdr(document.getElementById('pemb-jumlah').value)||0;
  const tenor = parseIdr(document.getElementById('pemb-tenor').value)||0;
  let margin = parseIdr(document.getElementById('pemb-margin').value)||mMin;
  const el = document.getElementById('pemb-preview');
  if(margin < mMin || margin > mMax){
    el.innerHTML = '<span style="color:var(--danger);">Keuntungan harus antara '+rupiah(mMin)+'&ndash;'+rupiah(mMax)+'.</span>';
    return;
  }
  if(!jumlah || !tenor){
    el.textContent = 'Angsuran per bulan dihitung otomatis: (pokok + keuntungan) ÷ jangka waktu.';
    return;
  }
  const total = jumlah + margin;
  const angsuran = Math.ceil(total/tenor/1000)*1000;
  el.innerHTML = '<div style="background:var(--primary-soft);padding:12px 14px;border-radius:var(--radius-sm);font-size:14px;font-weight:500;line-height:1.6;">Keuntungan <b>'+rupiah(margin)+'</b> &middot; Total kewajiban <b class="mono">'+rupiah(total)+'</b> &middot; Estimasi angsuran <b class="mono" style="font-size:16px;color:var(--primary);">'+rupiah(angsuran)+'</b>/bulan.</div>';
}
function submitPengajuan(){
  const forced = document.getElementById('pemb-user-forced');
  const userId = forced ? forced.value : document.getElementById('pemb-user').value;
  const jumlah = parseIdr(document.getElementById('pemb-jumlah').value);
  const tenor = parseIdr(document.getElementById('pemb-tenor').value);
  const atur = DB.koperasi.aturKeuangan||{};
  const mMin = atur.marginNominal||50000, mMax = atur.marginMaxNominal||200000;
  const mp = parseIdr(document.getElementById('pemb-margin').value)||mMin;
  const ket = document.getElementById('pemb-ket').value.trim();
  if(!jumlah || !tenor){ toast('Lengkapi jumlah dan jangka waktu'); return; }
  if(mp < mMin || mp > mMax){ toast('Keuntungan harus antara '+rupiah(mMin)+'-'+rupiah(mMax)); return; }
  const total = jumlah + mp;
  const p = {id:uid('pemb'), userId, jumlahPinjaman:jumlah, tenor, marginPersen:0, marginNominal:mp, angsuranPerBulan: Math.ceil(total/tenor/1000)*1000, mulai: nowISO(), sisaAngsuran:tenor, status:'berjalan', riwayatAngsuran:[], statusPengajuan:'approved', keterangan:ket};
  DB.pembiayaan.push(p);
  persist();
  addLog('Buat pengajuan pembiayaan', userById(userId).nama + ' - ' + rupiah(jumlah) + ' / ' + tenor + ' bulan (keuntungan '+rupiah(mp)+')' + (ket?' - '+ket:''));
  toast('Pengajuan berhasil dibuat');
  closeModal();
  renderContent();
}

  p.tenor = tenor;
  p.marginPersen = 0;
  p.marginNominal = mp;
  p.angsuranPerBulan = angsuranBaru;
  if(sudahBayar>0 && p.statusPengajuan==='approved'){
    p.sisaAngsuran = Math.max(tenor - sudahBayar, 0);
  } else {
    p.sisaAngsuran = tenor;
  }
  if(p.statusPengajuan==='pending' && sudahBayar===0){
    if(tenor>0) p.status = 'pending';
  } else if(p.statusPengajuan==='approved'){
    p.status = p.sisaAngsuran<=0 ? 'lunas' : 'berjalan';
  }
  p.keterangan = ket;
  persist();
  addLog('Edit pengajuan pembiayaan', userById(userId).nama + ' - ' + rupiah(jumlah) + ' / ' + tenor + ' bulan (keuntungan '+rupiah(mp)+')' + (ket?' - '+ket:''));
  toast('Pengajuan berhasil diperbarui');
  closeModal();
  renderContent();
}

function submitUser(existingId){
  const nama = document.getElementById('um-nama').value.trim();

  const password = document.getElementById('um-password').value;
  const role = document.getElementById('um-role').value;

  const kelompokId = kelompokEl ? kelompokEl.value : null;
  if(!nama || !username || !password){ toast('Lengkapi semua data'); return; }
  if(!existingId && DB.users.some(u=>u.username===username)){ toast('Nama pengguna sudah dipakai'); return; }

  if(existingId){

    addLog('Ubah pengguna', 'Memperbarui data ' + nama);
  } else {
    const newUser = {id:uid('u'), username, password, role, nama, createdAt: nowISO()};

    if(role==='nasabah'){ newUser.anggotaId = uid('agg'); newUser.noRekening = '2026'+String(1000+DB.users.length); newUser.saham = {s_A:0,s_B:0,s_C:0}; }

function totalNilaiSaham(u){
  const holdings = (DB.kepemilikanSaham||[]).filter(k=>k.nama===u.nama);
  const jns = DB.koperasi.saham.jenis||[];
  return holdings.reduce((s,k)=>{ const j=jns.find(j=>j.id===k.jenisId); return s+(j?k.lembar*nilaiSahamPerLembar(j):0); },0);
}
function nilaiSahamPerLembar(j){
  if(!j || !j.nominalPerLembar) return 0;
  var pct = (DB.koperasi.saham.pemupukanPersen||0);
  return Math.round(j.nominalPerLembar * (1 + pct/100));
}

let _pendingIconImage = null;
function handleIconFileChange(ev){
  const file = ev.target.files && ev.target.files[0];
  if(!file) return;
  const img = new Image();
  img.onload = function(){
    const MAX = 300;
    let w = img.width, h = img.height;
    if(w>MAX || h>MAX){ const r=Math.min(MAX/w,MAX/h); w=Math.round(w*r); h=Math.round(h*r); }
    const c = document.createElement('canvas');
    c.width = w; c.height = h;
    const ctx = c.getContext('2d');
    ctx.drawImage(img, 0, 0, w, h);
    URL.revokeObjectURL(url);
    _pendingIconImage = c.toDataURL('image/png');
    document.getElementById('set-icon-preview').innerHTML = '<img src="'+_pendingIconImage+'" alt="logo" style="width:100%;height:100%;object-fit:cover;">';
    ev.target.value = '';
  };
  img.onerror = function(){ toast('Gagal membaca file gambar'); URL.revokeObjectURL(img.src); ev.target.value=''; };
  const url = URL.createObjectURL(file);
  img.src = url;
}

async function simpanAturKeuangan(){
  const marginNominal = Math.max(0, parseIdr(document.getElementById('atur-margin').value)||0);
  const marginMaxNominal = Math.max(0, parseIdr(document.getElementById('atur-margin-max').value)||0);
  if(marginMaxNominal < marginNominal){ toast('Keuntungan maksimum tidak boleh lebih kecil dari minimum'); return; }
  const pools = (DB.koperasi.aturKeuangan.pools||[]).map(p=>({...p, persen: Math.max(0, parseIdr(document.getElementById('pool-'+p.id).value)||0)}));
  const total = pools.reduce((s,p)=>s+p.persen,0);
  if(Math.abs(total-100)>0.01){ toast('Total alokasi pool harus = 100% (sekarang '+total+'%)'); return; }
  if(!DB.koperasi.aturKeuangan) DB.koperasi.aturKeuangan = {};
  // Simpan backup nilai lama untuk rollback kalau gagal
  const backup = JSON.parse(JSON.stringify(DB.koperasi.aturKeuangan));
  DB.koperasi.aturKeuangan.marginNominal = marginNominal;
  DB.koperasi.aturKeuangan.marginMaxNominal = marginMaxNominal;
  DB.koperasi.aturKeuangan.pools = pools;
  if(!DB.koperasi.aturKeuangan.dana) DB.koperasi.aturKeuangan.dana = {};
  const btn = document.querySelector('button[onclick="simpanAturKeuangan()"]');
  if(btn){ btn.disabled = true; btn.textContent = 'Menyimpan...'; }
  const result = await persistNow();
  if(!result.ok){
    // Gagal simpan ke Supabase -> rollback biar UI gak menyesatkan
    DB.koperasi.aturKeuangan = backup;
    toast('Gagal menyimpan ke server: ' + (result.err && result.err.message ? result.err.message : 'cek konsol untuk detail'));
    renderContent();
    return;
  }
  addLog('Atur keuangan', 'Memperbarui keuntungan (min-maks) dan alokasi pool');
  toast('Aturan keuangan disimpan');
  renderContent();
}

async function submitKelompok(){
  const nama = document.getElementById('kel-nama').value.trim();
  const koorId = document.getElementById('kel-koor').value || null;
  if(!nama){ toast('Nama wajib diisi'); return; }
  const newKel = {id:uid('kel'), nama, koorId: koorId};
  DB.koperasi.kelompok.push(newKel);
  addLog('Ubah pengaturan', 'Menambahkan kelompok: ' + nama);
  if(SUPABASE_ENABLED){
    const { error } = await upsertToSupabase(TABLES.kelompok, toSnake(newKel));
    if(error) console.error('Supabase upsert kelompok error:', error);
  }
  persist();
  toast('Kelompok ditambahkan');
  closeModal(); renderContent();
}
function deleteKelompok(id){
  confirmDialog('Hapus kelompok?', 'Anggota dalam kelompok ini tetap tersimpan.', 'danger', async ()=>{
    const idx = DB.koperasi.kelompok.findIndex(k=>k.id===id);
    if(idx===-1) return;
    DB.koperasi.kelompok.splice(idx,1);
    addLog('Ubah pengaturan', 'Menghapus kelompok: ' + id);
    if(SUPABASE_ENABLED){
      const { error } = await deleteFromSupabase(TABLES.kelompok, id);
      if(error) console.error('Supabase delete kelompok error:', error);
    }
    persist();
    toast('Kelompok dihapus');
    renderContent();
  });
}

  `);
}
async function submitSahamBaru(){
  const nama = document.getElementById('sh-nama').value.trim();
  const nominal = parseIdr(document.getElementById('sh-nominal').value)||0;
  const shuPersen = parseIdr(document.getElementById('sh-shu').value)||0;
  if(!nama || !nominal){ toast('Lengkapi nama dan nominal'); return; }
  const id = 's_'+nama.replace(/[^A-Za-z0-9]/g,'_').toUpperCase();
  DB.koperasi.saham.jenis.push({id, nama, nominalPerLembar:nominal, shuPersen});
  DB.users.forEach(u=>{ if(!u.saham) u.saham={}; u.saham[id]=0; });
  const result = await persistNow();
  if(!result.ok){
    DB.koperasi.saham.jenis = DB.koperasi.saham.jenis.filter(j=>j.id!==id);
    toast('Gagal menyimpan ke server: ' + (result.err && result.err.message ? result.err.message : 'cek konsol untuk detail'));
    renderContent();
    return;
  }
  addLog('Tambah saham', 'Menambahkan jenis saham: '+nama);
  toast('Jenis saham ditambahkan');
  closeModal(); renderContent();
}
function editSahamJenis(id){
  const j = DB.koperasi.saham.jenis.find(j=>j.id===id);
  if(!j) return;
  openModal(`
    <h3>Edit Jenis Saham</h3>
    <div class="form-row"><label>Nama</label><input type="text" id="sh-nama" value="${j.nama}"></div>
    <div class="form-row"><label>Nominal per lembar (Rp)</label><input type="number" id="sh-nominal" value="${j.nominalPerLembar}" min="1000" step="1000"></div>
    <div class="form-row"><label>Alokasi SHU (%)</label><input type="number" id="sh-shu" value="${j.shuPersen}" min="0" max="100" step="1"></div>
    <div class="modal-actions"><button class="btn btn-outline" onclick="closeModal()">Batal</button><button class="btn btn-primary" onclick="simpanEditSahamJenis('${id}')">Simpan</button></div>
  `);
}
async function simpanEditSahamJenis(id){
  const j = DB.koperasi.saham.jenis.find(j=>j.id===id);
  if(!j) return;
  const backup = {...j};
  j.nama = document.getElementById('sh-nama').value.trim() || j.nama;
  j.nominalPerLembar = parseIdr(document.getElementById('sh-nominal').value)||j.nominalPerLembar;
  j.shuPersen = parseIdr(document.getElementById('sh-shu').value)||0;
  const result = await persistNow();
  if(!result.ok){
    Object.assign(j, backup);
    toast('Gagal menyimpan ke server: ' + (result.err && result.err.message ? result.err.message : 'cek konsol untuk detail'));
    renderContent();
    return;
  }
  addLog('Ubah saham', 'Memperbarui jenis saham: '+j.nama);
  toast('Jenis saham diperbarui');
  closeModal(); renderContent();
}
function deleteSahamJenis(id){
  confirmDialog('Hapus jenis saham?', 'Kepemilikan saham jenis ini pada anggota akan tetap tersimpan.', 'danger', ()=>{
    DB.koperasi.saham.jenis = DB.koperasi.saham.jenis.filter(j=>j.id!==id);
    persist();
    supabaseClient.from(TABLES.jenis_saham).delete().eq('id', id).then();
    toast('Jenis saham dihapus'); renderContent();
  });
}

function simpanKepemilikanSahamBaru(){
  const nama = document.getElementById('ks-nama').value.trim();
  const jenisId = document.getElementById('ks-jenis').value;
  const lembar = parseIdr(document.getElementById('ks-lembar').value)||0;
  if(!nama || !lembar){ toast('Lengkapi nama dan jumlah lembar'); return; }
  const anggota = DB.users.find(u=>u.role==='nasabah'&&u.nama===nama);
  DB.kepemilikanSaham.push({id:uid('ks'), nama, anggotaId: anggota?anggota.id:null, jenisId, lembar});
  // also sync back to user.saham for backward compat
  if(anggota){
    if(!anggota.saham) anggota.saham={};
    anggota.saham[jenisId] = (anggota.saham[jenisId]||0)+lembar;
  }
  persist();
  addLog('Tambah kepemilikan saham', nama+' - '+jnsName(jenisId)+' '+lembar+' lembar');
  toast('Kepemilikan saham ditambahkan');
  closeModal();
  renderContent();
}
function jnsName(id){
  const j = DB.koperasi.saham.jenis.find(j=>j.id===id);

  const aksen = ['#0B3D2E','#B98F33'];
  const sert = DB.koperasi.sertifikat||{};
  const judul = sert.judul || 'SERTIFIKAT SAHAM';
  const subjudul = sert.subjudul || '';
  const pembuka = sert.teksPembuka || 'Diberikan kepada';
  const penutup = sert.teksPenutup || '';
  const warnaBorder = sert.warnaBorder || '#B98F33';
  const warnaJudul = sert.warnaJudul || '#0B3D2E';
  const tampilLogo = sert.tampilLogo !== false;
  const tandaTangan = sert.tandaTangan !== false;

function editKepemilikanSaham(nama){
  const holdings = (DB.kepemilikanSaham||[]).filter(k=>k.nama===nama);
  if(!holdings.length) return;
  const jns = DB.koperasi.saham.jenis||[];
  openModal(`
    <h3>Edit Saham: ${nama}</h3>
    <div class="form-row"><label>Jenis saham</label>
      <select id="ks-tambah-jenis">${jns.map(j=>`<option value="${j.id}">${j.nama} (${rupiah(nilaiSahamPerLembar(j))}/lbr)</option>`).join('')}</select>
    </div>
    <div class="form-row"><label>Tambah lembar</label><input type="number" id="ks-tambah-lembar" value="0" min="0" step="1"></div>
    <button class="btn btn-outline btn-sm" onclick="tambahLembarSaham('${nama}')" style="margin-bottom:14px;">+ Tambah</button>
    <div class="section-label">Kepemilikan saat ini</div>
    ${holdings.map(k=>{
      const j = jns.find(j=>j.id===k.jenisId);
      return `<div class="list-row" style="border-bottom:1px dashed var(--border);">
        <div class="info"><div class="title">${j?j.nama:'-'}</div></div>
        <div style="display:flex;align-items:center;gap:6px;">
          <input type="number" id="ks-edit-${k.id}" value="${k.lembar}" min="0" step="1" style="width:60px;padding:4px;border-radius:6px;border:1px solid var(--border);text-align:center;">
          <span class="sub">lbr</span>
        </div>
      </div>`;
    }).join('')}
    <div class="modal-actions" style="margin-top:14px;">
      <button class="btn btn-outline" onclick="closeModal()">Batal</button>
      <button class="btn btn-danger" onclick="hapusKepemilikanSaham('${nama}')">Hapus semua</button>
      <button class="btn btn-primary" onclick="simpanEditKepemilikanSaham('${nama}')">Simpan</button>
    </div>
  `);
}
function tambahLembarSaham(nama){
  const jenisId = document.getElementById('ks-tambah-jenis').value;
  const lembar = parseIdr(document.getElementById('ks-tambah-lembar').value)||0;
  if(!lembar){ toast('Isi jumlah lembar'); return; }
  let k = DB.kepemilikanSaham.find(x=>x.nama===nama&&x.jenisId===jenisId);
  let existingId;
  if(k){
    k.lembar += lembar;
    existingId = k.id;
  } else {
    const id = uid('ks');
    DB.kepemilikanSaham.push({id, nama, anggotaId:null, jenisId, lembar});
    existingId = id;
  }
  document.getElementById('ks-tambah-lembar').value = '0';
  const el = document.getElementById('ks-edit-'+existingId);
  if(el) el.value = DB.kepemilikanSaham.find(x=>x.id===existingId).lembar;
  else editKepemilikanSaham(nama);
  toast(lembar+' lembar '+jnsName(jenisId)+' ditambahkan');
}
function simpanEditKepemilikanSaham(nama){
  const holdings = (DB.kepemilikanSaham||[]).filter(k=>k.nama===nama);
  holdings.forEach(k=>{
    const v = Math.max(0, parseIdr(document.getElementById('ks-edit-'+k.id).value)||0);
    if(v===0){
      DB.kepemilikanSaham = DB.kepemilikanSaham.filter(x=>x.id!==k.id);
      supabaseClient.from(TABLES.kepemilikan_saham).delete().eq('id', k.id).then();
    } else {
      k.lembar = v;
    }
  });
  // sync back to user.saham
  const u = DB.users.find(u=>u.role==='nasabah'&&u.nama===nama);
  if(u){
    if(!u.saham) u.saham={};
    (DB.koperasi.saham.jenis||[]).forEach(j=>{ u.saham[j.id] = (DB.kepemilikanSaham||[]).filter(k=>k.nama===nama&&k.jenisId===j.id).reduce((s,k)=>s+k.lembar,0); });
  }
  persist();
  addLog('Edit kepemilikan saham', 'Memperbarui saham '+nama);
  toast('Saham diperbarui');
  closeModal();
  renderContent();
}
function hapusKepemilikanSaham(nama){
  confirmDialog('Hapus semua kepemilikan saham?', 'Semua saham atas nama '+nama+' akan dihapus.', 'danger', ()=>{
    DB.kepemilikanSaham = DB.kepemilikanSaham.filter(k=>k.nama!==nama);
    const u = DB.users.find(u=>u.role==='nasabah'&&u.nama===nama);
    if(u){ (DB.koperasi.saham.jenis||[]).forEach(j=>{ if(u.saham) u.saham[j.id]=0; }); }
    persist();
    supabaseClient.from(TABLES.kepemilikan_saham).delete().eq('nama', nama).then();
    addLog('Hapus kepemilikan saham', 'Menghapus saham '+nama);
    toast('Kepemilikan saham dihapus');
    renderContent();
  });
}

function openPengajuanModalKoor(){

  const mMin = atur.marginNominal||50000, mMax = atur.marginMaxNominal||200000;
  openModal(`
    <h3>Ajukan Pembiayaan Baru</h3>
    <div class="form-row"><label>Anggota</label><select id="pemb-user">${anggota.map(u=>`<option value="${u.id}">${u.nama}</option>`).join('')}</select></div>
    <div class="form-row"><label>Jumlah pinjaman (Rp)</label><input type="number" id="pemb-jumlah" min="50000" step="50000" placeholder="cth. 1000000" oninput="updatePengajuanPreviewKoor()"></div>
    <div class="form-row"><label>Jangka waktu (bulan)</label><input type="number" id="pemb-tenor" min="1" max="36" placeholder="cth. 12" oninput="updatePengajuanPreviewKoor()"></div>

    <div class="hint" id="pemb-preview-koor">Angsuran per bulan dihitung otomatis: (pokok + keuntungan) &divide; jangka waktu.</div>
    <div class="modal-actions">
      <button class="btn btn-outline" onclick="closeModal()">Batal</button>
      <button class="btn btn-primary" onclick="submitPengajuanKoor()">Ajukan</button>
    </div>
  `);
}
function updatePengajuanPreviewKoor(){
  const atur = DB.koperasi.aturKeuangan||{};
  const mMin = atur.marginNominal||50000, mMax = atur.marginMaxNominal||200000;
  const jumlah = parseIdr(document.getElementById('pemb-jumlah').value)||0;
  const tenor = parseIdr(document.getElementById('pemb-tenor').value)||0;
  let margin = parseIdr(document.getElementById('pemb-margin').value)||mMin;
  const el = document.getElementById('pemb-preview-koor');
  if(margin < mMin || margin > mMax){
    el.innerHTML = '<span style="color:var(--danger);">Keuntungan harus antara '+rupiah(mMin)+'&ndash;'+rupiah(mMax)+'.</span>';
    return;
  }
  if(!jumlah || !tenor){
    el.textContent = 'Angsuran per bulan dihitung otomatis: (pokok + keuntungan) ÷ jangka waktu.';
    return;
  }
  const total = jumlah + margin;
  const angsuran = Math.ceil(total/tenor/1000)*1000;
  el.innerHTML = '<div style="background:var(--primary-soft);padding:12px 14px;border-radius:var(--radius-sm);font-size:14px;font-weight:500;line-height:1.6;">Keuntungan <b>'+rupiah(margin)+'</b> &middot; Total kewajiban <b class="mono">'+rupiah(total)+'</b> &middot; Estimasi angsuran <b class="mono" style="font-size:16px;color:var(--primary);">'+rupiah(angsuran)+'</b>/bulan.</div>';
}
function submitPengajuanKoor(){
  const userId = document.getElementById('pemb-user').value;
  const jumlah = parseIdr(document.getElementById('pemb-jumlah').value);
  const tenor = parseIdr(document.getElementById('pemb-tenor').value);
  const atur = DB.koperasi.aturKeuangan||{};
  const mMin = atur.marginNominal||50000, mMax = atur.marginMaxNominal||200000;
  const mp = parseIdr(document.getElementById('pemb-margin').value)||mMin;
  const ket = document.getElementById('pemb-ket').value.trim();
  if(!jumlah || !tenor){ toast('Lengkapi jumlah dan jangka waktu'); return; }
  if(mp < mMin || mp > mMax){ toast('Keuntungan harus antara '+rupiah(mMin)+'-'+rupiah(mMax)); return; }
  const total = jumlah + mp;
  const p = {id:uid('pemb'), userId, jumlahPinjaman:jumlah, tenor, marginPersen:0, marginNominal:mp, angsuranPerBulan: Math.ceil(total/tenor/1000)*1000, mulai: nowISO(), sisaAngsuran:tenor, status:'pending', riwayatAngsuran:[], statusPengajuan:'pending', keterangan:ket};
  DB.pembiayaan.push(p);
  persist();
  addLog('Ajukan pembiayaan', userById(userId).nama + ' - ' + rupiah(jumlah) + ' / ' + tenor + ' bulan (keuntungan '+rupiah(mp)+')' + (ket?' - '+ket:''));
  toast('Pengajuan pembiayaan dikirim, menunggu ACC admin');
  closeModal();
  renderContent();
}

  const p = DB.pembiayaan.find(p=>p.id===pembId);

  const ket = document.getElementById('edit-pemb-ket-koor').value.trim();

function bayarAngsuranPrompt(pembId){
  const p = DB.pembiayaan.find(p=>p.id===pembId);
  const angsuranKe = p.tenor - p.sisaAngsuran + 1;
  const totalKew = p.jumlahPinjaman + marginNominalOf(p);
  const totalDibayar = p.riwayatAngsuran.reduce((s,a)=>s+a.jumlah, 0);
  const sisaTagihan = totalKew - totalDibayar;
  openModal(`
    <h3>Bayar Angsuran</h3>
    <div class="card" style="margin-bottom:14px;">
      <div class="list-row"><div class="info"><div class="title">${userById(p.userId).nama}</div><div class="sub">Angsuran ke-${angsuranKe} dari ${p.tenor} &middot; Sisa tagihan ${rupiah(sisaTagihan)}</div></div></div>
    </div>
    <div class="form-row"><label>Jumlah bayar (Rp)</label><input type="number" id="bayar-angsuran-jumlah" min="0" step="5000" value="${Math.min(p.angsuranPerBulan, sisaTagihan)}"></div>
    <div class="modal-actions">
      <button class="btn btn-outline" onclick="closeModal()">Batal</button>
      <button class="btn btn-primary" onclick="confirmBayarAngsuran('${p.id}')">Konfirmasi bayar</button>
    </div>
  `);
}
function confirmBayarAngsuran(pembId){
  const jumlah = parseIdr(document.getElementById('bayar-angsuran-jumlah').value);
  if(!jumlah || jumlah<=0){ toast('Masukkan jumlah yang valid'); return; }
  const s = getSession();
  const r = doBayarAngsuran(pembId, s.userId, jumlah);
  if(!r.ok){ toast(r.msg); return; }
  toast('Angsuran berhasil dicatat');
  closeModal();
  renderContent();
}

            ${p.riwayatAngsuran.map(a=>`<div class="ledger-row"><div class="d">${fmtDateShort(a.tanggal)}</div><div class="k">Ke-${a.angsuranKe}</div><div class="j">${rupiah(a.jumlah)}</div></div>`).join('')}
          </div>
        ` : ''}
      </div>
    `).join('')}
  `;
}

/* =========================================================
   Extra routes needing sub-state (detail pages)
========================================================= */
const _routerExtras = {
  admin_anggota_detail: (u)=>renderAdminAnggotaDetail(u, currentSubState.userId),
  admin_tabungan_detail: (u)=>renderAdminTabunganDetail(u, currentSubState.userId),
  admin_pembiayaan_detail: (u)=>renderPembiayaanDetailPage(currentSubState.pembId, 'admin_pembiayaan'),
  admin_saham_certificate: (u)=>renderSahamCertificate(currentSubState.namaSaham),
  koor_anggota_detail: (u)=>renderKoorAnggotaDetail(u, currentSubState.userId),
  koor_tabungan_detail: (u)=>renderKoorTabunganDetail(u, currentSubState.userId),
  koor_pembiayaan_detail: (u)=>renderPembiayaanDetailPage(currentSubState.pembId, 'koor_pembiayaan')
};
const _origRouter = renderContent;
renderContent = function(){
  const el = document.getElementById('content');
  const user = currentUser();
  if(!user) return;
  if(_routerExtras[currentPage]){
    el.innerHTML = _routerExtras[currentPage](user);
    el.scrollTop = 0;
    return;
  }
  _origRouter();
};

/* =========================================================
   PWA INSTALL
========================================================= */
let deferredPrompt = null;
const installOverlay = document.getElementById('install-overlay');
const installBtn = document.getElementById('install-btn');
const installSkip = document.getElementById('install-skip');
const installIcon = document.getElementById('install-icon');
const installTitle = document.getElementById('install-title');

window.addEventListener('beforeinstallprompt', e => {
  if (localStorage.getItem('pwa-skip') === '1') return;
  e.preventDefault();
  deferredPrompt = e;
  if (installIcon && DB.koperasi) {
    if (DB.koperasi.iconImage) installIcon.innerHTML = '<img src="'+DB.koperasi.iconImage+'" alt="" style="width:100%;height:100%;object-fit:cover;border-radius:inherit;">';
    else installIcon.textContent = DB.koperasi.icon || '🏦';
  }
  if (installTitle && DB.koperasi) installTitle.textContent = DB.koperasi.nama || 'UB Rukun Barokah';
  installOverlay.style.display = 'flex';
});

if (installBtn) installBtn.addEventListener('click', async () => {
  if (!deferredPrompt) return;
  deferredPrompt.prompt();
  const { outcome } = await deferredPrompt.userChoice;
  deferredPrompt = null;
  installOverlay.style.display = 'none';
});

if (installSkip) installSkip.addEventListener('click', () => {
  installOverlay.style.display = 'none';
  localStorage.setItem('pwa-skip', '1');
});

if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js').catch(()=>{});
}

/* =========================================================
   INIT
========================================================= */
const loginYearEl = document.getElementById('login-year');
if(loginYearEl) loginYearEl.textContent = new Date().getFullYear();
['login-username','login-password'].forEach(id=>{
  const el = document.getElementById(id);
  if(el) el.addEventListener('keydown', e=>{ if(e.key==='Enter') handleLogin(); });
});
boot();
