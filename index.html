function accPengajuan(pembId){
  const p = DB.pembiayaan.find(p=>p.id===pembId);
  if(!p || p.statusPengajuan!=='pending') return;
  const s = getSession();
  p.statusPengajuan = 'approved';
  p.status = 'berjalan';
  p.mulai = nowISO();
  p.disetujuiOleh = s.userId;
  p.waktuAcc = nowISO();
  persist();
  addLog('ACC pembiayaan', userById(p.userId).nama + ' - ' + rupiah(p.jumlahPinjaman) + ' disetujui');
  bigSuccess('Pengajuan disetujui');
  renderContent();
}
function tolakPengajuan(pembId){
  const p = DB.pembiayaan.find(p=>p.id===pembId);
  if(!p || p.statusPengajuan!=='pending') return;
  confirmDialog('Tolak pengajuan?', 'Pengajuan pembiayaan '+userById(p.userId).nama+' akan ditolak.', 'danger', ()=>{
    const s = getSession();
    p.statusPengajuan = 'rejected';
    p.status = 'rejected';
    p.ditolakOleh = s.userId;
    p.waktuTolak = nowISO();
    persist();
    addLog('Tolak pembiayaan', userById(p.userId).nama + ' - ' + rupiah(p.jumlahPinjaman) + ' ditolak');
    bigSuccess('Pengajuan ditolak');
    renderContent();
  });
}
function hapusPembiayaan(pembId){
  const p = DB.pembiayaan.find(p=>p.id===pembId);
  if(!p) return;
  confirmDialog('Hapus pembiayaan?', 'Data pembiayaan '+userById(p.userId).nama+' ('+rupiah(p.jumlahPinjaman)+') akan dihapus permanen, termasuk riwayat angsuran.', 'danger', ()=>{
    confirmDialog('Konfirmasi lagi', 'Yakin ingin menghapus pembiayaan ini? Data tidak bisa dikembalikan.', 'danger', ()=>{
      DB.pembiayaan = DB.pembiayaan.filter(x=>x.id!==pembId);
      DB.setoran = DB.setoran.filter(s=>s.pembiayaanId!==pembId);
      DB.angsuran = DB.angsuran.filter(a=>a.pembiayaanId!==pembId);
      persist();
      supabaseClient.from(TABLES.pembiayaan).delete().eq('id', pembId).then();
      supabaseClient.from(TABLES.setoran).delete().eq('pembiayaan_id', pembId).then();
      supabaseClient.from(TABLES.angsuran).delete().eq('pembiayaan_id', pembId).then();
      addLog('Hapus pembiayaan', userById(p.userId).nama + ' - ' + rupiah(p.jumlahPinjaman));
      bigSuccess('Pembiayaan berhasil dihapus');
      if(currentPage.includes('detail')) go('admin_pembiayaan');
      else renderContent();
    });
  });

async function submitPengajuan(){
  const forced = document.getElementById('pemb-user-forced');
  const userId = forced ? forced.value : document.getElementById('pemb-user').value;
  const jumlah = parseIdr(document.getElementById('pemb-jumlah').value);
  const tenor = parseIdr(document.getElementById('pemb-tenor').value);
  const atur = DB.koperasi.aturKeuangan||{};
  const mMin = atur.marginNominal||50000, mMax = atur.marginMaxNominal||200000;
  const mp = parseIdr(document.getElementById('pemb-margin').value)||mMin;
  const ket = document.getElementById('pemb-ket').value.trim();
  if(!jumlah || !tenor){ toast('Lengkapi jumlah dan jangka waktu'); return; }
  if(mp < mMin || mp > mMax){ toast('Keuntungan harus antara '+rupiah(mMin)+'-'+rupiah(mMax)); return; }
  const total = jumlah + mp;
  const p = {id:uid('pemb'), userId, jumlahPinjaman:jumlah, tenor, marginPersen:0, marginNominal:mp, angsuranPerBulan: Math.ceil(total/tenor/1000)*1000, mulai: nowISO(), sisaAngsuran:tenor, status:'berjalan', riwayatAngsuran:[], statusPengajuan:'approved', keterangan:ket};
  DB.pembiayaan.push(p);
  const btn = document.querySelector('button[onclick="submitPengajuan()"]');
  if(btn){ btn.disabled = true; btn.textContent = 'Menyimpan...'; }
  const result = await persistNow();
  if(!result.ok){
    // Gagal simpan ke server -> batalkan biar tidak "hilang" pas refresh & user tau ada masalah
    DB.pembiayaan = DB.pembiayaan.filter(x=>x.id!==p.id);
    toast('Gagal menyimpan ke server: ' + (result.err && result.err.message ? result.err.message : 'cek koneksi internet, lalu coba lagi'));
    if(btn){ btn.disabled = false; btn.textContent = 'Ajukan'; }
    renderContent();
    return;
  }
  addLog('Buat pengajuan pembiayaan', userById(userId).nama + ' - ' + rupiah(jumlah) + ' / ' + tenor + ' bulan (keuntungan '+rupiah(mp)+')' + (ket?' - '+ket:''));
  bigSuccess('Pengajuan berhasil dibuat');
  closeModal();
  renderContent();
}

function submitEditPengajuan(pembId){
  const p = DB.pembiayaan.find(p=>p.id===pembId);
  if(!p) return;
  const userId = document.getElementById('edit-pemb-user').value;
  const jumlah = parseIdr(document.getElementById('edit-pemb-jumlah').value);
  const tenor = parseIdr(document.getElementById('edit-pemb-tenor').value);
  const atur = DB.koperasi.aturKeuangan||{};
  const mMin = atur.marginNominal||50000, mMax = atur.marginMaxNominal||200000;
  const mp = parseIdr(document.getElementById('edit-pemb-margin').value)||mMin;
  const ket = document.getElementById('edit-pemb-ket').value.trim();
  if(!jumlah || !tenor){ toast('Lengkapi jumlah dan jangka waktu'); return; }
  if(mp < mMin || mp > mMax){ toast('Keuntungan harus antara '+rupiah(mMin)+'-'+rupiah(mMax)); return; }
  const total = jumlah + mp;
  const angsuranBaru = Math.ceil(total/tenor/1000)*1000;
  const sudahBayar = p.riwayatAngsuran.length;
  p.userId = userId;
  p.jumlahPinjaman = jumlah;
  p.tenor = tenor;
  p.marginPersen = 0;
  p.marginNominal = mp;
  p.angsuranPerBulan = angsuranBaru;
  if(sudahBayar>0 && p.statusPengajuan==='approved'){
    p.sisaAngsuran = Math.max(tenor - sudahBayar, 0);
  } else {
    p.sisaAngsuran = tenor;
  }
  if(p.statusPengajuan==='pending' && sudahBayar===0){
    if(tenor>0) p.status = 'pending';
  } else if(p.statusPengajuan==='approved'){
    p.status = p.sisaAngsuran<=0 ? 'lunas' : 'berjalan';
  }
  p.keterangan = ket;
  persist();
  addLog('Edit pengajuan pembiayaan', userById(userId).nama + ' - ' + rupiah(jumlah) + ' / ' + tenor + ' bulan (keuntungan '+rupiah(mp)+')' + (ket?' - '+ket:''));
  bigSuccess('Pengajuan berhasil diperbarui');
  closeModal();
  renderContent();
}

async function syncKoorKelompok(userId, newKelompokId){
  // Lepaskan koordinator dari kelompok lama (jika ada) yang masih menunjuk ke dia
  const oldKel = DB.koperasi.kelompok.find(k=>(k.koorId||k.koor_id)===userId && k.id!==newKelompokId);
  const newKel = DB.koperasi.kelompok.find(k=>k.id===newKelompokId);
  const toSave = [];
  if(oldKel){ oldKel.koorId = null; oldKel.koor_id = null; toSave.push(oldKel); }
  if(newKel){ newKel.koorId = userId; toSave.push(newKel); }
  if(SUPABASE_ENABLED){
    for(const kel of toSave){
      const { error } = await upsertToSupabase(TABLES.kelompok, toSnake(kel));
      if(error) console.error('Supabase upsert kelompok error:', error);
    }
  }
}
async function submitUser(existingId){
  const role = document.getElementById('um-role').value;
  const username = document.getElementById('um-username').value.trim();
  const password = document.getElementById('um-password').value;
  const kelompokEl = document.getElementById('um-kelompok');
  const kelompokId = kelompokEl ? kelompokEl.value : null;

  // Tambah akun nasabah baru: ambil datanya dari anggota yang dipilih di dropdown
  if(!existingId && role==='nasabah'){
    const anggotaId = document.getElementById('um-anggota').value;
    if(!anggotaId){ toast('Pilih anggota terlebih dahulu'); return; }
    if(!username || !password){ toast('Lengkapi semua data'); return; }
    if(DB.users.some(u=>u.username===username)){ toast('Nama pengguna sudah dipakai'); return; }
    const agg = DB.users.find(u=>u.id===anggotaId && u._noAkun);
    if(!agg){ toast('Data anggota tidak ditemukan, coba muat ulang'); return; }
    const newUser = {
      id: uid('u'), username, password, role: 'nasabah', nama: agg.nama,
      anggotaId: agg.id, kelompokId: agg.kelompokId, noRekening: agg.noRekening,
      saham: agg.saham || {s_A:0,s_B:0,s_C:0}, status: agg.status || 'aktif', createdAt: nowISO()
    };
    DB.users = DB.users.filter(u=>u.id!==agg.id); // buang entri sementara (_noAkun)
    DB.users.push(newUser);
    addLog('Tambah pengguna', 'Membuat akun login untuk anggota: ' + agg.nama);
    persist();
    bigSuccess('Akun login berhasil dibuat');
    closeModal();
    renderContent();
    return;
  }

  const nama = existingId
    ? document.getElementById('um-nama').value.trim()
    : (()=>{
        const selVal = document.getElementById('um-anggota').value;
        const agg = DB.users.find(u=>u.id===selVal);
        return agg ? agg.nama : '';
      })();
  if(!existingId && !nama){ toast('Pilih anggota terlebih dahulu'); return; }
  if(!nama || !username || !password){ toast('Lengkapi semua data'); return; }
  if(!existingId && DB.users.some(u=>u.username===username)){ toast('Nama pengguna sudah dipakai'); return; }

  if(existingId){
    const u = userById(existingId);
    u.nama = nama; u.password = password;
    if(u.role!=='admin') u.kelompokId = kelompokId;
    if(u.role==='koordinator') await syncKoorKelompok(u.id, kelompokId);
    addLog('Ubah pengguna', 'Memperbarui data ' + nama);
  } else {
    const newUser = {id:uid('u'), username, password, role, nama, createdAt: nowISO()};
    if(role!=='admin') newUser.kelompokId = kelompokId;
    DB.users.push(newUser);
    if(role==='koordinator') await syncKoorKelompok(newUser.id, kelompokId);
    addLog('Tambah pengguna', 'Menambahkan ' + roleLabel(role).toLowerCase() + ': ' + nama);
  }
  persist();
  bigSuccess('Data pengguna disimpan');
  closeModal();
  renderContent();
}
function deleteUser(userId){
  const u = userById(userId);
  confirmDialog('Hapus pengguna?', 'Akun ' + u.nama + ' akan dihapus permanen.', 'danger', ()=>{
    const aggId = u.anggotaId;
    DB.users = DB.users.filter(x=>x.id!==userId);
    persist();

function computeLapModalData(){
  const pemb = DB.pembiayaan || [];
  const setoran = DB.setoran || [];
  const tx = DB.tabunganTx || [];
  function marginPerAngsuran(p){
    if(!p || !p.tenor) return 0;
    return Math.round(marginNominalOf(p) / p.tenor);
  }
  const now = new Date();
  let minDate = now;
  [].concat(pemb.map(p=>p.mulai), setoran.map(s=>s.tanggal), tx.map(t=>t.tanggal)).forEach(d=>{
    if(!d) return;
    const dt = new Date(d);
    if(!isNaN(dt) && dt < minDate) minDate = dt;
  });
  const startY = minDate.getFullYear(), startM = minDate.getMonth();
  const endY = now.getFullYear(), endM = now.getMonth();
  const months = [];
  let y = startY, m = startM;
  while(y < endY || (y===endY && m<=endM)){
    months.push({y,m});
    m++; if(m>11){ m=0; y++; }
  }
  if(!months.length) return [];
  let cumPokokRealisasi = 0, cumPokokTerbayar = 0, cumTabMasuk = 0, cumTabKeluar = 0, cumKas = 0;
  const totalSahamSaatIni = (DB.users||[]).filter(u=>u.role==='nasabah').reduce((s,u)=>s+totalNilaiSaham(u),0);
  const byYear = {};
  months.forEach(({y,m})=>{
    const pembBulanIni = pemb.filter(p=>{ const d=new Date(p.mulai); return !isNaN(d) && d.getFullYear()===y && d.getMonth()===m; });
    const pokokRealisasi = pembBulanIni.reduce((s,p)=>s+(p.jumlahPinjaman||0),0);
    const marginRealisasi = pembBulanIni.reduce((s,p)=>s+marginNominalOf(p),0);
    const angsuranBulanIni = setoran.filter(s=>{ if(s.jenis!=='angsuran') return false; const d=new Date(s.tanggal); return !isNaN(d) && d.getFullYear()===y && d.getMonth()===m; });
    const totalAngsuran = angsuranBulanIni.reduce((s,a)=>s+(a.jumlah||0),0);
    let keuntungan = 0, pokokTerbayarBulanIni = 0;
    angsuranBulanIni.forEach(a=>{
      const p = pemb.find(pp=>pp.id===a.pembiayaanId);
      const marginBagian = p ? Math.min(marginPerAngsuran(p), a.jumlah||0) : 0;
      keuntungan += marginBagian;
      pokokTerbayarBulanIni += Math.max(0, (a.jumlah||0) - marginBagian);
    });
    const txBulanIni = tx.filter(t=>{ const d=new Date(t.tanggal); return !isNaN(d) && d.getFullYear()===y && d.getMonth()===m; });
    const tabMasuk = txBulanIni.filter(t=>t.tipe==='setor').reduce((s,t)=>s+(t.jumlah||0),0);
    const tabKeluar = txBulanIni.filter(t=>t.tipe==='tarik').reduce((s,t)=>s+(t.jumlah||0),0);
    cumPokokRealisasi += pokokRealisasi;
    cumPokokTerbayar += pokokTerbayarBulanIni;
    cumTabMasuk += tabMasuk;
    cumTabKeluar += tabKeluar;
    cumKas += (tabMasuk + totalAngsuran) - (tabKeluar + pokokRealisasi);
    const piutang = Math.max(0, cumPokokRealisasi - cumPokokTerbayar);
    const tabSaldo = cumTabMasuk - cumTabKeluar;
    if(!byYear[y]) byYear[y] = { tahun:String(y), rows:[], total:{pokok:0,margin:0,totalAngsuran:0,keuntungan:0,tabMasuk:0,tabPenarikan:0} };
    byYear[y].rows.push({
      bulan: m+1, piutang, pokok: pokokRealisasi, margin: marginRealisasi,
      totalAngsuran, keuntungan, tabMasuk, tabPenarikan: tabKeluar, tabSaldo,
      saham: totalSahamSaatIni, kas: cumKas
    });
    byYear[y].total.pokok += pokokRealisasi;
    byYear[y].total.margin += marginRealisasi;
    byYear[y].total.totalAngsuran += totalAngsuran;
    byYear[y].total.keuntungan += keuntungan;
    byYear[y].total.tabMasuk += tabMasuk;
    byYear[y].total.tabPenarikan += tabKeluar;
  });
  return Object.keys(byYear).sort().map(k=>byYear[k]);
}
const LAP_MODAL_BULAN = ['Jan','Feb','Mar','Apr','Mei','Jun','Jul','Agu','Sep','Okt','Nov','Des'];
function totalNilaiSaham(u){
  const holdings = (DB.kepemilikanSaham||[]).filter(k=>k.nama===u.nama);
  const jns = DB.koperasi.saham.jenis||[];
  return holdings.reduce((s,k)=>{ const j=jns.find(j=>j.id===k.jenisId); return s+(j?k.lembar*nilaiSahamPerLembar(j):0); },0);
}
function nilaiSahamPerLembar(j){
  if(!j || !j.nominalPerLembar) return 0;
  var pct = (DB.koperasi.saham.pemupukanPersen||0);
  return Math.round(j.nominalPerLembar * (1 + pct/100));
}
// Hitung SHU per pemilik saham, berbobot per JENIS saham (mis. SAHAM A 50%, SAHAM B 30%, SAHAM C 20%).
// Pool SHU Saham dipecah dulu ke tiap jenis sesuai persennya (j.shuPersen), lalu di dalam
// satu jenis dibagi lagi ke pemiliknya secara proporsional terhadap nilai kepemilikan (lembar x harga/lembar)
// di jenis itu saja. Pemilik yang hanya punya jenis dgn 0% tidak dapat SHU dari jenis itu.
function hitungShuSahamOwners(poolSHUSaham, jns, ks){
  var owners = {}; // nama -> total shu
  (ks||[]).forEach(function(k){ if(!(k.nama in owners)) owners[k.nama] = 0; });
  (jns||[]).forEach(function(j){
    var poolJenis = poolSHUSaham * (j.shuPersen||0) / 100;
    if(poolJenis<=0) return;
    var totalNilaiJenis = (ks||[]).filter(function(k){ return k.jenisId===j.id; })
      .reduce(function(s,k){ return s+k.lembar*nilaiSahamPerLembar(j); },0);
    if(totalNilaiJenis<=0) return;
    (ks||[]).forEach(function(k){
      if(k.jenisId!==j.id) return;
      var nilaiOwner = k.lembar*nilaiSahamPerLembar(j);
      owners[k.nama] = (owners[k.nama]||0) + poolJenis * nilaiOwner/totalNilaiJenis;
    });
  });
  return owners;
}

function cetakLapModal(tahun){
  const data = computeLapModalData();
  const yd = data.find(y=>y.tahun===tahun);
  if(!yd){ toast('Data tidak ditemukan'); return; }
  const { jsPDF } = window.jspdf;
  const fmt = v => (v===null || v===undefined) ? '-' : rupiah(v);
  const cols = LAP_MODAL_COLS, totalKeys = LAP_MODAL_TOTAL_KEYS;
  const tgl = new Date().toLocaleDateString('id-ID',{year:'numeric',month:'long',day:'numeric'});
  const orgName = (DB.koperasi && DB.koperasi.nama) || 'Koperasi';
  const doc = new jsPDF({ orientation:'landscape' });
  doc.setFontSize(13);
  doc.text(orgName.toUpperCase(), 14, 14);
  doc.setFontSize(10.5);
  doc.text('POSISI MODAL BERJALAN \u2014 TAHUN ' + yd.tahun, 14, 20.5);
  doc.setFontSize(8.5);
  doc.setTextColor(120);
  doc.text('Dicetak: ' + tgl, 14, 26);
  doc.setTextColor(0);
  const body = yd.rows.map(r=>[LAP_MODAL_BULAN[r.bulan-1], ...cols.map(c=>fmt(r[c.k]))]);
  if(yd.total){
    body.push(['Total', ...cols.map(c=>{
      const v = totalKeys.includes(c.k) ? yd.total[c.k] : (yd.rows[yd.rows.length-1]||{})[c.k];
      return fmt(v);
    })]);
  }
  doc.autoTable({
    head: [['Bln', ...cols.map(c=>c.l)]],
    body,
    startY: 31,
    styles:{ fontSize:7.5, cellPadding:2.5, halign:'right' },
    headStyles:{ fillColor:[11,61,46], textColor:255, halign:'center' },
    columnStyles:{ 0:{ halign:'center', fontStyle:'bold' } },
    alternateRowStyles:{ fillColor:[244,248,244] },
    didParseCell: function(d){
      if(yd.total && d.row.index===body.length-1 && d.section==='body'){ d.cell.styles.fillColor=[218,232,222]; d.cell.styles.fontStyle='bold'; }
    }
  });
  const finalY = (doc.lastAutoTable && doc.lastAutoTable.finalY) || 40;
  doc.setFontSize(7.5);
  doc.setTextColor(100);
  const catatan = LAP_MODAL_CATATAN.replace(/&minus;/g, '-');
  doc.text(doc.splitTextToSize(catatan, 270), 14, finalY + 8);
  doc.save(sanitizeFileName('Posisi Modal Berjalan ' + yd.tahun) + '.pdf');
  toast('File PDF berhasil diunduh');
}

let _pendingIconImage = null;
function handleIconFileChange(ev){
  const file = ev.target.files && ev.target.files[0];
  if(!file) return;
  const img = new Image();
  img.onload = function(){
    const MAX = 300;
    let w = img.width, h = img.height;
    if(w>MAX || h>MAX){ const r=Math.min(MAX/w,MAX/h); w=Math.round(w*r); h=Math.round(h*r); }
    const c = document.createElement('canvas');
    c.width = w; c.height = h;
    const ctx = c.getContext('2d');
    ctx.drawImage(img, 0, 0, w, h);
    URL.revokeObjectURL(url);
    _pendingIconImage = c.toDataURL('image/png');
    document.getElementById('set-icon-preview').innerHTML = '<img src="'+_pendingIconImage+'" alt="logo" style="width:100%;height:100%;object-fit:cover;">';
    ev.target.value = '';
  };
  img.onerror = function(){ toast('Gagal membaca file gambar'); URL.revokeObjectURL(img.src); ev.target.value=''; };
  const url = URL.createObjectURL(file);
  img.src = url;
}

async function simpanAturKeuangan(){
  const marginNominal = Math.max(0, parseIdr(document.getElementById('atur-margin').value)||0);
  const marginMaxNominal = Math.max(0, parseIdr(document.getElementById('atur-margin-max').value)||0);
  if(marginMaxNominal < marginNominal){ toast('Keuntungan maksimum tidak boleh lebih kecil dari minimum'); return; }
  const pools = (DB.koperasi.aturKeuangan.pools||[]).map(p=>({...p, persen: Math.max(0, parseIdr(document.getElementById('pool-'+p.id).value)||0)}));
  const total = pools.reduce((s,p)=>s+p.persen,0);
  if(Math.abs(total-100)>0.01){ toast('Total alokasi pool harus = 100% (sekarang '+total+'%)'); return; }
  if(!DB.koperasi.aturKeuangan) DB.koperasi.aturKeuangan = {};
  // Simpan backup nilai lama untuk rollback kalau gagal
  const backup = JSON.parse(JSON.stringify(DB.koperasi.aturKeuangan));
  DB.koperasi.aturKeuangan.marginNominal = marginNominal;
  DB.koperasi.aturKeuangan.marginMaxNominal = marginMaxNominal;
  DB.koperasi.aturKeuangan.pools = pools;
  if(!DB.koperasi.aturKeuangan.dana) DB.koperasi.aturKeuangan.dana = {};
  const btn = document.querySelector('button[onclick="simpanAturKeuangan()"]');
  if(btn){ btn.disabled = true; btn.textContent = 'Menyimpan...'; }
  const result = await persistNow();
  if(!result.ok){
    // Gagal simpan ke Supabase -> rollback biar UI gak menyesatkan
    DB.koperasi.aturKeuangan = backup;
    toast('Gagal menyimpan ke server: ' + (result.err && result.err.message ? result.err.message : 'cek konsol untuk detail'));
    renderContent();
    return;
  }
  addLog('Atur keuangan', 'Memperbarui keuntungan (min-maks) dan alokasi pool');
  bigSuccess('Aturan keuangan disimpan');
  renderContent();
}

async function submitKelompok(){
  const nama = document.getElementById('kel-nama').value.trim();
  const koorId = document.getElementById('kel-koor').value || null;
  if(!nama){ toast('Nama wajib diisi'); return; }
  const newKel = {id:uid('kel'), nama, koorId: koorId};
  DB.koperasi.kelompok.push(newKel);
  addLog('Ubah pengaturan', 'Menambahkan kelompok: ' + nama);
  if(SUPABASE_ENABLED){
    const { error } = await upsertToSupabase(TABLES.kelompok, toSnake(newKel));
    if(error) console.error('Supabase upsert kelompok error:', error);
  }
  persist();
  bigSuccess('Kelompok ditambahkan');
  closeModal(); renderContent();
}
function deleteKelompok(id){
  confirmDialog('Hapus kelompok?', 'Anggota dalam kelompok ini tetap tersimpan.', 'danger', async ()=>{
    const idx = DB.koperasi.kelompok.findIndex(k=>k.id===id);
    if(idx===-1) return;
    DB.koperasi.kelompok.splice(idx,1);
    addLog('Ubah pengaturan', 'Menghapus kelompok: ' + id);
    if(SUPABASE_ENABLED){
      const { error } = await deleteFromSupabase(TABLES.kelompok, id);
      if(error) console.error('Supabase delete kelompok error:', error);
    }
    persist();
    bigSuccess('Kelompok dihapus');
    renderContent();
  });
}

async function submitSahamBaru(){
  const nama = document.getElementById('sh-nama').value.trim();
  const nominal = parseIdr(document.getElementById('sh-nominal').value)||0;
  const shuPersen = parseIdr(document.getElementById('sh-shu').value)||0;
  if(!nama || !nominal){ toast('Lengkapi nama dan nominal'); return; }
  const id = 's_'+nama.replace(/[^A-Za-z0-9]/g,'_').toUpperCase();
  DB.koperasi.saham.jenis.push({id, nama, nominalPerLembar:nominal, shuPersen});
  DB.users.forEach(u=>{ if(!u.saham) u.saham={}; u.saham[id]=0; });
  const result = await persistNow();
  if(!result.ok){
    DB.koperasi.saham.jenis = DB.koperasi.saham.jenis.filter(j=>j.id!==id);
    toast('Gagal menyimpan ke server: ' + (result.err && result.err.message ? result.err.message : 'cek konsol untuk detail'));
    renderContent();
    return;
  }
  addLog('Tambah saham', 'Menambahkan jenis saham: '+nama);
  bigSuccess('Jenis saham ditambahkan');
  closeModal(); renderContent();
}

// Susun daftar penerima SHU (baik SHU Saham maupun Bagi Hasil Tabungan) menjadi
// baris-baris [nama, jumlah] untuk dipakai bersama oleh unduh PDF & Excel.
function dataDaftarSHU(){
  const tab = currentSubState.shuTab||'saham';
  const atur = DB.koperasi.aturKeuangan || {};
  const dana = atur.dana || {};
  const jns = DB.koperasi.saham.jenis||[];
  const label = tab==='saham' ? 'SHU SAHAM' : 'BAGI HASIL TABUNGAN';
  const kolomNama = tab==='saham' ? 'Nama Pemilik Saham' : 'Nama';
  let rows = [];
  if(tab==='saham'){
    const ks = DB.kepemilikanSaham||[];
    const poolSHUSaham = dana.shu_saham||0;
    const owners = hitungShuSahamOwners(poolSHUSaham, jns, ks);
    rows = Object.keys(owners).map(n=>[n, Math.round(owners[n]||0)]);
  } else {
    const nasabah = DB.users.filter(u=>u.role==='nasabah');
    const totalMudharabah = DB.tabunganAccounts.reduce((s,a)=>s+a.saldo,0);
    const poolBHT = dana.bagi_hasil_tabungan||0;
    function ctkSaldoUser(u){ return DB.tabunganAccounts.filter(function(a){ return a.userId===u.id; }).reduce(function(s,a){ return s+a.saldo; },0); }
    var m = nasabah.filter(function(u){ return ctkSaldoUser(u)>0; });
    if(m.length===0) m = nasabah.filter(function(u){ return DB.tabunganAccounts.some(function(a){ return a.userId===u.id; }); });
    rows = m.map(function(u){
      var saldo = ctkSaldoUser(u);
      var porsi = totalMudharabah>0 ? saldo/totalMudharabah*100 : 0;
      var shu = poolBHT * porsi/100;
      return [u.nama, Math.round(shu)];
    });
  }
  return { label, kolomNama, rows };
}
function unduhPdfSHU(){
  const { label, kolomNama, rows } = dataDaftarSHU();
  if(!rows.length){ toast('Tidak ada data untuk diunduh'); return; }
  const { jsPDF } = window.jspdf;
  const tgl = new Date().toLocaleDateString('id-ID',{year:'numeric',month:'long',day:'numeric'});
  const doc = new jsPDF({ orientation:'portrait' });
  doc.setFontSize(13);
  doc.text((DB.koperasi.nama||'Koperasi').toUpperCase(), 14, 14);
  doc.setFontSize(10.5);
  doc.text(label, 14, 20.5);
  doc.setFontSize(8.5);
  doc.setTextColor(120);
  doc.text('Diunduh: ' + tgl, 14, 26);
  doc.setTextColor(0);
  doc.autoTable({
    head: [['No', kolomNama, 'SHU']],
    body: rows.map((r,i)=>[i+1, r[0], rupiah(r[1])]),
    startY: 31,
    styles:{ fontSize:9, cellPadding:3 },
    headStyles:{ fillColor:[11,61,46], textColor:255 },
    columnStyles:{ 0:{ halign:'center', cellWidth:12 }, 2:{ halign:'right' } }
  });
  doc.save(sanitizeFileName('Daftar ' + label) + '.pdf');
  toast('File PDF berhasil diunduh');
}
function unduhExcelSHU(){
  const { label, kolomNama, rows } = dataDaftarSHU();
  if(!rows.length){ toast('Tidak ada data untuk diunduh'); return; }
  const header = ['No', kolomNama, 'SHU'];
  const body = rows.map((r,i)=>[i+1, r[0], r[1]]);
  const ws = XLSX.utils.aoa_to_sheet([header, ...body]);
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, label.slice(0,31));
  XLSX.writeFile(wb, sanitizeFileName('Daftar ' + label) + '.xlsx');
  toast('File Excel berhasil diunduh');
}

const WARNA_SAHAM = ['#f59e0b','#0ea5e9','#22c55e','#8b5cf6','#ef4444','#ec4899'];
function ownerKelompokId(nama){
  const manual = (DB.kepemilikanSaham||[]).find(k=>k.nama===nama && k.kelompokId);
  if(manual) return manual.kelompokId;
  const u = DB.users.find(u=>u.role==='nasabah' && u.nama===nama);
  return u ? u.kelompokId : null;

function simpanKepemilikanSahamBaru(){
  const nama = document.getElementById('ks-nama').value.trim();

function cornerFlourish(color){
  return `<svg width="100%" height="100%" viewBox="0 0 44 44" fill="none" xmlns="http://www.w3.org/2000/svg">
    <path d="M2 16 L2 2 L16 2" stroke="${color}" stroke-width="1.4" fill="none"/>
    <path d="M2 22 Q2 2 22 2" stroke="${color}" stroke-width="0.8" fill="none" opacity=".55"/>
    <circle cx="2" cy="2" r="2.3" fill="${color}"/>
    <circle cx="12" cy="2" r="1.1" fill="${color}" opacity=".6"/>
    <circle cx="2" cy="12" r="1.1" fill="${color}" opacity=".6"/>
  </svg>`;
}
function serialRangeForHolding(jenisId, holdingId){
  const all = (DB.kepemilikanSaham||[]).filter(k=>k.jenisId===jenisId).slice().sort((a,b)=> a.id<b.id?-1:(a.id>b.id?1:0));
  let cum = 0;
  for(const k of all){
    const start = cum + 1;
    const end = cum + (k.lembar||0);
    if(k.id===holdingId) return { start, end };
    cum = end;
  }
  return { start: 1, end: 1 };
}
function sertifikatNomor(nama, kode){
  let h = 0;
  for(let i=0;i<nama.length;i++){ h = (h*31 + nama.charCodeAt(i)) >>> 0; }
  const num = String((h % 9000) + 1000);
  const tahun = new Date().getFullYear();
  return `${kode}/SHM/${tahun}/${num}`;
}

function cetakSertifikatSaham(nama){
  const el = document.getElementById('sertifikat-saham');
  if(!el){ toast('Sertifikat tidak ditemukan'); return; }
  toast('Menyiapkan file PDF...');
  html2canvas(el, { scale:2.5, useCORS:true, backgroundColor:'#ffffff' }).then(function(canvas){
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF({ orientation:'portrait', unit:'mm', format:'a4' });
    const pageW = doc.internal.pageSize.getWidth();
    const pageH = doc.internal.pageSize.getHeight();
    const imgW = pageW;
    const imgH = canvas.height * imgW / canvas.width;
    const imgData = canvas.toDataURL('image/jpeg', 0.95);
    const y = imgH < pageH ? (pageH - imgH) / 2 : 0;
    doc.addImage(imgData, 'JPEG', 0, y, imgW, Math.min(imgH, pageH));
    doc.save(sanitizeFileName('Sertifikat Saham ' + nama) + '.pdf');
    bigSuccess('File PDF berhasil diunduh');
  }).catch(function(err){
    console.error(err);
    toast('Gagal membuat file PDF');
  });
}
function editKepemilikanSaham(nama){
  const holdings = (DB.kepemilikanSaham||[]).filter(k=>k.nama===nama);
  if(!holdings.length) return;
  const jns = DB.koperasi.saham.jenis||[];
  const kelompokOptions = DB.koperasi.kelompok.map(k=>`<option value="${k.id}" ${ownerKelompokId(nama)===k.id?'selected':''}>${k.nama}</option>`).join('');
  openModal(`
    <h3>Edit Saham: ${nama}</h3>
    <div class="form-row"><label>Kelompok</label>
      <select id="ks-edit-kelompok">
        <option value="">- Otomatis dari akun anggota (jika ada) -</option>
        ${kelompokOptions}
      </select>
    </div>
    <div class="form-row"><label>Jenis saham</label>
      <select id="ks-tambah-jenis">${jns.map(j=>`<option value="${j.id}">${j.nama} (${rupiah(nilaiSahamPerLembar(j))}/lbr)</option>`).join('')}</select>
    </div>
    <div class="form-row"><label>Tambah lembar</label><input type="number" id="ks-tambah-lembar" value="0" min="0" step="1"></div>
    <button class="btn btn-outline btn-sm" onclick="tambahLembarSaham('${nama}')" style="margin-bottom:14px;">+ Tambah</button>
    <div class="section-label">Kepemilikan saat ini</div>
    ${holdings.map(k=>{
      const j = jns.find(j=>j.id===k.jenisId);
      return `<div class="list-row" style="border-bottom:1px dashed var(--border);">
        <div class="info"><div class="title">${j?j.nama:'-'}</div></div>
        <div style="display:flex;align-items:center;gap:6px;">
          <input type="number" id="ks-edit-${k.id}" value="${k.lembar}" min="0" step="1" style="width:60px;padding:4px;border-radius:6px;border:1px solid var(--border);text-align:center;">
          <span class="sub">lbr</span>
        </div>
      </div>`;
    }).join('')}
    <div class="modal-actions" style="margin-top:14px;">
      <button class="btn btn-outline" onclick="closeModal()">Batal</button>
      <button class="btn btn-danger" onclick="hapusKepemilikanSaham('${nama}')">Hapus semua</button>
      <button class="btn btn-primary" onclick="simpanEditKepemilikanSaham('${nama}')">Simpan</button>
    </div>
  `);
}
function tambahLembarSaham(nama){
  const jenisId = document.getElementById('ks-tambah-jenis').value;
  const lembar = parseIdr(document.getElementById('ks-tambah-lembar').value)||0;
  if(!lembar){ toast('Isi jumlah lembar'); return; }
  const kelEl = document.getElementById('ks-edit-kelompok');
  const kelompokId = (kelEl ? kelEl.value : '') || ownerKelompokId(nama) || null;
  let k = DB.kepemilikanSaham.find(x=>x.nama===nama&&x.jenisId===jenisId);
  let existingId;
  if(k){
    k.lembar += lembar;
    existingId = k.id;
  } else {
    const id = uid('ks');
    DB.kepemilikanSaham.push({id, nama, anggotaId:null, jenisId, lembar, kelompokId});
    existingId = id;
  }
  document.getElementById('ks-tambah-lembar').value = '0';
  const el = document.getElementById('ks-edit-'+existingId);
  if(el) el.value = DB.kepemilikanSaham.find(x=>x.id===existingId).lembar;
  else editKepemilikanSaham(nama);
  toast(lembar+' lembar '+jnsName(jenisId)+' ditambahkan');
}
function simpanEditKepemilikanSaham(nama){
  const holdings = (DB.kepemilikanSaham||[]).filter(k=>k.nama===nama);
  const kelompokId = document.getElementById('ks-edit-kelompok').value || null;
  holdings.forEach(k=>{
    const v = Math.max(0, parseIdr(document.getElementById('ks-edit-'+k.id).value)||0);
    if(v===0){
      DB.kepemilikanSaham = DB.kepemilikanSaham.filter(x=>x.id!==k.id);
      supabaseClient.from(TABLES.kepemilikan_saham).delete().eq('id', k.id).then();
    } else {
      k.lembar = v;
      k.kelompokId = kelompokId;
    }
  });
  // sync back to user.saham
  const u = DB.users.find(u=>u.role==='nasabah'&&u.nama===nama);
  if(u){
    if(!u.saham) u.saham={};
    (DB.koperasi.saham.jenis||[]).forEach(j=>{ u.saham[j.id] = (DB.kepemilikanSaham||[]).filter(k=>k.nama===nama&&k.jenisId===j.id).reduce((s,k)=>s+k.lembar,0); });
  }
  persist();
  addLog('Edit kepemilikan saham', 'Memperbarui saham '+nama);
  bigSuccess('Saham diperbarui');
  closeModal();
  renderContent();
}
function hapusKepemilikanSaham(nama){
  confirmDialog('Hapus semua kepemilikan saham?', 'Semua saham atas nama '+nama+' akan dihapus.', 'danger', ()=>{
    DB.kepemilikanSaham = DB.kepemilikanSaham.filter(k=>k.nama!==nama);
    const u = DB.users.find(u=>u.role==='nasabah'&&u.nama===nama);
    if(u){ (DB.koperasi.saham.jenis||[]).forEach(j=>{ if(u.saham) u.saham[j.id]=0; }); }
    persist();
    supabaseClient.from(TABLES.kepemilikan_saham).delete().eq('nama', nama).then();
    addLog('Hapus kepemilikan saham', 'Menghapus saham '+nama);
    bigSuccess('Kepemilikan saham dihapus');
    renderContent();
  });
}

function updatePengajuanPreviewKoor(){
  const atur = DB.koperasi.aturKeuangan||{};
  const mMin = atur.marginNominal||50000, mMax = atur.marginMaxNominal||200000;
  const jumlah = parseIdr(document.getElementById('pemb-jumlah').value)||0;
  const tenor = parseIdr(document.getElementById('pemb-tenor').value)||0;
  let margin = parseIdr(document.getElementById('pemb-margin').value)||mMin;
  const el = document.getElementById('pemb-preview-koor');
  if(margin < mMin || margin > mMax){
    el.innerHTML = '<span style="color:var(--danger);">Keuntungan harus antara '+rupiah(mMin)+'&ndash;'+rupiah(mMax)+'.</span>';
    return;
  }
  if(!jumlah || !tenor){
    el.textContent = 'Angsuran per bulan dihitung otomatis: (pokok + keuntungan) ÷ jangka waktu.';
    return;
  }
  const total = jumlah + margin;
  const angsuran = Math.ceil(total/tenor/1000)*1000;

}
async function submitPengajuanKoor(){
  const userId = document.getElementById('pemb-user').value;
  const jumlah = parseIdr(document.getElementById('pemb-jumlah').value);
  const tenor = parseIdr(document.getElementById('pemb-tenor').value);
  const atur = DB.koperasi.aturKeuangan||{};
  const mMin = atur.marginNominal||50000, mMax = atur.marginMaxNominal||200000;
  const mp = parseIdr(document.getElementById('pemb-margin').value)||mMin;
  const ket = document.getElementById('pemb-ket').value.trim();
  if(!jumlah || !tenor){ toast('Lengkapi jumlah dan jangka waktu'); return; }
  if(mp < mMin || mp > mMax){ toast('Keuntungan harus antara '+rupiah(mMin)+'-'+rupiah(mMax)); return; }
  const total = jumlah + mp;
  const p = {id:uid('pemb'), userId, jumlahPinjaman:jumlah, tenor, marginPersen:0, marginNominal:mp, angsuranPerBulan: Math.ceil(total/tenor/1000)*1000, mulai: nowISO(), sisaAngsuran:tenor, status:'berjalan', riwayatAngsuran:[], statusPengajuan:'pending', keterangan:ket};
  DB.pembiayaan.push(p);
  const btn = document.querySelector('button[onclick="submitPengajuanKoor()"]');
  if(btn){ btn.disabled = true; btn.textContent = 'Menyimpan...'; }
  const result = await persistNow();
  if(!result.ok){
    // Gagal simpan ke server -> batalkan biar tidak "hilang" pas refresh & user tau ada masalah
    DB.pembiayaan = DB.pembiayaan.filter(x=>x.id!==p.id);
    toast('Gagal menyimpan ke server: ' + (result.err && result.err.message ? result.err.message : 'cek koneksi internet, lalu coba lagi'));
    if(btn){ btn.disabled = false; btn.textContent = 'Ajukan'; }
    renderContent();
    return;
  }
  addLog('Ajukan pembiayaan', userById(userId).nama + ' - ' + rupiah(jumlah) + ' / ' + tenor + ' bulan (keuntungan '+rupiah(mp)+')' + (ket?' - '+ket:''));
  bigSuccess('Pengajuan pembiayaan dikirim, menunggu ACC admin');
  closeModal();
  renderContent();
}

function bayarAngsuranPrompt(pembId){
  const p = DB.pembiayaan.find(p=>p.id===pembId);
  const angsuranKe = p.tenor - p.sisaAngsuran + 1;
  const totalKew = p.jumlahPinjaman + marginNominalOf(p);
  const totalDibayar = p.riwayatAngsuran.reduce((s,a)=>s+a.jumlah, 0);
  const sisaTagihan = totalKew - totalDibayar;
  openModal(`

function confirmBayarAngsuran(pembId){

  const s = getSession();

let deferredPrompt = null;
const installOverlay = document.getElementById('install-overlay');
const installBtn = document.getElementById('install-btn');
const installSkip = document.getElementById('install-skip');
const installIcon = document.getElementById('install-icon');
const installTitle = document.getElementById('install-title');

window.addEventListener('beforeinstallprompt', e => {
  if (localStorage.getItem('pwa-skip') === '1') return;
  e.preventDefault();
  deferredPrompt = e;
  if (installIcon && DB.koperasi) {
    if (DB.koperasi.iconImage) installIcon.innerHTML = '<img src="'+DB.koperasi.iconImage+'" alt="" style="width:100%;height:100%;object-fit:cover;border-radius:inherit;">';

  installOverlay.style.display = 'flex';
});

if (installBtn) installBtn.addEventListener('click', async () => {
  if (!deferredPrompt) return;
  deferredPrompt.prompt();
  const { outcome } = await deferredPrompt.userChoice;
  deferredPrompt = null;
  installOverlay.style.display = 'none';
});

if (installSkip) installSkip.addEventListener('click', () => {
  installOverlay.style.display = 'none';
  localStorage.setItem('pwa-skip', '1');
});

/* =========================================================
   CUSTOM SEARCHABLE SELECT (auto-enhances every <select>)
========================================================= */
(function(){
  const SEARCH_THRESHOLD = 7; // tampilkan kotak cari kalau opsi lebih dari ini
  const CHEVRON = '<svg class="csel-chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"></polyline></svg>';
  const SEARCH_ICON = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="7"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>';
  const CHECK_ICON = '<svg class="csel-check" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>';

  let activeOverlay = null;

  function closeActive(){
    if(activeOverlay){ activeOverlay.remove(); activeOverlay=null; document.body.style.overflow=''; }
    document.querySelectorAll('.csel-trigger.csel-open').forEach(t=>t.classList.remove('csel-open'));
  }

  function titleFor(sel){
    const row = sel.closest('.form-row');
    if(row){
      const lbl = row.querySelector('label');
      if(lbl && lbl.textContent.trim()) return lbl.textContent.trim();
    }
    return 'Pilih';
  }

  function syncTrigger(sel, trigger){
    const opt = sel.options[sel.selectedIndex];
    const txt = trigger.querySelector('.csel-trigger-text');
    const label = opt ? opt.textContent.trim() : '';
    txt.textContent = label || 'Pilih...';
    trigger.classList.toggle('csel-placeholder', !label);
    const isDisabled = sel.disabled || sel.options.length===0;
    trigger.classList.toggle('csel-disabled', isDisabled);
    trigger.disabled = isDisabled;
  }

  function openPanel(sel, trigger){
    closeActive();
    trigger.classList.add('csel-open');
    const showSearch = sel.options.length > SEARCH_THRESHOLD;

    const overlay = document.createElement('div');
    overlay.className = 'csel-overlay';
    const sheet = document.createElement('div');
    sheet.className = 'csel-sheet';
    sheet.innerHTML =
      '<div class="csel-sheet-head"><div class="csel-sheet-title"></div><button type="button" class="csel-close" aria-label="Tutup">&times;</button></div>' +
      (showSearch ? '<div class="csel-search-wrap">'+SEARCH_ICON+'<input type="text" class="csel-search" placeholder="Cari..." autocomplete="off"></div>' : '') +
      '<div class="csel-list"></div>';
    sheet.querySelector('.csel-sheet-title').textContent = titleFor(sel);
    overlay.appendChild(sheet);
    document.body.appendChild(overlay);
    document.body.style.overflow = 'hidden';
    activeOverlay = overlay;

    const listEl = sheet.querySelector('.csel-list');

    function renderList(filter){
      const f = (filter||'').trim().toLowerCase();
      listEl.innerHTML = '';
      let any = false;
      Array.from(sel.options).forEach(o=>{
        const label = o.textContent.trim();
        if(f && !label.toLowerCase().includes(f)) return;
        any = true;
        const item = document.createElement('div');
        item.className = 'csel-item' + (o.disabled ? ' csel-item-disabled' : '') + (o.index===sel.selectedIndex ? ' csel-item-active' : '');
        const span = document.createElement('span');
        span.textContent = label || '(kosong)';
        item.appendChild(span);
        if(o.index===sel.selectedIndex) item.insertAdjacentHTML('beforeend', CHECK_ICON);
        if(!o.disabled){
          item.addEventListener('click', ()=>{
            if(sel.selectedIndex !== o.index){
              sel.selectedIndex = o.index;
              sel.dispatchEvent(new Event('change', {bubbles:true}));
            }
            syncTrigger(sel, trigger);
            closeActive();
          });
        }
        listEl.appendChild(item);
      });
      if(!any) listEl.innerHTML = '<div class="csel-empty">Tidak ditemukan</div>';
    }
    renderList('');

    overlay.addEventListener('click', e=>{ if(e.target===overlay) closeActive(); });
    sheet.querySelector('.csel-close').addEventListener('click', closeActive);
    if(showSearch){
      const search = sheet.querySelector('.csel-search');
      search.addEventListener('input', ()=>renderList(search.value));
      setTimeout(()=>search.focus(), 60);
    }
  }

  function enhance(sel){
    if(!sel || sel.tagName!=='SELECT' || sel.dataset.cselDone || sel.multiple) return;
    sel.dataset.cselDone = '1';

    const wrap = document.createElement('div');
    wrap.className = 'csel';
    sel.parentNode.insertBefore(wrap, sel);
    wrap.appendChild(sel);
    sel.classList.add('csel-native');
    sel.tabIndex = -1;

    const trigger = document.createElement('button');
    trigger.type = 'button';
    trigger.className = 'csel-trigger';
    trigger.innerHTML = '<span class="csel-trigger-text"></span>' + CHEVRON;
    wrap.appendChild(trigger);

    syncTrigger(sel, trigger);
    trigger.addEventListener('click', ()=>{
      if(sel.disabled || sel.options.length===0) return;
      openPanel(sel, trigger);
    });

    sel.addEventListener('change', ()=>syncTrigger(sel, trigger));
    // opsi select bisa diganti ulang lewat kode lain (innerHTML) -> pantau perubahan
    new MutationObserver(()=>syncTrigger(sel, trigger)).observe(sel, {childList:true, attributes:true, attributeFilter:['disabled']});
  }

  function scan(root){
    if(!root || !root.querySelectorAll) return;
    root.querySelectorAll('select').forEach(enhance);
  }

  document.addEventListener('keydown', e=>{ if(e.key==='Escape') closeActive(); });

  scan(document);
  new MutationObserver(muts=>{
    muts.forEach(m=>{
      m.addedNodes.forEach(n=>{
        if(n.nodeType!==1) return;
        if(n.tagName==='SELECT') enhance(n);
        else scan(n);
      });
    });
  }).observe(document.body, {childList:true, subtree:true});
})();
