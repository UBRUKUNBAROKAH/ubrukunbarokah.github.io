<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Background Putih & Hijau Bergerak</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #1e293b; /* Warna teks gelap agar kontras dengan background putih */
            
            /* WARNA DASAR: Sekarang Putih Cerah (#f8fafc) */
            background-color: #f8fafc; 
            
            /* Pendaran cahaya hijau di atas latar putih */
            background-image: 
                radial-gradient(circle at 20% 30%, rgba(32, 201, 151, 0.25) 0%, transparent 60%),
                radial-gradient(circle at 80% 70%, rgba(40, 167, 69, 0.15) 0%, transparent 60%);
            
            background-size: 140% 140%;
            animation: gerakCahaya 10s ease infinite alternate;
        }

        /* Animasi gerakan cahaya */
        @keyframes gerakCahaya {
            0% {
                background-position: 0% 0%;
            }
            50% {
                background-position: 50% 100%;
            }
            100% {
                background-position: 100% 0%;
            }
        }

        /* Kotak Konten (Kaca Transparan Terang) */
        .container {
            text-align: center;
            padding: 2.5rem;
            background: rgba(255, 255, 255, 0.4);
            border: 1px solid rgba(32, 201, 151, 0.2);
            border-radius: 24px;
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            box-shadow: 0 20px 40px rgba(32, 201, 151, 0.08);
            max-width: 450px;
            width: 90%;
        }

        h1 {
            font-size: 2.2rem;
            margin-bottom: 1rem;
            /* Gradasi teks hijau tua ke hijau segar */
            background: linear-gradient(45deg, #0f5132, #20c997);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p {
            color: #475569;
            line-height: 1.6;
            font-size: 1rem;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Tema Putih &amp; Hijau</h1>
        <p>Latar belakang hitam sudah sepenuhnya dibuang. Sekarang tampilannya menggunakan tema terang berbasis putih dengan animasi cahaya hijau yang segar.</p>
    </div>

</body>
</html>
